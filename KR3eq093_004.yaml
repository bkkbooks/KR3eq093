  - {type: 'tls:div-end', offset: 1331, content: '', id: KR3eq093_jc_004-d10d5}
  - {type: 'tls:div-start', offset: 1331, content: '', id: KR3eq093_jc_004-d10d6, level: 2, head_text: 經脈之病皆從肝經起而調經之法不專在此也}
