語妙難傳吾言治病嬰童易無大虛癆無大寒不是痰實便風火小兒病實火十嘗八九虛寒僅一二大虛大寒亦少只要牛黃與金丹牛黃散紫金丹皆吾之家藏與尋常不同熱在氣分牛黃散熱在血分紫金丹伸手揪住嬰童手不在左關在右關小兒脈三部只一部病在左關恆多在右關恆少況有手心手背之可憑左手心熱病在血分右手心熱病在氣分要之手心熱病在裡手背熱病在表不妨與脈參一參那邊實大那邊急牛黃金丹便分端熱重三黃大黃黃連梔子引二藥而下輕勾丁勾丁薄荷二花引一藥而下若有風寒即用全蠍四五個作引亦可引下二藥穩如山若只尋常虛寒症參黨參術白朮苓茯苓草炙草可帶餐牛黃金丹多風藥風藥就能治風寒小小寒症最易痊不似大人病難治十二經中細細觀牛黃散方熱在氣分牛黃一錢散青黛硃砂礞石選半夏南星白附子靈脂殭蠶蠍子面大黃寒石共為末惟有巴豆須精煉以上各一兩共為末惟巴豆為最難制非千錘百煉如細面然斷乎不可用紫金丹方熱在血分紫金丹赤金一百張蜈蚣十條蠍子以下各一兩鬱金全三稜醋炒莪朮醋炒穿山甲土炒巴豆為霜霜字須要著眼非真細白如霜斷乎不可用明雄研用金丹以埋伏為妙著牛黃散以此為例金丹之藥管最寬斬將搴旗他為先有時不得直用他必須埋伏陳裡邊有人與他性不協有吃三錢無礙者有吃一分不能受非病症不對乃天性不相協耳百中或有一二一若見面便心翻我於此中想個埋伏法使他不得妄生端黃蠟之性甚是滑把他藏在內里丸成丸不吃藥時先用他轉眼之時到下邊凡是翻症在胃口一到下邊便安然即用煎藥如吃茶再不一齊湧上前武侯用兵多埋伏吾於此中得一斑錦囊必須臨時發免使豎子生禍端小兒風症最多小兒之病風最多未從看病將鼻摸若是鼻子動而干似有扇動之意以此為風定不錯但用牛黃散一撮牛黃散宜細吃吃得緊了便不受用勾丁二花與薄荷再看兩關脈孰急酒軍醋軍分清楚調血調氣治不同不得一齊胡亂搓筋紋如墨定不治角弓天吊有薦瘥重病也治出鼻子往下流鼻如煙煤不治吾為此人誦彌陀更有慢脾風露頭雖名為風甚是弱此症原出大瀉後三生引子方見首卷助補藥黨參黃耆當歸熟地肉肉桂附附子吳萸仍多加返還元陽是正著小兒風症有不可治者嘗見兒風已數天二目天吊往上翻身子硬直難曲折鼻無洟流燥而干縱然能飲亦能食石光電火在眼前小兒風火症以牛黃散為主藥小兒風症用牛黃牛黃散此是千古不易方縱或肝經火旺甚不用金丹以金丹不能化痰也多加醋軍妙非常若是胃中有大火酒炒大黃甚是良以治大人風痰火無不以此為神方不論在表與在裡風藥駕馭立安康治風治痰兼治火並無他藥可酌量惟有慢脾風露頭大熱大補方為良吾嘗著有小兒科其中辨別甚端詳小兒月內風皆不治小兒撮口與臍風原皆先天毒內攻若是此風從後起何至手青嘴亦青不惟四四日六六日風不治即在月內皆成凶如果出了一月再見症氣血二字要分清酒軍醋軍疊代用金丹牛黃皆有功風症用牛黃散者十嘗八九以其多化痰藥也縱在血分加上醋軍無有不可除了筋紋如抹墨皆可起死與回生附録治撮口風方此方甚佳吾初未見此方一錢硃砂一分雪輕粉一分七個殭蠶三個蠍蠍子不論急風與慢風引用他母身上血月水也治小兒羊羔風並大人痰厥羊羔風症治甚難只因孩兒受風寒涼茶涼水不時哈尿臊被子未曾干初得此症容易治生薑炒糖便能痊生薑炒米糖時時食之不久自愈時候久了用馬前琥珀白者宜真牛黃石決石決明連丁香白丁香即雄雀糞礞石共為末丸成丸子向晚餐不時飲口皂礬皂角白礬水使他常常吐膩黏一月之後再行痰方可運轉大周天行痰牛黃散最佳較之尋常治法為得當驟吐驟瀉皆不安小兒一切風火症皆以平肝為先風木搖動總由天縱是嬰童一樣看每到夏秋時驚風痰火一齊翻不是脹滿妨飲食便是風火不能眠不是濕熱流黃水便是驚駭湧痰涎俱由肝木暗為賊剋制脾土不得安我嘗治此症只用牛黃與金丹全在氣血先分明看該那藥急上前牛黃金丹多風藥以之平肝甚不難或用生軍與熟軍用酒用醋各有所宜或用酒芩與酒連或用連翹與梔子或用石膏與石蓮石蓮子如若小兒甚是小加入滑石細細研和些紅糖白糖便能哈再用梨水瓜水西瓜以壓干風火一下便能愈脾土從此得安然可知一切治病理失了平木便不占故將小兒再講講以見治病有真傳童子肝腎受寒童子診脈脈受寒忽而腰硬兩腿癱重用烏烏頭附附子帶金丹補氣和血暖命元外加炒豆痛出汗置於腰腿之間其人驚喜遇神仙小兒肝經受寒多瀉緑水小兒緑糞肝受寒不加溫暖宜用薑棗山楂湯多風顛慢驚風皆起於此口舌生瘡常流水皆因濕熱上下傳有用吳萸炒黃連者治宜除風兼利濕不可清利敗脾元小兒剝腸瀉大宜通利小兒剝腸瀉不安不大通利不過關我用滑石和金丹連三趕四五六餐到晚始能見稠糞又噦黏膩三兩番渾身乾燒始少退毛竅亦覺透真寒內有金丹故也此症宜利不宜汗大人亦必依此得安然小兒濕寒作熱以尿罐上霜為上藥小兒亦有濕寒水隆冬時節熱忽起不是晝里神不安便是夜裡啼不止但看舌上多白點有邊有堰皆是紫渾身不見真火症細按脈理總不起一切大涼用不得一切大熱不能使只宜細辛與天麻只宜白附與白芷只宜荊芥與防風只宜殭蠶與牛子只宜半夏與雲苓只宜檳榔與澤瀉加上尿罐霜去煎又能發散又清裡一切濕熱盡下來勝似龍肝與鳳髓不用此藥便不盡過了咽喉便是死白點過咽喉者不治以治小兒甚得法真是奇門丁得使以尿罐上霜一撮瓦上焙乾為末加冰片少許以治小兒口舌諸症無不神效小兒寒熱噦瀉與大人同治小兒乳食未嘗動煙火胡為寒熱噦瀉一樣多不知五運六氣遍宇宙小兒一呼一吸亦該著其母飲食寒熱通天地其兒一動一靜與之臺此本天地大道理不知不覺受漸磨若到用藥時亦與大人有同科但是煎藥難與食草藥不如面藥合或用些須黏乳食或用些須和糖哈每到夏秋時只要伸手摸一摸或是左手血不調或是右手氣不和我心已自有主意便用金丹牛黃與之哈二藥雖説有巴豆小兒純陽恰相合有熱便弓下有寒便能和或加化石一二分面與面兒有同科若真有大火加些黃連亦不多但是肝為六經賊治胃不如治肝合我嘗二藥一齊備金丹用盡牛黃多可知人生雖説調胃好人生端自平肝多小兒雖小官骸具每與大人有同科會治大人會治兒何用更看小兒科小兒痞塊難治小兒痞塊醫甚難好似囚犯入牢間其初皆因寒與食繼而瘧痢受熬煎不知不覺半肚子縱有仙人亦難剜再説用藥去打他徒傷胃氣非妙詮胃氣一傷難收拾不飲不食病愈難我今告你正治法其病源流皆在肝略類女人癥瘕症大破肝腎是正端桃仁紅花醋軍胡連黑梔子之類止住寒熱湯藥止切勿再瀉敗脾元後用紅糖帶金丹藥只數釐細細餐每晚服或加八仙八仙膏去吃饃或加膏藥皮外宣雖然用藥不顯藥不過兩月把病剜切記風寒與發物一若磋跌起來難至於軟邊與蓮花痞塊軟邊者如蓮花瓣者難治附注原非人力所能痊小兒病症此最難故為爾等細細言小兒痞積宜用吃饃藥補破並行雖用藥不顯藥無不愈者即是大人虛癆雜疾以此治之無有不可小兒痞積面青黃只宜用面莫用湯雜入饃中當飯食一月兩月便康強一切補破宜並用莫使鬱熱在膀胱補用參黨參苓茯苓芡芡實蓮子扁豆薏苡半半夏術白朮良破用莪莪朮稜三稜青陳皮青皮陳皮二甲山甲鱉甲二醜黑白醜三消麥芽山楂神麯詳酉金雞內金谷蟲五穀蟲並澤瀉二胡柴胡前胡東楂合檳榔溫涼補瀉一齊用臨時加減再酌量縱有大人鬱滯將歸陰但用此方亦還陽小兒痞塊膏藥方寒熱各有所宜大人用此貼病亦必以此為例小兒痞塊膏藥方三稜莪朮阿魏良熱盛便加二黃大黃黃連與蘆薈山甲萆麻鬱金香全蠍乳乳香沒沒藥並血竭紫草紅花芎川芎與當當歸亦有寒症滯已久內不發燒外不熱二烏川烏草烏肉肉桂附附子吳萸薑黑薑斑蟊蜈蚣共烏蛇人言砒霜巴豆入麝香香綿油熬宜斟酌稍加陳醋浸皮囊醋能入骨俟熬好時入醋少許縱有瘡症用此藥亦必望聞知端詳小兒喉症風寒最多大人亦然非真紅如珊瑚或紫或白或淡紅皆是風濕寒邪作熱不可認為實火以致不救喉痛隆冬風最多切莫錯認是實火手按兩脈全不動不飲不食甚可愕未人吃乳便外啌非風而何口中濕水似橐籥非寒而何我用殭蠶白附與天麻蟬蛻山甲紫蘇撮辛細辛芷白芷麻黃合滑石牛黃牛黃散黏乳去開拓連吃兩付口大渴一切濕寒盡引卻飲食漸進嗽亦止全不輕用治喉藥治喉之藥皆是清涼可知風寒就是大毒物喉噎喉疼須細酌雷火罐子皆此意總要脈上分清楚小兒馬牙一月之內最有關係小兒馬牙甚是凶不知不覺丁成風或在暗裡未尋著三天兩天把命傾不在牙根在上齶此處最宜留神尋著莫謂病根輕或用大針或指甲務除根柢見血膿在將小米與青布添上清水一大盅拭來拭去拭乾淨鵝糞鵝糞上白麵瓦上焙乾尿余尿罐上霜創下瓦上焙黃皆有功加上五倍五倍子與冰片硃砂共研往上蒙內里若是火不盡湯煎大黃與木通一月之內風不治多從此處病根生紅糖治病最多紅糖治病最是多不論虛實與寒火以其性緩入中州諸藥逢之若金科補藥得之益平善瀉藥得之亦能和有一憨公子兒病亦無多今日用此湯明日用彼藥日日用之不耐煩見藥便如見閻羅一日請我去看看先言此兒不吃藥溫涼補瀉憑君治只要先生不用藥我言不吃苦藥最容易只要甘蔗買一科外備甜梨與西瓜還要雞蛋與焦饃日食紅糖二三錢餓了吃雞蛋餓了吃焦饃若是心中熱吃口甜梨甘蔗亦不多小兒多陰熱吃此二味以防金丹之熱主人聽了我的話便自笑呵呵我用紅糖和金丹略無異味最耐哈從此再不用苦藥管保一世永無疴郎君今日該好了請君歸去念彌陀以後治小兒往往依此為金科或用一分煎雞蛋或用一分烙焦饃或入生梨與生瓜或入茶湯使自哈只要使之不聞知便自心安意肯樂婆裟只要紅糖入肚中不愁病大無奈何今日謹告小後生小小孩兒病無多只因盲醫妄用藥若要如我去安排那怕痰食與風火只要日日用只要漸漸摩縱有天大病無不頤養樂太和何必學那盲醫妄生波山楂治老幼之滯甚好小兒大補甚是少才得溫和便能了尋常吃嗄沒才料吃得多時又病倒恆因吃多致泄瀉看是脾虛實脹飽一見參黨參術白朮便不靈小兒參朮不宜妄用再加瀉藥又不好不如與他吃山楂或三兩或四兩加上紅糖細細炒山楂炒焦加紅糖二三兩再炒再煎再用水酒一大碗煎至數沸實甚好能溫能和又能補能把滯瀉之症一齊掃老人虛滯亦似此吃下此藥亦能了我嘗惡此無有力誰知以治老幼甚是好眼科不知脈理斷乎不可不知脈理妄用藥如今皆是這眼科不知傷了多少人猶自搬磚當鏡磨我嘗官家去教學他妾數數請眼科一日問我治眼否我一診脈大黃多生地大黃赤芍皆兩餘他就照此吃一付好如秋水立澄波又嘗世家去教學主婦數數經眼科一日問我治眼否我一診脈大黃多醋軍二兩酒軍二兩他就照此吃一付好如新銅鏡乍磨又嘗古鎮去教學其中治眼多專科動至寒熱皆顛倒病人問我作生活我一下藥鋒立解好如寶匣出太阿我嘗細思此中理不用將軍總磋跎這幾年來又變局再用大黃便是錯用藥隨氣運轉氣運一變則用藥亦隨而變矣於何知之細診脈理自知不如風藥齊上前金丹一到起沉疴以治暴症甚是好久症脈要細斟酌我故録之以示人後學得以有楷模眼科摘取數方眼科書甚多吾不能讀聊取數方以為後學規程吾讀醫書數十篇靡不按脈以剔抉又讀眼科十數篇只就眼間暗分別聊撮淺顯十數方以為後學之圭臬暴得之眼多是熱惟宜搜風與散熱在表故也風熱作實必大腫兩眼膿汁滴玉屑二荊荊芥蔓荊清揚上升菊菊花最能清頭芷白芷散頭目之風並防防風大清頭目麻麻黃大能解表桃紅挑仁紅花二味大能和血破血芎芍歸地四物並皆和血決石決明草決明皆能平肝如若脈實更有力大黃或酒炒或醋炒梔子引火下行少不得更有風熱傷血目甚紅依此方法亦有功更有風熱攻擊目甚疼依此方法亦能通至於風邪中目目甚癢用此溫尉便成功久病之眼多昏沉在裡故也只宜養血並安神黨參茯苓菖蒲遠志柏子仁皆能安神四物湯中略帶補菖蒲遠志柏子仁更有遠視不能看不真參黨參苓茯苓養心補火神菖蒲之類少不了恐肉桂附子亦少不了更有近視不能看不清生地天冬滋味精恐萸肉枸杞之類亦得用些更有真陰失守酒色過度邪火侵風木搖動散目神大補金水以制火人參五味訶子親皆能收斂目神瞳子散大雖無光閉目靜坐便回春更有飲食起居過勞神瞳子青白隱隱侵內障故也總因脾土虛弱甚不能運精入雙輪人身以脾胃為主五臟皆稟氣於脾脾氣一虛五臟失守不能運精入目矣多加參黨參耆黃耆減連柏黃連黃柏恐有損於脾胃略益命火便還真補火以生土此是僕所添更有冷淚不止目昏花川椒枯草一齊加一切清涼概不用溫暖元氣止淫邪腎虛故也宜溫暖元氣以引濕邪下行此二句是僕所加更有翳障白雲目內侵皆因元府郁不伸此説出自劉河間熱用黃連能解熱鬱濕川椒能解濕鬱經用羌活能解經絡二郁血歸身能解肝經蟬蛻蛇蛻與木賊一切郁解便入神亦有增補氣血目便明元府充盛脈流通出自李東垣朱丹溪通則明明則公二説變化不能窮再將脈理參一參二説互用方有功任他世上看眼多模糊我要尋個脈理為主翁世上看眼不看脈只把眼藥往上開何如氣血診明白寒熱虛實依法裁再加眼藥三兩味雖不恰合無大乖眼科五訣吾素不精眼科然治病已久知目疾卻有五種毛病即以五種藥治之無有不效故録之以為蒙醫訓一透竅人有九竅目居其一忽而合縫不開以此竅不透故也故選透竅藥數品以為治目之式人之一身有九竅營衛周流真氣到真氣一到則無病矣眼為精明穴甚深窒塞不通甚可笑眵糊糊眼淚盈腮誰為撥開見斜照麝香冰片為通神至香至臭之藥皆能透竅竹瀝竹黃皆精妙二藥能利竅明目癢用白芷治目癢淚出淚細辛治風眼淚下菁子蔓菁子治風淚下流澤蘭治目疼川椒治目癢要遠志菖蒲皆通九竅柏子仁香能入目辛夷能通九竅桔梗寬胸利氣並人尿引諸藥而通竅卻説芥汁與廣椒咀嚼口中亦利竅二除風人有風邪上先受之忽而眼皮下垂是有風之驗也故選除風藥數品以為治目之式眼屬肝經多是風脈透中指往上衝熱風上衝宜清散寒風不上衝但頭暈頭疼而已宜溫散荊荊芥防防風散頭上滯氣二胡前胡降下柴胡發散並二活羌活理遊風獨活理伏風此句治外風白附天麻殭蠶同此句治內風覆花薄荷二味清頭目虛火亦兼用若要引子酒與蔥三清熱目居清高之地本坎一之精今忽發熱是水火不相濟也故選清空數品以為治目之式二目通紅多是熱須要涼氣與涼血三黃湯中黃柏黃芩黃連皆能明目加梔子治目赤木通澤瀉皆能明目車前設去目障青葙決明龍膽草三味去肝經風熱兼治努肉明粉消腫明目蒙花治目赤蘆薈清肝腎熱而明目切若是假熱紫滯現肉肉桂治目赤附引下溫散説努肉紫色是風寒凝滯宜用溫散加上肉桂附子便能引火歸元四定痛疼犯上焦為逆況目居群陽之首而可疼痛不止乎故選定痛藥數品以為治目之式二目珠子忽大疼乳乳香能和血明目沒沒藥去油和蔓菁蔓菁子能明目加上三七治目赤辛夷花通九竅而明目蒼耳治頭疼蒺藜破惡血與夜明夜明沙能攻血積再看寒熱虛實症元胡香附皆治疼一樣同惟有大補精髓藥大病大年始稱情眼疾不輕用大補藥惟大病大年之人始一用之則用大補者亦鮮矣雖與他症相同實不相同也五去翳眼者人之日用也恆貞明不息今忽視而不見是有物以隔之也故選去翳藥數品以為治目之式目症多端要去翳去得翳時方無蔽二蛻蛇蛻蟬蛻皆能退翳變化二賊木賊烏賊皆能退翳磨琥珀珍珠琥珀能磨翳珍珠能退翳二味得金水之精細細磋穀精能退翳菊花得金水之精茶葉末清利頭目磁石入腎而生水硃砂入肝而養血甘石爐甘石能去翳多郁仁治不眠蕤仁治目腫而虛養目神硼砂硇砂治努肉兼能去翳可對哈散大瞳子散大五味能收神治虛熊膽清專能清目熱覆盆枸杞菟絲三味皆補腎經之虛精款冬潤肺羚羊屑羚羊角專清肝熱金水神品信能通眼藥加減真法泥片元寸硼砂甘爐甘石加減眼藥在其間以上是本方看症加減熱加熊膽疼乳乳香沒沒藥紅腫硃砂血竭攢雲翳鷹糞烏羽炒琥珀建磁蕤仁丹黃丹風淚枯礬輕粉入倒毛石燕馬前攤惟有銅青屬爛眼依方下藥個個安老年羸弱之眼亦有用補者眼科從無用補方一有大補眼必盲眼科用補絶少少年新症宜記此老年産後補不妨我嘗治些羸弱症溫涼補瀉以脈量不過蔥茶做引子蔥茶引藥入眼轉眼時節大放光眼疾初起多是風火大黃宜慎用治病總要用將軍不用將軍枉勞神一入眼科便遲慢誰肯一試巴豆仁間有一二用大黃多是眼科認不真眼本離中一點火不可北方雜類陳多用風藥便見效火出皮外汗津津只宜甲乙共條達不可壬癸太認真如今午會火已極宜散風宜洗塵不可激住火性使自焚但是此等藥多遲慢多因循不得將軍總不神我嘗金丹細細研我嘗牛黃牛黃散漸漸尋以其中有巴豆仁久病之眼全不用新得之症用數分一見二藥效如神始知眼本離中一點火喜幫扶喜溫存最愛吾家二將軍不可輕意用大黃大黃與眼總不親太寒涼太陰沉不知瞎了多少人治眼須要論五行眼疾已久須依此法眼珠原是水之精治法須要論五行小兒吃饃不象樣以致脾火往上壅不瀉脾土必不中老人氣衰金不榮以致腎水無從生不補肺金必不中多淚之人眼已枯以致虛火往上衝不養肝血必不中産後之人眼已干以致陰火往上炎不滋坎一必不占勞心之人夜不眠以致肝火上頭顛不平風木必不占勞力之人晝不間以致烈火擋眉尖不抽離照必不占亦有腎經乾枯火不生冷淚不止住精英大培命根必有功川椒枯草少不了更有陰血失守酒色過度眼不明肝木搖動散真精瞳子散大大補金水必有功五味訶子人參少不了更有瞳子青白看不清內障故也過於勞神以致脾土虛弱之甚脾土虛弱難為情脾土弱甚不能運精上入於目大益中州必有功參耆少不了更有白雲翳障目內橫撥去浮雲盼睞精大增氣血方有功二蛻木賊少不了亦由氣血虛弱使然增補氣血方為正治莊農人家治眼要訣莊農人家眼不清皆因風火往上升有一壯婦四十餘十歲孩兒忽命傾因此心中常焦急朝朝暮暮淚雨零時候久了眼乾枯一睜眼時便冥濛況且莊稼起來恆下地太陽熱燥曬當空不是頭懵便耳聾睜眼一看入霧中皆因濕熱聚內里因之生火又生風如用大涼藥必且激火在當中如雨大瀉藥必遺邪氣往上衝只宜清空與降火只宜涼血與除風加上牛黃牛黃散共金丹破血破氣暗消融二藥全賴巴霜巴豆霜力雜入風藥通行十二經眼疾原從經絡得專用大黃必不靈大黃沉濁難升降必待脈實始一通況且眼居群陽首一旦沉濁必不中故用清揚撥腠理和入二藥使上衝浮雲浮霧盡掃淨好和大明生於東眼中瘀肉色紫多是寒症一人眼疼本是寒妄請盲醫進芩黃芩連黃連豈知眼科溫散甚有理全賴透發心與肝不用溫散用大涼必激紫血眼內含試觀割牲初出血皆是紅活氣色鮮遲之數刻便成紫皆是滯住風與寒人受風寒亦如此何不彼此一樣觀況且脈道甚遲遲那有真火上頭顛不可泥住眼流眵以為實症在其間豈知連日不寐寒作熱必生黏膩在臉前即用風藥大發散多加肉肉桂附附子反芩黃芩連黃連只吃一付便能愈全在脈症相對參可知世上血症若犯紫盡是受了風與寒一見熱藥便流通此是治血之大關壞眼之症多是陰毒結就我嘗見些壞眼症多是陰毒結滯成平日並不見形迹一若露頭氣熊熊忽而疼痛不能忍忽而流淚不能行忽而浮雲遮個淨再相睜眼斷不能不過三日壞已極蛤蜊頭子出當中可惜時下小先生不知毒藥用力攻此皆陰毒結已久一若露頭猛如風若得蛤蜊不露頭一付兩付便成功內用金丹往下行外用清散大除風若是蛤蜊已露頭再用此藥亦不中只能治得淚下流只能治得眼不疼蛤蜊頭子去不了多吃兩付僅路通陰毒就有憑利害好如呂后據住未央宮三個元勳盡去了那見太陽曬當空外科按脈吃藥自好切勿輕用刀針人果內科精又精外科一點便能中我本不昧陰陽理曾將外科辨分明雖然不甚中肯綮以治半陰半陰半陽症盡有功忽聞牛生字拱辰善於治陰症我去領教他傾情盡將青田法一説用藥之理甚是精又得老陳字喜鄰數方子一切惡症亦能通我遂不昧此中理一見外科便分明我嘗治一書生是陰症暗結腹內時時疼我用熱藥七八付他便糞裡帶流膿又嘗治一男子氣上壅我用清散大有功半月之後嗽不止口吐膿血漸漸輕又嘗治一腦後疽甚疼日夜衰號不成聲我用神燈細細灸方見後附注略吃溫散便成功又嘗治一附骨疽有名腿如布袋𣩮瘡肉爛也附注已成按注下頭上流水穢氣燻人使人憎我用參黨參耆黃耆十餘兩吃至草付始成功外用水銀炒巴豆去皮炒至成灰微存些性滲入中去腐生新無過此此亦死中去求生又嘗治一婦人舊月疾一逢新産使人驚我用溫散重桃仁連吃兩付下如膿他看好了不用藥出了月子腹大疼屢請名醫不見效臥在床上已成凶我用山甲加麝香日日食之大有功有人與他倒罐子見些物件似黏膿以前小腹似蒸饃吃了此藥漸漸鬆又嘗治一頸項堅不通我用風藥加蜈蚣加四五條他便喉爛小窟窿流盡毒水即長平到了一月熱又起喉爛小口出稠膿我用大補兼風藥稠膿流盡又成功又嘗治些喉間疽一加八味八味丸中有肉桂附子便流通間有紅腫一點白繡針微挑即成功如非真火無此象妄用刀針總是凶以上皆是我治過那有一個用針攻青田治法亦如此恐傷好肉不能行間有𣩮膿瘡已熟只用竹刃貼皮沖可惜時下小先生不知此中真實情我故録之以示人按脈吃藥自成功切勿妄意用刀針傷了好肉斷不行外科不知純陰之症甚多著書立説甚是難不得頭腦總枉然頭腦不能分清楚千言萬語是禍端我看世上外科門盡是外科正宗傳外科正宗雖然分經絡純陰之症全未去昭宣純陰之症便要入骨治大熱大補大透宣果能早早透出毒縱然為禍亦有邊不可使他隱伏藏在內窮年纍月繞骨間不怕透出熱不斷不怕透出腫連綿不怕透出膿外流不怕透出口如鑽炮薑焦術滲脾濕肉肉桂附附子二活羌活獨活蒼蒼朮麻麻黃連若是熱補帶透毒連吃數付便外傳那有附骨真陰症滯住經絡不能宣間亦有之觀下自知果能毒透便有膿只用竹刃貼皮穿金針傷了好肉最難聯口外邊潰爛海浮散方見後附注內用大補十全大補湯附注是真詮更有半陰半陽症治法較此稍輕便或搗蔥薑用火尉或貼獨蒜點艾干用艾灸或用神燈細細灸方見後附注要使內毒往外宣再飲除風化痰藥毒從外解古人傳試看一切真傷寒不透發汗致禍延可知陰寒就是大毒物幾個陰寒不解能命全外科內科都一樣內毒不透是禍端只説陰毒甚難治豈知肉肉桂附附子參黨參薑黑薑未牽連況且外科不講脈虛實寒熱盡茫然如何是氣滯如何是血頑內里五臟未分清外里五色未細研一付兩付不見效便將針刀透骨穿豈知瘡毒皆以膿漿解膿漿不足便不安一見針刀氣內散焉能𣩮膿往外傳不過稀漿與稀水再想聯口難又難不是疼來便是癢淹淹纏纏到九泉我見此症千千萬盡是外科送入鬼門關至於一切純陽症如今外科可稱仙解表解里甚分明一付兩付自周全此症不治亦不壞略加調理便如前治瘡先辨陰陽為主治瘡須先辨陰陽陰陽不辨空著忙陽症紅腫脈洪實芩黃芩連黃連知知母柏黃柏與大黃陰症頑麻脈沉澀蒼蒼朮麻麻黃歸當歸地熟地並黑薑更有半陰半陽症解表解里細推詳如依外科分經絡不辨陰陽總渺茫陽症用陰藥陰症用陽藥自是千古定理縱分經絡不論陰陽藥無當也或有瘡症在臟腑挪移四肢方為良上焦桂枝下牛膝中焦絲瓜引邊疆艾灸神燈皆善著不治紅腫與純陽先憂熱中後寒中總要陰陽二字細商量我初作此二篇意欲以治純陰之症也誰知純陰之症用藥甚精非但熱補可了也我之所言不過以治半陰之症則可耳細讀下篇自知其理始知劉青田為不可及也自記病有陰陽必分陰陽治之則病可痊瘡亦有陰陽若不辨陰陽概以清涼解毒之藥治之則陽明之毒自必愈矣而純陰之毒不已愈寒而結愈堅乎治瘡者要必讀此數篇而辨其陰陽也可侄金門謹志治瘡用藥真詮天下病症有萬端隨時轉變隨時傳傷寒瘟疫之類惟有疔瘡症不變初起皮色為可觀初起皮色如犯紅到底治法無變遷一定是陽初起皮色如犯白到底冶法無變遷一定是陰較之尋常一切症皎然不昧甚的端但是陽症人多知一有陰症便倒顛初起宜用奪命飲以後只用陽和單二方斟酌無參差一方動吃數十天奪命飲中二活羌活獨活兼青皮赤芍殭蠶連疼痛不止多細辛加上甘草便十全陽和湯中麻黃先炮薑肉桂大熟大熟地前此四味是陽和湯橘紅半夏與雲苓芥子甘草便十全二陳湯加入其中有了熟地肉桂好引火歸元甚娟娟有了熟地麻黃好散入肉裡甚便便炮薑用時必炒黑不炒黑時心內翻此症出來多陰虛鹿膠龜膠宜多添此症出來多隱疼山甲河車草河車此味是增宜多兼此症出來多脾酸脾寒也炮薑麻黃宜多餐此症出來多痰結橘橘紅苓雲苓半半夏芥芥子宜多煎此症出來多硬頑生南南星有用四兩者生半半夏宜多牽此症出來多滯濕甘遂大戟宜多安此症出來多膜白乾薑本是麻黃芥子宜多羼此症出來多正穴牛黃狗寶宜多研此症出來多管骨推車即蜣螂轉丸炒焦為末為末麝香填滲入穴里便有力一切爛肉他能宣再將輕粉和梅肉唾沫和藥不使明星在外邊搓成捻子插孔里遲之兩日管外鑽攝出管子臭膿出加上補藥漏能痊雖通脊漏亦能治更有鎖口圓圈色帶白皆因冷藥致迍邅宜用原寸滲瘡口蒙上溫膏自周全更有疼痛不止治不得必須關帝火針穿硫硫黃麝麝香硃砂合銀硃捲入細紙煉成丸疼痛不止用針挑貼上丸藥將火燃火一燃時便透毒永無疼痛作祟緣初得瘰癧宜此治一日兩針針兩回燒兩回針三天便能根柢悉拔出省了藥餌拜佛前亦有淹纏恆作癢羊矢揀實饒為丹輕者醋和重蜜和糊住癢處便能痊若是流水不能止滲上此藥亦能幹木是濕滯疼是寒一切麻症皆風傳青風海風石楠藤加入藥內把病完以後再講熬膏藥膏藥藥內桂肉桂為先宜多用赤芍大黃並生南生南星蔥須乾薑一概兼鳳仙蒼耳皆用科熬得好時將醋添醋能入骨攤貼瘡口加原麝俟他熟時竹刃穿一切毒藥皆不用附子猶恐外牽連用肉桂不用附子斑蟊蜈蚣與烏蛇全蠍紅娘巴豆捐此藥皆是治陽毒一入陰瘡便不安不論經絡與時令總以紫花地丁為引煎除了皮白皆是火紅黃紫黑皆是火症始用菊白菊葉英蒲公英紫花者佳二味之葉加白糖治火疔與澤蘭澤蘭葉梔子大黃多斟酌二味是僕所加防風蟬蛻與芩黃芩連黃連數味名澤蘭湯疔症有寒亦有火紅生於心黃生於膽紫生於肝黑生於腎色相兼藤黃萆麻熬膏藥飛龍奪命內里安酒引送下數色皆毒症非毒藥不能治此是另有所聞疔頭圓硬宜用針與死為鄰多出黏音年水使藥漫蟾酥烏金巴豆去皮炒黑研細備用皆善著內外加治得生還要之細論癰疽疔瘡理仍以陰陽二字為大關皮色紅腫出六腑色皮正白皮色不變也五臟含癰本六腑血壅住疽本五臟氣沮殘六腑血壅容易治五臟氣沮難周全臟為陰兮腑為陽陰陽二字莫荒唐那有陰陽俱宜藥惟有山甲與麝香縱是大補藥加上山甲亦光昌縱是大涼藥加上麝香亦吉祥二藥本是外科骨外科恃此為藥王我本不昧陰陽理曾將外科批一場誰知青田先生已批過用藥精細妙非常有人為我述一遍不得不將治瘡理銘之於錦囊治瘡須要顧脾胃凡病初得屬實屬火者居多久而不愈便虛寒矣凡病皆然而瘡尤其彰明較著者也自既破以後總以大補氣血為主縱有虛火假熱只可帶治大約與産後治法相類治病須要顧脾胃瘡症尤須兢兢持初起攻散無論矣以後血出謹防維滋味宜厚藥宜補風寒暑濕莫稽遲先憂熱中後寒中總以脾胃為根基瘡症堅硬宜用熱補透發方可收功有一童子甚剛強口長托腮硬非常妄請盲醫用刀針內裡實未𣩮膿漿割開鮮血往下流一寒一熱生禍殃我言此症宜熱補多用風藥使發揚發揚於外毒解散縱𣩮稠膿亦吉祥只用竹刃撥一撥不須利刃把肉傷蒙上溫膏自穩當何用飛龍奪命湯又有婦人頭項盡是瘡外不紅腫痛非常已吃多藥不見效盡是外科世書香看的皆是正宗書不知此症分陰陽但以經絡去調治愈吃名藥愈荒唐我用熱補帶透毒一切滯氣盡發揚外雖龐腫內安然連吃數付妙非常況且外科不講脈虛實寒熱只一望初起皮色又不變焉知此中真的當不過朦朧去治病恐是遇見老閻王我雖未見青田書已知青田之錦囊只要陰陽二字去揣摩不怕不得神奇方治腫硬疙瘩先以烏金膏蓋頂外用此藥箍之無不消散白礬二錢白占一錢蜜陀僧五錢赤金二十張冰片一錢有大功蒸酒和藥緊箍住疙瘩腫硬立時輕再加宮粉三錢亦可治腫硬外毒身起腫硬必有毒先進酩酼酒一壺蠍子二錢蜈蚣一錢研為末山甲一錢便不孤細細飲下立時愈勝似仙人用醍醐治前後照以治楊梅甚好一切餘毒不用説矣水銀三錢以唾沫研至無珠始能入煙銀硃一錢並黃丹一錢安息香三根和麝三分片五分煙旱煙六錢清晨漱口吸四袋大火一袋吸三四口連吃四天吐水黏音年晝里忌鹽七天正夜裡銜枚側身眠用箸一根銜口中兩頭用繩挂耳上夜睡使口常開則毒水流出不至咽下為害附注神燈照治頭上諸瘡頭上點艾怕火升神燈照法硃砂血竭明雄沒藥各三錢麝香五分共為細末用綿紙條裹藥三分香油浸點自外而內周圍照之毒氣隨藥解散自不內侵臟腑初用三條漸加至四五條瘡勢漸平又漸減之隨上烏金膏蓋以萬全膏若腫勢漫衍用蒸酒和蜜陀僧白礬之類箍之達天庭雖然塌陷能高聳縱使灰白亦活紅頭上頑麻若紫青神燈照法或不靈但團小艾如黍米燒來燒去火星星二法治瘡原通神神燈治漫腫艾灸治頑麻外科門中作二銘治瘡無頭漫腫無頭何處消先乾溼紙是頭腦用濕紙貼腫處先乾者即瘡頭附注此處便用烏金烏金膏貼上蓋瘡門太乙膏四旁跟腳須箍緊蜜陀僧和蒸酒調砭法頭上中空不便膿漫腫無頭甚可驚此處急須用砭法取細磁鋒用竹箸夾緊遍刺腫處使出紫血貼上精肉潤雞清以肥豬肉切片貼之再用乳香調雞蛋清潤之治渾身瘡爛流水日久不愈渾身瘡流龜板丸龜板為君沙土炒焦山甲殭蠶乳乳香沒沒藥含有膿有血加滑石硫黃土苓治之安間有加花粉者治久漏久痔諸症凡病久皆是虛寒不是六味地黃湯便是補中益氣湯或二者相兼而加減之此是萬古不易之法海底痔漏並脫肛加減地黃益氣湯亦有血虛火旺甚四物升麻真妙方外敷海浮海浮散方見後附注貼膏藥洗用忍忍冬菖菖蒲擦螺漿以冰片滲入活田螺靨中仰放盞內少頃水出取擦痔上其效如神補中益氣湯治一切氣虛下陷之症參黨參耆黃耆甘甘草術白朮當歸湯陳皮升升麻柴柴胡提氣良若非氣虛並下陷去盡升柴用原方婦人乳瘡治法婦人乳瘡忌陰寒內吹有孕時得者為內吹外吹小兒食乳時得者為外吹須分端外吹攻伐無不可內吹和血帶平肝通草青皮橘葉之類雖説和血帶平肝加上山甲方立痊加上山甲加風藥風藥駕馭胎自安風藥駕馭藥朝外走不向內蝕故不傷胎縱用膏藥宜溫和不似他處涼破兼治女乳男腎均宜溫補切戒清涼婦人最怕奶花瘡縱是紅腫非純陽況且潰爛口流水疼痛不止飯亦忘我用參黨參耆黃耆十數兩肉桂附子皆數錢兼之溫膏暖周詳主人日食那些藥一見此藥以為狂無奈已食多藥不見效不得不進此藥再商量只吃一付疼亦止連吃十付永無殃始知女子乳兮男子腎內治外治戒清涼又有男子腿長附骨瘡已經數月未下床骨瘦如柴熱不止潰爛流水飯亦忘我用參耆十數兩兼之肉附暖回陽連吃四付始見效又吃十付始平康主人初見不敢食多人慫恿始一嘗可知一切潰爛症無不以補為藥王況且脈細如麻披那有實火為禍殃疔瘡初起治法疔瘡初起類傷寒痛偏一處是真端敷瘡無如遠志肉遠志去心酒煮搗敷患處越宿自消隨飲銀花一兩甘草單若是疔毒形如疥或小泡堅硬如釘宜艾灸取艾加麝香木香明雄為團安蒜片上灸之烏金烏金膏擦頭膏藥漫內服甘甘草四錢菊花葉連根皆好湯一付即是神仙絶妙丹二症亦有挾風寒必先發表是真詮即吃衛生湯重用二活加蔥酒紅絲疔治法手足生疔並面唇多有紅絲入內侵挑破紅絲方無礙湯飲甘菊效如神手指腳指疔治法肢末生疔妄用藥不如艾灸為上著隨飲甘菊湯一付其人即便笑呵呵治蛇頭疔一則手指生疔甚是疼牙豬膽治最有名明雄白礬研為末連指帶藥入其中俟水乾枯便能愈若不全愈再一行如不在指在手端以此糊上亦能輕勝似仙人活命飲連吃數付不成功治疔毒黑紫疔毒紫黑症甚危萆麻藤黃膏立施內服護心湯一付方見後飛龍奪命緊追隨艾火灸法隔蒜灸法勝用刀惡毒最怕火來燒不論陰陰症皮不紅中間頑硬陽陽症皮紅皆灸透縱有頑硬亦能消雖然成膿無大苦黏上烏金即巴豆仁炒黑研細聽用上蓋膏餘毒不盡多爛肉防風湯洗防風白芷川芎當歸蔥白之類加豬蹄煎海浮調即乳香沒藥安箬皮上炙乾為末敷患處再貼膏藥説文楚謂竹皮曰箬去腐生新無過此外人何須口囂囂內服普濟消毒飲甘甘草桔桔梗升升麻柴柴胡並翹連翹蒡牛蒡子芩黃芩連黃連橘橘紅荷薄荷元參湯一切發頤瘡名看所加或用人參虛加人參或酒黃實加大黃護心丹井口疽生於心口宜多用他症恐毒入心亦用之毒大須服護心丹志肉遠志肉半兩辰砂二錢乳香一兩全緑豆粉子二兩和甘草五錢共為末每吃三錢病易痊衛生湯歌方見前惡毒疔瘡用山甲小毒數分便可殭蠶蟬蛻二活羌活獨活加乳乳香沒沒藥石決石決明以上皆二錢並沉香一錢蔥酒和入花二花又花花粉此方甚簡便初起無有不可憎寒多加發表藥疼痛多加乳沒藥大熱多加清涼藥疔瘡惡毒膏藥貼一切惡毒不用麵子藥一日一換便好疔瘡惡毒蜜陀僧四兩宮粉四兩輕粉四五錢赤金二十張精乳香沒藥各三錢黃蠟白蠟疊代興用黃者不用白用白者不用黃二者亦不須多艾葉頭髮女人發先炸枯俟油香油一斤冷定藥已成柳花散青黛蒲黃並黃柏各一兩炒硼砂五錢冰片五錢人中白一兩六味名為柳花散口舌諸症皆治得治疥瘡治疥無如麻黃膏雄豬油熬下斑蟊麻黃入油還濾淨大楓萆麻再同熬大楓子萆麻去殼搗如泥下鍋攪勻治乾疥水銀銀硃輕粉交土信斑蟊豬油雄豬板油包青石板上捶千下芥根一擦立時消有加大楓肉萆麻肉檳榔者治婦人陰癢法火硝土信生用蝕爛肉枯礬宮粉輕粉足陰戶痛癢無過此刀子刮後其皮皆強非用刀刮藥必不得力將藥覆如有蟲行在內里雞內金入與過宿雞內金帶肉囫圇一具錐子扎扎黏些雄黃白礬末納陰中蟲入雞內金亦隨而出矣再將火罐搬一搬縱有狐鬼亦清肅治跌打損傷以大便為憑皮破血出用十全用十全大補湯二便不通大黃添將大黃加入桃仁紅花澤蘭當歸丹皮赤芍之內水酒引下不必十全大補湯矣若只傷損二便通三七好酒送之痊一釐散治傷損不起最佳跌打損傷一釐散土鱉一個瓦上焙焦巴豆一個去殼半夏一個生用選乳香沒藥半各分自然銅火燒醋淬少許碾碎下酒真是罕共為細末每服一釐好酒送下真有奇驗七釐散治一切傷症孕婦忌服乳乳香沒沒藥血血蠍兒兒茶七釐散硃砂紅花雄黃選加上歸尾各一錢三分原麝三分片跌打損傷效如神孕婦忌服黃酒灌生肌散生肌散用軟石膏一兩炒乳乳香沒沒藥血竭各三錢黃丹五錢交白芷二錢半龍骨三錢煅和潮腦少許血止痛定立時消治肢體傷折法肢體將斷用莛薄秫莛子穿成薄乳乳香沒沒藥血血竭兒兒茶續斷和各二錢半共同麥粉二兩用囫圇塊翻𨫼炒醋和札緊自無訛翻𨫼炒黑為度再研為末熱醋和攤貼膠布札緊外用莛薄裹纏俟干以醋潤之自好燒靈藥方瘡不聯口非此不愈夜靜始燒忌婦人雞犬之聲瘡不聯口用靈藥火硝四兩水銀二兩二味多枯礬硃砂各五錢輕粉二錢黃丹三錢百草百草霜三錢撮新碗蓋鍋鹽泥封用紙蓋碗上附注候鍋不響始大火先文後武香一炷碗上紙焦為度珍珠三顆放鐵勺內用酒鍾蓋佳炎煅碎附注冰片五分另對磨取碗上霜入珍珠冰片共研極細貯磁瓶內黃蠟封口匆令泄氣附注邪祟中人男女有分邪祟中人無他訣只因人情未清徹人心一動他已知每乘淫機暗交接交接久了下焦寒滿腹壘塊塞洞穴每於診脈時恍若先報説心中忽戰戰脈上似鼠掣亦有抱持中指毫不動坐得久時間一泄或如蛇吐信或如電明滅此皆女子之祟脈每從上焦決若是男子真中邪必於下焦見清切夢中若有美人來一相交時精便泄心中猶自甚愛惜便將十指玉莖攝多少敗精留此間不是淋閉便尿血時候久了結疙瘩相火下注似車轍如此説來人盡邪恐於名教有不潔不知世際叔季人澆漓幾個男女似霜雪但看關帝斬貂蟬史官曾有説武穆拒名妹精忠不敢滅此皆人家奇男子始能塵世稱妙絶又有近鄰貞烈婦已入貞祠無異説每與近鄰言未嘗勸守節有一孀婦問來歷他便摟腿教伊閲每到人情不自由便將肉腿刺寒鐵此是真正上品人始肯真情來吐説可知人非土木孰無情只要學個魯男亦奇絶守住父母遺體身上玉便是人間大豪傑我今齋戒已七十始知神仙如霜雪若是混俗與和光安保終身無二節今日謹告小後生能學聖人立身好不然即學魯家奇男亦是説治邪以針為先如今世道盡翻著病症亦是怪症多試看世上淹纏症那有一個無妖魔怪症端是婦人多婦人裝扮似妖魔妖魔自有妖魔纏那有一個得清楚真是怪症莫用藥縱有名醫填溪壑藥味盡被鬼盜去那有一個得安藥欲用名藥宜用針針為治邪不二門先用琥珀琥珀散壓一壓使他無處去翻身金針一到再用藥這回定得藥中神真是邪症宜導痰皂角枯礬共為丸面上若見癡呆象即吃此丸最為先真是怪症宜安神金石為末細細斟避陽砂合自然銅琥珀散有此二味正是此症定南針真是邪症宜利竅一切通利最為妙牛黃金丹二將軍長長服之通仙道日食一分紅糖為引用針先針虎口穴虎口上與骨相接欲要下針先使嗽嗽聲未了針已透針若透時只一分便有酸意往上侵若不上侵針上提雖然提針不離皮掐住此地莫放鬆一若放鬆他便驚左轉右轉針不停針頭似有鬼來擰或有膠膘針上纏定是此物受艱難此針下去定見效那有盲醫得知到猶憶端陽馬真人留下神針甚是妙針了虎口針曲尺曲尺一穴只透肌針了曲尺針膀弦膀弦內外細細研掐住膀弦有疙瘩即將金針向里札向里札時似鞋底用盡氣力方能已三針五針針莫拔針只一分按住針頭貼皮掐掐住疙瘩使松和方可他處挪一挪針了膀弦針肩窩肩窩恆藏老妖魔掐住此地痛而酸內針外針相接連若是不酸方鬆手大腿根子搜一搜若是婦人與他丈夫明言使他如此用針亦可立拔此病大腿根子性命關陰邪多伏兩腎邊一寒一熱從此處多少人命盡喪此伸手掐住有疙瘩用盡氣力莫放他貼住指甲向里札任憑叫娘與叫達俟那疙瘩稍松和方可金針往下擱一身精氣聚眼窩此中更藏老妖魔閉住一身氣不通其人顛倒胡亂行趁他顛倒胡亂行知在此地逞英雄伸手掐住莫放鬆這回定要他的命安排左右莫妄動頃刻之時一天雲霧散個淨以外用針針尚多全在因人去揣摩亦有陷入內里無捉摸非用熏法無奈何若不教熏用藥酒飲醉再熏出皮窩火針一到鬼無魂這回定要斬妖魔琥珀散琥珀一兩避陽砂一兩自然銅一兩礞石一兩乾葛一兩良薑四錢宿砂一錢肉桂一錢共為細末每用三錢紅糖為引熱水送下熏法牙皂一錢麝香一分阿魏牡蠣巴豆鬼箭各一錢共為末捲入疊表之中點著吹滅以煙燻鼻鬼不能安必在藏皮內以火針針之鬼即死矣制火針法用棉花絨捻在針上蘸油點著去針外之火便成火針矣製藥酒法當歸二錢川芎三錢細辛一錢白附子一錢原寸一釐蒸酒熬好飲醉再用熏法針法邪症宜散風清火邪症皆因肝腎結滯風火上壅痰迷心竅而然治以散風清火為主兼之大瀉肝腎實熱無不愈者間有入內已深熏法針法亦不可廢邪症皆因肝腎結肝腎一結便發熱時候久了風火起駕馭痰涎塞孔穴或男或女皆一樣不是結氣便結血或先頭上懵或先心中咄或先胃裡疼或先喉中噎或是數症一齊見或是暗裡把魂攝夜裡多驚恐晝里時寒熱姦鬼淫狐夢裡來顛三倒四不能説磨光先生治不得送祟端工無能折其實除風降火為上著大破肝腎立時雪痰涎瀉淨便無病一天雲霧盡澄徹我嘗治此不哄人必持此法為妙訣間有入內無奈何熏法針法不可缺治邪症以導痰為主有一邪症數十天一日請我把病看及至彼處始知得我言此症針為先他言用人尚未備不如少待齊上前須臾時節邪已知聞説是我亂顫顫過了一時有主意即請與我相對談聲言先生治病全仗針針法與我不相關如果用針不見效恐怕先生有厚顏果然用針若不知不得不用導法以了緣誰知導法用下甚是捷須臾之時見青天一噦噦了兩三碗盡是膠鰾老黏痰噦出痰涎心寬綽縱此再無鬼來纏可知怪症皆從痰上起素問言之仙乎仙
  hash: sha256:5fae668f472af9e8d7718a7039038ce6573153a81d319a632d9297af4d745d72
  markers:
  - {type: 'tls:head', offset: 0, content: '', id: KR3eq093_jc_004-d10.h1s1}
  - {type: 'tls:div-start', offset: 2, content: '', id: KR3eq093_jc_004-d10d2, level: 2, head_text: 婦人之病多於男子}
