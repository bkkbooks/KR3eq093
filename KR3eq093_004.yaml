body:
  text: 卷四婦人之病多於男子吾言上焦之病多是火婦人更比男子多男子在外多自適婦人在內受折磨自不安命多怨人致生上焦諸病疴況有寡婦妾婦之不同終年抑鬱更是多邪鬼淫狐乘此入不知不覺渡銀河渡得銀河生壘塊諺云鬼胎胸膈不利有麼魔竄入上焦皆是火實因腎寒暗起波腎經寒真火不居其位邪人得以妄動亦有少婦少男恣淫褻下焦陰寒真氣缺虛火上衝生喉癰頃刻之時把命折初得之時宜嚼桂引火歸元便洞徹亦有寒間上下壅湯水不下藥不容只用巴霜郁鬱金砂硃砂丸咽入胸膈氣便通若要此症永不犯金匱腎氣腎氣丸樂融融肉肉桂附附子八味亦通神直拔病根何處容尋究根源皆因腎之精與心牽連上下通上下通時便無病上下不通百病生其初皆因腎經寒真火不安其位虛火得以妄動虛火無根往上衝有用連桂暗交接肉桂黃連能交心腎於頃刻雜入群藥妙化工可知世上厄逆貫當胸皆因此處無是公可知世上癥瘕經不調皆因此處無根苗可知世上虛癆與遺精皆因此處無真蹤這些病皆因心腎不交今人但治上焦火不通腎元總無功因悟嘗治少婦氣上壅喉間塞綿難為情六脈沉遲不見火惟有中指中節時一沖即用清揚清上火清揚之藥上走頭目少加肉肉桂附附子往下通多少名醫不能療惟用此劑始收功又嘗治一少年脈類此亦用此藥上下通上下通時便無病何用攻打胡亂行又有少婦少男啞喉嚨又多清火把命傾若能時時溫下焦量加發散便有功又嘗治一中年腎不交通宵不寐數十朝只用清空十數兩酒芍多加把肝調平肝以安土中焦便無阻滯肉肉桂附附子雖少亦將軍暗把真陽海底招雖未深明大易理實合陰陽交姤那一爻可知諸病皆因氣不通治得上下有神功吾嘗治病治上下上下一貫妙無窮試觀世上修煉用醍醐閉任任脈開督督脈有工夫督脈一開上下轉好似人間大轆轤治病若能用此法雖入死地病猶蘇治病男女皆同只有胎前産後之分治病男女一樣同氣血二字要分清男子若害血分症調劑血分與女同女子若害氣分症調劑氣分與男同惟有胎前與産後較之男子倍兢兢胎前雖有攻伐藥保胎時時在意中産後雖加大補藥惡露總要細細通所以桃仁與紅花付付用之恆有功亦有不用桃仁紅花者不過十中之一耳我嘗作有産後詩不妨間時誦一通多少雜症從此出以治男兒妙化工婦人之病皆由左尺凝滯女人之病皆在肝氣血往來出此間其實皆從左尺起男女交接是病源此中之脈左腎之脈通心胞一切之病固受寒受了陰寒便凝滯相火即速往上竄其根是寒見症皆火下焦愈寒愈結實上焦愈竄愈不安頭懵頭暈從此起心疼心顫從此兼初時心脈如扁豆結久便成小皮錢見了此症即破心非破火不下鬱金菖蒲與酒連凌花凌霄花茜草一齊用桃仁紅花青皮宣肉桂川膝牛膝少用些歸當歸地地黃芎川芎芍白芍恆帶餐況是女子氣不息每多借此竄肺間喉疼胸滿不能食右寸脈實是病端諸如火症從上見其實皆因左尺受陰寒我治此症千千萬清涼上焦暖命元前胡枳實帶治氣總於左尺細鑽研鑽透左尺便無病金丹暗暗作鋒前男子虛癆多似此亦因交接受陰寒男子破藥差少治法恆與女相類此真人命之大關關頭出入要謹慎一不謹慎是禍端多少人命盡喪此何不清淨作神仙清心寡欲便無此病矣痰滯胸膈便不生育人生知他生嗄病縱有神仙亦難定有一壯婦二十餘不生不育把命聽意必癥瘕滯經羅閉著子宮作蹭蹬誰知寸關二部膠似錢好如米飯糊個淨下部脈和若常人兩個手脖盡腫硬知是痰氣寒滿胸即將杏仁芥子蒼蒼朮半半夏用葶藶射干清肺熱桔梗蔞霜前胡並六一牛黃二散並用亦當家川貝川朴先導送導出痰涎進金丹和入湯藥清剩只服兩付便能愈後再調經把子種經脈之病皆從肝經起而調經之法不專在此也人言調經只在肝何必六經共周旋或補氣而溫肝或破氣而行肝豈知一經有病經經病那有一經不牽連如果此病滯在表便可傷寒一樣看如果此病滯在裡便可雜症一樣看必須上下常周流必須表裡盡貫穿方能運轉大周天始得此病皆安然不然舍了六經全不治即此一經亦難痊不觀世上用坐藥不知多少上賊船不觀世上用打藥不知多少入陰間只知泥住一經治豈知這經也從那經宣不能六經皆治著焉能穩坐釣魚船試再放眼一去觀那有一病無牽連今有咳嗽者豈能泥住肺經看今有吐血者豈能泥住心經看今有遺泄者豈可泥住腎經看泥住一經去調理六經必有所不安六經有不安即此一經亦難痊凡是治病者必須細細參那有不可作對觀任是百樣病皆要運轉大周天今之懸壺者往往分門別戶往下傳皆因脈理不精通只知泥住治一邊豈知寒熱虛實皆有脈溫涼補瀉各有單只要指下一著實何往不可運轉大周天看似偏住治一邊不過以此為主權那有一經治不到那有一經不周旋吾今得為後學言以見治病有真詮如但泥住治一邊何不海上問張騫銀河上下常周轉亦是教人運周天胎病交加只要治病不必安胎病去胎自安耳胎病交加甚是難即老名醫亦難參如果有病速治病按病下藥無弊端大病生死在眼前病若能去胎自安我嘗治一少婦病骨瘦如柴飯亦難已經數醫不能療即加大破將病捐吃至兩付能飲食寒熱往來漸漸蠲伊家貧甚難用藥即服加料紫金丹皆是破藥兼有巴豆朝食一分暮一分服至月餘病皆痊病到痊時藥即止未至兩月即分娩生下一兒甚健旺於今已有四五年又遇孕婦本是火盲醫只顧補腎元補至三付噫不止茶水不進甚是難我用六一六一散牛黃散二散並用以牛黃散中有巴豆霜也飲至一付便回旋旋至糞門腹甚疼即往廁上跕缸邊衣帶褲子甫解畢好似急流井湧泉一竄竄有一丈餘臭水下盡便安然其夫為我言甚明我言眠食如故胎自安有故無殞本素問只要眼明手快急上前去了病時藥即止即此便是安胎元何必更讀産前賦何必更用益母丸巴豆傷胎之要藥我嘗用之以安胎非能安胎也只要病愈即止耳事到無可奈何之時有不得不然者治孕婦前後不同孕婦有病治最難一身精氣注胎間胎間一注身便懶淹淹纏纏似受寒皮毛淅淅生暗冷筋骨憔悴時含酸雖然做活沒有力一見茶飯便不歡心之所愛食不足心之所惡只貪眠一診左尺血旺甚似乎凝滯結腹間若要治此症活血為最先羌羌活芥荊芥辛細辛芷白芷宜多用調理肝氣是正端加上宿砂與蔻仁內里溫暖外皮宣此是三月正治法如過百日便不然過了百日能運轉往往有火致不安稍有凝滯便煩躁稍有錯落痛不堪黃芩梔子並白芍陳皮焦術養胎元真有大火亦用瀉瀉了濕熱病自安善能自保即保胎一切薑芥宜少餐不宜過勞與過逸涼血順氣為大關果能胎教如周王便是女中自在仙孕婦脈結下部為憑婦人懷孕知最難多少名醫費周旋有言肝經和緩便有孕有言尺部動數是真端有言婦人氣粗為憑據有言觀骨色嫩為正詮雖然所説各有理全無定見在眼前我説胎是一圍真氣血必將重墜往下傳墜入尺部結疙瘩便是胎孕真的端有言左邊是閨女有言右邊是孩男我説男女皆是血成就必於左尺細細研但是下焦火甚亦如此還要諸説參一參孕婦禁忌有宜遵者有不宜遵者婦人受孕血必凝血既凝兮氣不行氣不行兮風上湧風上湧兮火縱橫但看左尺生疙瘩兩顴骨上微帶紅即是産前風露頭不用涼破必不中乘此氣血正旺時須要放開大眼睛切莫效那噢咻小先生守住禁忌嚇主翁如果按脈去調理那有病症不可通病若通時藥即止反與補益大有功有故無殞本素問豈可一味去牢籠我願診脈治病者先須目下決死生如果氣血無可為不妨妊娠歌一通治孕婦不必多忌諱病初起氣血正旺如此治一藥可愈若遲久亦不可用我治孕婦年二三不飲不食但欲眠我一診脈脈不動只有中氣上頭顛知是風寒緊束住大用風藥蒼朮麻黃羌活獨活之類加金丹內有傷胎藥乾薑附子亦透發全不照顧養胎元一付兩付病即愈病一愈時胎自安又嘗治些吐血症只看得時真病根或用解表或攻裡抉住根子把病剜若是用藥多忌諱再吃多藥亦不占何用乘此氣血正旺時當頭一棒便回旋如此孕症與血症是醫皆知病淹纏若果起初如此治何至病久不能安産前風症甚多治法以此為例産前不安多是風渾身痠懶渾身疼上下盡是濕寒水那有一時得春容必須伏虎丹透發必須琥琅散方見後邪祟門沖融風藥一齊湧上前不得大汗總不中雖説此藥似傷胎伏虎丹中有蠍子蜈蚣之類琥珀散中有良薑乾葛之類風藥駕馭俱凌空風藥駕馭則毒從外解力不內攻吾治産前一切症往往用此法況有術白朮苓茯苓香香附砂砂仁相保護況有椒川椒茴小茴故紙交和衷縱有藥不平得此亦安寧大大罐子得一個搬住風頭使下行一切風氣盡下來那有外至風不松此風內生者多外至者少人説此病不易治依吾此方立時輕伏虎丹方伏虎丹即紫金丹去了巴霜帶理肝一切凝胸不易治浮雲一掃見青天治産前風一則並寒痰墜胎一則産前風症氣頂心艾葉一團值千金三兩用醋炒再將黃芩炒焦黑引入血分妙入神更有産前欲墮胎不禁皆因寒痰胞內侵必欲生耆加官桂蒲黃靈脂此味炒用即回春産前風治法産前風症多是熱不是結氣便結血氣一結住不流通血一結住便橫決大搐大顫無奈何翻三倒四痛欲絶我用湯藥他難食只用丸散一付截即用金石一兩餘自然銅避陽砂青礞石之類三味能涼血下氣且是金能剋木之意和入紅糖使立啜再飲蔥湯一大碗汗出如雨甚尉貼我嘗用此治怪症不料治此甚合節有用二芍赤芍白芍與生地醋軍柴胡使涼血有用火罐搬玉門立拔內風使外撤雖皆治風甚有理不及此方為妙訣我故録之以示人好如紅爐一點雪催生用發散是創格臨時治病恰相合無不應手立時瘥有一産婦將産時大搐大顫無奈何只因前年如此致橫生請我立時去下藥我一診脈是風寒二關如錢滯經絡即用荊荊芥防防風蒼蒼朮麻麻黃去解表益母獨活芎川芎歸當歸多吃下病止即生兒並無一味異樣藥他教我打我不打診脈解表是正著隆冬産生大宜發散婦人産生甚是難隆冬皆因受風寒受了風寒氣上窒氣上壅兮血不宣不是大搐便大顫母子二人俱不安筋亦往上就脈亦往上牽風寒拘束甚窄狹那有餘力顛倒顛不是橫生便倒産一失機宜難又難吾嘗隆冬治一人一經發散便安然又遲數日治一人一用發散便生還可知治病須要順時令隆冬發散最為先治病順時令百病皆然隆冬宜發散盛夏宜清散蓋可知之矣豈可泥住佛手散而忘發散之大端産後見飯煩惱宜用熱補虛弱人惱食皆宜如此治産後滿月數十天別無他病之可言一見飯食別煩惱時時噦噫不能捐我一診脈是濕寒已竟作熱應指邊但是假熱不必治只用熱補暖命元蒼朮宿砂去利氣二陳故紙一齊添且加白朮去健脾肉肉桂附附子薑黑薑萸吳萸緊接連因他産後尚未遠且是氣色未澄鮮一切涼藥概不用全憑熱補為主權産婦氣色宜慘淡産婦氣色宜慘淡方是産婦本來面有一産婦十餘日氣色如故色光粲即此而觀便是實症證見顴骨不紅唇不紫已吃數藥效不見我一診脈無大滯只是寒熱不能飯我問惡露有也無他言數日已曾斷即用生化生化湯方見後重桃仁明日仍然病不散更加桃仁一兩餘始克安眠達晚旦可知産後惡露最當家縱是強壯色必變我治此病只