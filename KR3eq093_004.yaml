  - {type: 'tls:head', offset: 5041, content: '', id: KR3eq093_jc_004-d10.d25.h1s1}
  - {type: 'tls:div-end', offset: 5145, content: '', id: KR3eq093_jc_004-d10d25}
  - {type: 'tls:div-start', offset: 5145, content: '', id: KR3eq093_jc_004-d10d26, level: 2, head_text: 三急三沖證見三急是虛中不足三沖是虛中有餘}
  - {type: 'tls:head', offset: 5145, content: '', id: KR3eq093_jc_004-d10.d26.h1s1}
  - {type: 'tls:div-end', offset: 5331, content: '', id: KR3eq093_jc_004-d10d26}
  - {type: 'tls:div-start', offset: 5331, content: '', id: KR3eq093_jc_004-d10d27, level: 2, head_text: 產後小腹疼六脈強硬沉取則無此虛中寒也宜補氣養血溫中}
  - {type: 'tls:head', offset: 5331, content: '', id: KR3eq093_jc_004-d10.d27.h1s1}
  - {type: 'tls:div-end', offset: 5411, content: '', id: KR3eq093_jc_004-d10d27}
  - {type: 'tls:div-start', offset: 5411, content: '', id: KR3eq093_jc_004-d10d28, level: 2, head_text: 產後溏泄宜補氣澀腸}
  - {type: 'tls:head', offset: 5411, content: '', id: KR3eq093_jc_004-d10.d28.h1s1}
  - {type: 'tls:div-end', offset: 5467, content: '', id: KR3eq093_jc_004-d10d28}
  - {type: 'tls:div-start', offset: 5467, content: '', id: KR3eq093_jc_004-d10d29, level: 2, head_text: 產後去血過多內外大熱外症色白宜補血生水以制火}
  - {type: 'tls:head', offset: 5467, content: '', id: KR3eq093_jc_004-d10.d29.h1s1}
  - {type: 'tls:div-end', offset: 5526, content: '', id: KR3eq093_jc_004-d10d29}
  - {type: 'tls:div-start', offset: 5526, content: '', id: KR3eq093_jc_004-d10d30, level: 2, head_text: 產後口吐清水腹內疼痛宜補氣溫中兼調氣}
  - {type: 'tls:head', offset: 5526, content: '', id: KR3eq093_jc_004-d10.d30.h1s1}
  - {type: 'tls:div-end', offset: 5587, content: '', id: KR3eq093_jc_004-d10d30}
  - {type: 'tls:div-start', offset: 5587, content: '', id: KR3eq093_jc_004-d10d31, level: 2, head_text: 脫花煎治胞衣來遲}
  - {type: 'tls:head', offset: 5587, content: '', id: KR3eq093_jc_004-d10.d31.h1s1}
  - {type: 'tls:div-end', offset: 5629, content: '', id: KR3eq093_jc_004-d10d31}
  - {type: 'tls:div-start', offset: 5629, content: '', id: KR3eq093_jc_004-d10d32, level: 2, head_text: 生化湯能去舊生新誠產後要藥}
  - {type: 'tls:head', offset: 5629, content: '', id: KR3eq093_jc_004-d10.d32.h1s1}
  - {type: 'tls:div-end', offset: 5682, content: '', id: KR3eq093_jc_004-d10d32}
  - {type: 'tls:div-start', offset: 5682, content: '', id: KR3eq093_jc_004-d10d33, level: 2, head_text: 加味芎歸湯善能催生兼治產後諸症}
  - {type: 'tls:head', offset: 5682, content: '', id: KR3eq093_jc_004-d10.d33.h1s1}
  - {type: 'tls:div-end', offset: 5732, content: '', id: KR3eq093_jc_004-d10d33}
  - {type: 'tls:div-start', offset: 5732, content: '', id: KR3eq093_jc_004-d10d34, level: 2, head_text: 產後宜忌}
  - {type: 'tls:head', offset: 5732, content: '', id: KR3eq093_jc_004-d10.d34.h1s1}
  - {type: 'tls:div-end', offset: 5787, content: '', id: KR3eq093_jc_004-d10d34}
  - {type: 'tls:div-start', offset: 5787, content: '', id: KR3eq093_jc_004-d10d35, level: 2, head_text: 加味四物湯}
  - {type: 'tls:head', offset: 5787, content: '', id: KR3eq093_jc_004-d10.d35.h1s1}
  - {type: 'tls:div-end', offset: 5849, content: '', id: KR3eq093_jc_004-d10d35}
  - {type: 'tls:div-start', offset: 5849, content: '', id: KR3eq093_jc_004-d10d36, level: 2, head_text: 加味四君子湯治產後傷食外症脹悶}
  - {type: 'tls:head', offset: 5849, content: '', id: KR3eq093_jc_004-d10.d36.h1s1}
  - {type: 'tls:div-end', offset: 5904, content: '', id: KR3eq093_jc_004-d10d36}
  - {type: 'tls:div-start', offset: 5904, content: '', id: KR3eq093_jc_004-d10d37, level: 2, head_text: 血虛者益其氣}
  - {type: 'tls:head', offset: 5904, content: '', id: KR3eq093_jc_004-d10.d37.h1s1}
  - {type: 'tls:div-end', offset: 5948, content: '', id: KR3eq093_jc_004-d10d37}
  - {type: 'tls:div-start', offset: 5948, content: '', id: KR3eq093_jc_004-d10d38, level: 2, head_text: 產後諸症只以治產後為主}
  - {type: 'tls:head', offset: 5948, content: '', id: KR3eq093_jc_004-d10.d38.h1s1}
  - {type: 'tls:div-end', offset: 6068, content: '', id: KR3eq093_jc_004-d10d38}
  - {type: 'tls:div-start', offset: 6068, content: '', id: KR3eq093_jc_004-d10d39, level: 2, head_text: 產後脈與尋常不同}
  - {type: 'tls:head', offset: 6068, content: '', id: KR3eq093_jc_004-d10.d39.h1s1}
  - {type: 'tls:div-end', offset: 6163, content: '', id: KR3eq093_jc_004-d10d39}
  - {type: 'tls:div-start', offset: 6163, content: '', id: KR3eq093_jc_004-d10d40, level: 2, head_text: 月間疾宜從月內治滿了月便宜用丸藥莫用湯俟他壯實一藥而愈}
  - {type: 'tls:head', offset: 6163, content: '', id: KR3eq093_jc_004-d10.d40.h1s1}
  - {type: 'tls:div-end', offset: 6513, content: '', id: KR3eq093_jc_004-d10d40}
  - {type: 'tls:div-start', offset: 6513, content: '', id: KR3eq093_jc_004-d10d41, level: 2, head_text: 治濕寒作熱雜疾}
  - {type: 'tls:head', offset: 6513, content: '', id: KR3eq093_jc_004-d10.d41.h1s1}
  - {type: 'tls:div-end', offset: 7049, content: '', id: KR3eq093_jc_004-d10d41}
  - {type: 'tls:div-start', offset: 7049, content: '', id: KR3eq093_jc_004-d10d42, level: 2, head_text: 噙化丸治咽喉干疼}
  - {type: 'tls:head', offset: 7049, content: '', id: KR3eq093_jc_004-d10.d42.h1s1}
  - {type: 'tls:div-end', offset: 7116, content: '', id: KR3eq093_jc_004-d10d42}
  - {type: 'tls:div-start', offset: 7116, content: '', id: KR3eq093_jc_004-d10d43, level: 2, head_text: 馬前服壯丸方}
  - {type: 'tls:head', offset: 7116, content: '', id: KR3eq093_jc_004-d10.d43.h1s1}
  - {type: 'tls:div-end', offset: 7151, content: '', id: KR3eq093_jc_004-d10d43}
  - {type: 'tls:div-start', offset: 7151, content: '', id: KR3eq093_jc_004-d10d44, level: 2, head_text: 婦人帶症難治}
  - {type: 'tls:head', offset: 7151, content: '', id: KR3eq093_jc_004-d10.d44.h1s1}
  - {type: 'tls:div-end', offset: 7319, content: '', id: KR3eq093_jc_004-d10d44}
  - {type: 'tls:div-start', offset: 7319, content: '', id: KR3eq093_jc_004-d10d45, level: 2, head_text: 少婦寡婦經滯宜細治}
  - {type: 'tls:head', offset: 7319, content: '', id: KR3eq093_jc_004-d10.d45.h1s1}
  - {type: 'tls:div-end', offset: 7417, content: '', id: KR3eq093_jc_004-d10d45}
  - {type: 'tls:div-start', offset: 7417, content: '', id: KR3eq093_jc_004-d10d46, level: 2, head_text: 崩漏脫血宜大用黨參黃耆以治之}
  - {type: 'tls:head', offset: 7417, content: '', id: KR3eq093_jc_004-d10.d46.h1s1}
  - {type: 'tls:div-end', offset: 7724, content: '', id: KR3eq093_jc_004-d10d46}
  - {type: 'tls:div-start', offset: 7724, content: '', id: KR3eq093_jc_004-d10d47, level: 2, head_text: 診小兒脈與大人同}
  - {type: 'tls:head', offset: 7724, content: '', id: KR3eq093_jc_004-d10.d47.h1s1}
  - {type: 'tls:div-end', offset: 7974, content: '', id: KR3eq093_jc_004-d10d47}
  - {type: 'tls:div-start', offset: 7974, content: '', id: KR3eq093_jc_004-d10d48, level: 2, head_text: 治嬰童診脈下藥歌}
  - {type: 'tls:head', offset: 7974, content: '', id: KR3eq093_jc_004-d10.d48.h1s1}
  - {type: 'tls:div-end', offset: 8275, content: '', id: KR3eq093_jc_004-d10d48}
  - {type: 'tls:div-start', offset: 8275, content: '', id: KR3eq093_jc_004-d10d49, level: 2, head_text: 牛黃散方}
  - {type: 'tls:head', offset: 8275, content: '', id: KR3eq093_jc_004-d10.d49.h1s1}
  - {type: 'tls:div-end', offset: 8352, content: '', id: KR3eq093_jc_004-d10d49}
  - {type: 'tls:div-start', offset: 8352, content: '', id: KR3eq093_jc_004-d10d50, level: 2, head_text: 紫金丹方}
  - {type: 'tls:head', offset: 8352, content: '', id: KR3eq093_jc_004-d10.d50.h1s1}
  - {type: 'tls:div-end', offset: 8419, content: '', id: KR3eq093_jc_004-d10d50}
  - {type: 'tls:div-start', offset: 8419, content: '', id: KR3eq093_jc_004-d10d51, level: 2, head_text: 用金丹以埋伏為妙著牛黃散以此為例}
  - {type: 'tls:head', offset: 8419, content: '', id: KR3eq093_jc_004-d10.d51.h1s1}
  - {type: 'tls:div-end', offset: 8611, content: '', id: KR3eq093_jc_004-d10d51}
  - {type: 'tls:div-start', offset: 8611, content: '', id: KR3eq093_jc_004-d10d52, level: 2, head_text: 小兒風症最多}
  - {type: 'tls:head', offset: 8611, content: '', id: KR3eq093_jc_004-d10.d52.h1s1}
  - {type: 'tls:div-end', offset: 8802, content: '', id: KR3eq093_jc_004-d10d52}
  - {type: 'tls:div-start', offset: 8802, content: '', id: KR3eq093_jc_004-d10d53, level: 2, head_text: 小兒風症有不可治者}
  - {type: 'tls:head', offset: 8802, content: '', id: KR3eq093_jc_004-d10.d53.h1s1}
  - {type: 'tls:div-end', offset: 8853, content: '', id: KR3eq093_jc_004-d10d53}
  - {type: 'tls:div-start', offset: 8853, content: '', id: KR3eq093_jc_004-d10d54, level: 2, head_text: 小兒風火症以牛黃散為主藥}
  - {type: 'tls:head', offset: 8853, content: '', id: KR3eq093_jc_004-d10.d54.h1s1}
  - {type: 'tls:div-end', offset: 8992, content: '', id: KR3eq093_jc_004-d10d54}
  - {type: 'tls:div-start', offset: 8992, content: '', id: KR3eq093_jc_004-d10d55, level: 2, head_text: 小兒月內風皆不治}
  - {type: 'tls:head', offset: 8992, content: '', id: KR3eq093_jc_004-d10.d55.h1s1}
  - {type: 'tls:div-end', offset: 9120, content: '', id: KR3eq093_jc_004-d10d55}
  - {type: 'tls:div-start', offset: 9120, content: '', id: KR3eq093_jc_004-d10d56, level: 2, head_text: 附錄治撮口風方此方甚佳吾初未見此方}
  - {type: 'tls:head', offset: 9120, content: '', id: KR3eq093_jc_004-d10.d56.h1s1}
  - {type: 'tls:div-end', offset: 9174, content: '', id: KR3eq093_jc_004-d10d56}
  - {type: 'tls:div-start', offset: 9174, content: '', id: KR3eq093_jc_004-d10d57, level: 2, head_text: 治小兒羊羔風並大人痰厥}
  - {type: 'tls:head', offset: 9174, content: '', id: KR3eq093_jc_004-d10.d57.h1s1}
  - {type: 'tls:div-end', offset: 9337, content: '', id: KR3eq093_jc_004-d10d57}
  - {type: 'tls:div-start', offset: 9337, content: '', id: KR3eq093_jc_004-d10d58, level: 2, head_text: 小兒一切風火症皆以平肝為先}
  - {type: 'tls:head', offset: 9337, content: '', id: KR3eq093_jc_004-d10.d58.h1s1}
  - {type: 'tls:div-end', offset: 9573, content: '', id: KR3eq093_jc_004-d10d58}
  - {type: 'tls:div-start', offset: 9573, content: '', id: KR3eq093_jc_004-d10d59, level: 2, head_text: 童子肝腎受寒}
  - {type: 'tls:head', offset: 9573, content: '', id: KR3eq093_jc_004-d10.d59.h1s1}
  - {type: 'tls:div-end', offset: 9631, content: '', id: KR3eq093_jc_004-d10d59}
  - {type: 'tls:div-start', offset: 9631, content: '', id: KR3eq093_jc_004-d10d60, level: 2, head_text: 小兒肝經受寒多瀉綠水}
  - {type: 'tls:head', offset: 9631, content: '', id: KR3eq093_jc_004-d10.d60.h1s1}
  - {type: 'tls:div-end', offset: 9705, content: '', id: KR3eq093_jc_004-d10d60}
  - {type: 'tls:div-start', offset: 9705, content: '', id: KR3eq093_jc_004-d10d61, level: 2, head_text: 小兒剝腸瀉大宜通利}
  - {type: 'tls:head', offset: 9705, content: '', id: KR3eq093_jc_004-d10.d61.h1s1}
  - {type: 'tls:div-end', offset: 9792, content: '', id: KR3eq093_jc_004-d10d61}
  - {type: 'tls:div-start', offset: 9792, content: '', id: KR3eq093_jc_004-d10d62, level: 2, head_text: 小兒濕寒作熱以尿罐上霜為上藥}
  - {type: 'tls:head', offset: 9792, content: '', id: KR3eq093_jc_004-d10.d62.h1s1}
  - {type: 'tls:div-end', offset: 10012, content: '', id: KR3eq093_jc_004-d10d62}
  - {type: 'tls:div-start', offset: 10012, content: '', id: KR3eq093_jc_004-d10d63, level: 2, head_text: 小兒寒熱噦瀉與大人同治}
  - {type: 'tls:head', offset: 10012, content: '', id: KR3eq093_jc_004-d10.d63.h1s1}
  - {type: 'tls:div-end', offset: 10295, content: '', id: KR3eq093_jc_004-d10d63}
  - {type: 'tls:div-start', offset: 10295, content: '', id: KR3eq093_jc_004-d10d64, level: 2, head_text: 小兒痞塊難治}
  - {type: 'tls:head', offset: 10295, content: '', id: KR3eq093_jc_004-d10.d64.h1s1}
  - {type: 'tls:div-end', offset: 10530, content: '', id: KR3eq093_jc_004-d10d64}
  - {type: 'tls:div-start', offset: 10530, content: '', id: KR3eq093_jc_004-d10d65, level: 2, head_text: 小兒痞積宜用吃饃藥補破並行雖用藥不顯藥無不愈者即是大人虛癆雜疾以此治之無有不可}
  - {type: 'tls:head', offset: 10530, content: '', id: KR3eq093_jc_004-d10.d65.h1s1}
  - {type: 'tls:div-end', offset: 10724, content: '', id: KR3eq093_jc_004-d10d65}
  - {type: 'tls:div-start', offset: 10724, content: '', id: KR3eq093_jc_004-d10d66, level: 2, head_text: 小兒痞塊膏藥方寒熱各有所宜大人用此貼病亦必以此為例}
  - {type: 'tls:head', offset: 10724, content: '', id: KR3eq093_jc_004-d10.d66.h1s1}
  - {type: 'tls:div-end', offset: 10892, content: '', id: KR3eq093_jc_004-d10d66}
  - {type: 'tls:div-start', offset: 10892, content: '', id: KR3eq093_jc_004-d10d67, level: 2, head_text: 小兒喉症風寒最多大人亦然非真紅如珊瑚或紫或白或淡紅皆是風濕寒邪作熱不可認為實火以致不救}
  - {type: 'tls:head', offset: 10892, content: '', id: KR3eq093_jc_004-d10.d67.h1s1}
  - {type: 'tls:div-end', offset: 11088, content: '', id: KR3eq093_jc_004-d10d67}
  - {type: 'tls:div-start', offset: 11088, content: '', id: KR3eq093_jc_004-d10d68, level: 2, head_text: 小兒馬牙一月之內最有關係}
  - {type: 'tls:head', offset: 11088, content: '', id: KR3eq093_jc_004-d10.d68.h1s1}
  - {type: 'tls:div-end', offset: 11254, content: '', id: KR3eq093_jc_004-d10d68}
  - {type: 'tls:div-start', offset: 11254, content: '', id: KR3eq093_jc_004-d10d69, level: 2, head_text: 紅糖治病最多}
  - {type: 'tls:head', offset: 11254, content: '', id: KR3eq093_jc_004-d10.d69.h1s1}
  - {type: 'tls:div-end', offset: 11630, content: '', id: KR3eq093_jc_004-d10d69}
  - {type: 'tls:div-start', offset: 11630, content: '', id: KR3eq093_jc_004-d10d70, level: 2, head_text: 山楂治老幼之滯甚好}
  - {type: 'tls:head', offset: 11630, content: '', id: KR3eq093_jc_004-d10.d70.h1s1}
  - {type: 'tls:div-end', offset: 11801, content: '', id: KR3eq093_jc_004-d10d70}
  - {type: 'tls:div-start', offset: 11801, content: '', id: KR3eq093_jc_004-d10d71, level: 2, head_text: 眼科不知脈理斷乎不可}
  - {type: 'tls:head', offset: 11801, content: '', id: KR3eq093_jc_004-d10.d71.h1s1}
  - {type: 'tls:div-end', offset: 12080, content: '', id: KR3eq093_jc_004-d10d71}
  - {type: 'tls:div-start', offset: 12080, content: '', id: KR3eq093_jc_004-d10d72, level: 2, head_text: 眼科摘取數方}
  - {type: 'tls:head', offset: 12080, content: '', id: KR3eq093_jc_004-d10.d72.h1s1}
  - {type: 'tls:div-end', offset: 12823, content: '', id: KR3eq093_jc_004-d10d72}
  - {type: 'tls:div-start', offset: 12823, content: '', id: KR3eq093_jc_004-d10d73, level: 2, head_text: 眼科五訣}
  - {type: 'tls:head', offset: 12823, content: '', id: KR3eq093_jc_004-d10.d73.h1s1}
  - {type: 'tls:div-end', offset: 13784, content: '', id: KR3eq093_jc_004-d10d73}
  - {type: 'tls:div-start', offset: 13784, content: '', id: KR3eq093_jc_004-d10d74, level: 2, head_text: 眼藥加減真法}
  - {type: 'tls:head', offset: 13784, content: '', id: KR3eq093_jc_004-d10.d74.h1s1}
  - {type: 'tls:div-end', offset: 13878, content: '', id: KR3eq093_jc_004-d10d74}
  - {type: 'tls:div-start', offset: 13878, content: '', id: KR3eq093_jc_004-d10d75, level: 2, head_text: 老年羸弱之眼亦有用補者}
  - {type: 'tls:head', offset: 13878, content: '', id: KR3eq093_jc_004-d10.d75.h1s1}
  - {type: 'tls:div-end', offset: 13957, content: '', id: KR3eq093_jc_004-d10d75}
  - {type: 'tls:div-start', offset: 13957, content: '', id: KR3eq093_jc_004-d10d76, level: 2, head_text: 眼疾初起多是風火大黃宜慎用}
  - {type: 'tls:head', offset: 13957, content: '', id: KR3eq093_jc_004-d10.d76.h1s1}
  - {type: 'tls:div-end', offset: 14188, content: '', id: KR3eq093_jc_004-d10d76}
  - {type: 'tls:div-start', offset: 14188, content: '', id: KR3eq093_jc_004-d10d77, level: 2, head_text: 治眼須要論五行眼疾已久須依此法}
  - {type: 'tls:head', offset: 14188, content: '', id: KR3eq093_jc_004-d10.d77.h1s1}
  - {type: 'tls:div-end', offset: 14515, content: '', id: KR3eq093_jc_004-d10d77}
  - {type: 'tls:div-start', offset: 14515, content: '', id: KR3eq093_jc_004-d10d78, level: 2, head_text: 莊農人家治眼要訣}
  - {type: 'tls:head', offset: 14515, content: '', id: KR3eq093_jc_004-d10.d78.h1s1}
  - {type: 'tls:div-end', offset: 14767, content: '', id: KR3eq093_jc_004-d10d78}
  - {type: 'tls:div-start', offset: 14767, content: '', id: KR3eq093_jc_004-d10d79, level: 2, head_text: 眼中瘀肉色紫多是寒症}
  - {type: 'tls:head', offset: 14767, content: '', id: KR3eq093_jc_004-d10.d79.h1s1}
  - {type: 'tls:div-end', offset: 14977, content: '', id: KR3eq093_jc_004-d10d79}
  - {type: 'tls:div-start', offset: 14977, content: '', id: KR3eq093_jc_004-d10d80, level: 2, head_text: 壞眼之症多是陰毒結就}
