  - {type: 'tls:div-end', offset: 2373, content: '', id: KR3eq093_jc_004-d10d8}
  - {type: 'tls:div-start', offset: 2373, content: '', id: KR3eq093_jc_004-d10d9, level: 2, head_text: 孕婦脈結下部為憑}
