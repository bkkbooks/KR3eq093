body:
  text: 卷三調氣總歌人有如此大軀殼必有一氣通橐籥有時窒塞不能行便如關口上關鑰有一少婦氣不接實因寸口氣壅遏寸口上竄人不知愈用補藥愈塞著我用風藥瀉上焦頓覺中氣皆通和試看百川長流水那有一節忽乾涸若有一節忽乾涸必是其中有阻遏我嘗治這病不是上焦去滌盪便是下焦去疏鑿一通關口便流利那有一氣接不著至於大脫與大下實該用補藥此本人人所共知何煩予言去聒聒可知世上氣不接多是有阻遏如果脈上分清楚只在應弦那一撥況乎古來治氣亦不少原非片言所能約有用枳樸去盪滌有用硝黃去疏鑿有用歸芍去平肝有用肥甘去扶弱有用五味去收斂有用椒茴去引卻有用諸香去透發有用旨酒去斟酌有用升柴去提拔有用金石去墜著此皆一切調治法不僅參耆大補那一著如泥參耆那一著恐失人身之太和後學須要記心間切勿置之於高閣丹溪治病以調氣為先丹溪治病有要訣調氣更比調血切氣血原來是一家何為於氣獨昭雪百病皆自氣中生百病皆自氣中掣氣於一身上下行一有窒塞便橫決其始皆因寒與食熱則流通所以結火者甚少窒塞久了便成熱百病發熱皆由於壅鬱但有虛實之分衝入右脅必挾痰蒼朮二陳多用衝入左脅必結血桃仁紅花生地赤芍白芍多用結血之時金丹用挾痰之時牛黃撤衝入上焦頭必懵流入下焦便必熱衝入上焦兼風治流入下焦將水竭我今已七十始於醫理皆洞澈氣血雖然是一家總要氣上去調燮今日謹告小後生全在此處悟真訣治病以調氣為主即調血亦調血中之氣也故以調氣名之論人氣血原兩停一入治病分重輕無論病在氣分宜調氣即在血分調氣一樣同調血中之氣試觀聖人治天下乾綱獨振天下平呂后武后雖臨朝亦借漢唐以為名可知陰陽大造理無陽陰不化無男女不行惟有陰虛陽亢症養血滋陰亦有功但是回頭便須轉補養脾胃為正宗如泥養血滋陰藥必致人入九泉中滋陰之藥雖期速效多服則傷脾減食有必然者但看飲食減少急須溫補脾胃兼行氣清金等藥方為得治順氣調氣下氣有三法惟下氣為最難順氣三法君須記惟有下氣最不易下法不必定大黃能到二便便是地到了二便氣流通諸藥並此顯神異有了陽藥氣上行有了陰藥氣下墜此處本是性命關氣不流通藥如寄中氣不通用牽牛人有癡憨健忘宜用一二分腎氣不通斑蟊利用一二個水火二司惟肉桂十二經絡巴霜備只用絲忽不論虛實與寒火略略加些便殊異還有多藥與幫扶宿砂豆蔻大戟山甲小茴川椒輕粉沉香赤石不及此味總為次好如鄧艾渡陰平從天直到地好如韓信出陳倉千里一時至此個方兒甚是好不會軟來翻謂戲年老有積亦當攻伐人有積聚滯當胸勿謂年老不可攻攻去積聚能飲食不過十日便肌豐不然淹淹纏纏三兩月元氣消爍終成凶我嘗積滯略停胸全不置之於意中能飲能食復何害到了兩月寒熱增即用大黃三四兩酒煮飲之立時輕又用大黃三四兩酒煮飲之徹底清若是起頭便盪滌何至兩月始決癰幸是元氣未消爍猶得轉敗以為功又嘗治一煙鬼已成翁上下煙油滯不通我用硝黃三兩餘他意首鼠不肯庸遲至數日受不過只得用此盡力攻連吃兩付全不動吃至四付始全通但是正氣支不住即用洋參四五錢扶當躬吃了一付能飲食吃至數付氣熊熊可知疾病只要能去了元氣一回壽無窮切勿效那噢咻小先生護養余疾以成凶就是再加藥味去盪滌未必春意樂融融年老積聚停滯中官輕則消導重則遂行萬勿遲延護養余積若牽延日久元氣一損補之不得瀉之不能釀成不救必得醫者臨時確有把握也鎮屢治屢驗故敢筆於篇末孫鎮川謹識年老補瀉並用亦是治法老年氣弱甚可憐往往結滯上下纏再說補氣去和他如此結滯何自悛再說瀉藥去打他如此氣弱怎迴旋不如補藥帶金丹使他一氣運周天大似元祐調停法目前之計此為先補藥得力瀉亦得主人正喜通神仙調停不可治天下以之治病有真傳若謂元祐法不善卻是藥王大法船老人疼痛多是氣虛生痰老人氣虛恆生痰不流四肢便脅間流入兩膀痛徹骨閉塞氣道不能穿即用熱麩熱磚拓兩手淅淅生風寒流入兩腿氣滯內未從走動便筋酸流入脅間似有積出氣回氣時塞磚即用蒼蒼朮半半夏與陳皮砂仁芥子當飯餐外貼二烏川烏草烏生用芎川芎歸當歸膏一切滯氣盡皆宣時候久了氣流通便無痰涎作祟緣間有夾寒夾氣夾食積總以痰症為主權治病先治肝診脈下藥雖已全左手頗較右手難右手一脈管一部左手多個心包三焦款命門相火出入由此路心是君火命是相火實較右手多一班肝屬風木本是賊肝者六經之賊也乘此猖狂生事端小腸原是肝下口肝腎原是一家或消或散亦不難人家治病先治脾我家治病先治肝入手下去先擒賊縱有不平病易痊我家治病無他奇每於此處尋病源小小蒙醫多不識故為爾等細細言按初病平肝者多久病扶脾者多孫鎮川謹識雜病多在陰分宜從陰分尋出路大病久病亦然雜病多從陰分走下至湧泉上至首上下奔騰十二經多是命門火輻輳衝入上焦喉必呃橫入中焦肝不透流入下焦夜必熱時候久了皆不救況當午會火已極風從火上來火從風上就上下表里皆是熱不得金丹總不救加上風藥便騰達十二經中皆能透解表又解里行左又行右不比尋常用大黃大黃只行身之右大黃多走陽分如此病症走陰分使他通行總掛漏縱加醋酒來調和較之金丹總是後況且人情甚澆漓不是好色便好酒私心雜念從此起一切外物俱能誘誘出元神不當家戕性斧斤刷骨帚積成壘塊不能達寒熱溫涼件件有如此病症在陰分舍了金丹無可救不用此藥必不靈我嘗備此作圭紐上下表里俱騰達寒熱溫涼一齊救病疾皆從積滯生得此一付若神佑大病久病俱如此不如此治總掛漏只緣左手多三部病疾多從此處走時下盲醫多不識只從胃中去解救以為胃為水穀海時候久了病必湊加上大黃用藥行以為一付可立就豈知病不到此命已極何如一診左部先下手一見左部有毛病即從此處去解救上焦有病加風藥駕御金丹上下走中焦有病加白芍風藥如舊接住金丹上下走下焦有病加斑蟊風藥如舊以今日之病皆從風起也引入金丹上下走上下一走病立止何必胃中去等候驅除病疾亦多門小腸原是肝下口一切陰分之病從此出不待行胃已驅走此是斬關奪隘法只消一付便解救若得胃中去開門恐怕人命多不壽金丹亦能解表凡人一切受風寒頭痛身懶骨節酸風藥一壅齊上前太陽之症可立痊但是胸膈不利甚不得金丹總不寬金丹雖然有巴豆巴豆屬陽通行十二經風藥駕馭入腎肝一切表症俱能解病不引邪入胃間大黃引邪入里此則不然我嘗治些表實症胸膈不利他為先或喉咄或心疼今日風寒大非前六經湧動在表間不是下焦結腎里便是上焦結心端中間胃家全不實多賴此味上下宣此是吾家創治法古人並未入筆端今日告爾解表時亦有靠他作仙官治病須要兼風藥治病須要兼風藥不兼風藥不合作人之姿質本五行金木水火土皆是實的人之運氣由六合風寒暑濕燥火皆是虛的六氣皆以風為本一呼一吸通橐籥我初治病不謂然往往置之於高閣孰知人在天地間無非大造所磅礴況屬肝木原是賊每於人身肆狂虐素問皆是大聖人尤於此處言鑿鑿風者百病之長也素問曾屢言之試看一切虛寒症加上風藥便綽約荊芥防風羌活獨活之類一則能升提二則能揮霍再看一切實火症加上風藥便引卻前胡柴胡升麻之類一則能發散二則能開拓我今始知風藥為最靈不用風藥總脫略譬如做文章之乎者也為關鑰譬如煉仙丹噓嘻咨咦為鼓橐始知從前治病理不得精微皆糟粕以後要讀南華道德經元空妙理為上著治病風藥斷不可少人生治病皆有偏一切細密難周全我初治病脈清楚虛實寒熱得真傳一看虛實寒熱症便將溫涼補瀉詮至於一切除風藥全不置念在心間間有受風甚顯然始加發表四五錢中年悟澈五運六氣理始知人生受病風為先以後治病開方子必於風藥加檢點寒症便須蒼蒼朮麻麻黃羌羌活防防風用熱症即將二胡乾葛添只因一身之病皆由氣氣若到時風自鑽必加此味始通靈好如熊經鴟顧在眼前必加此味始有力好如抽坎填離在心間可知妙手空空爾登場傀儡一線牽治病豈必在實際八萬毫毛皆能宣但置風藥三兩味便是虛醫到身邊肝經虛弱反生橫決之病非補不行當歸川芎肝經主藥因其滑腸故不用熟地亦然人生橫決肝最多吾嘗立有平賊科忽遇少婦虛寒甚亦有脹泄諸病魔吾為診脈肝憊極實與肝腎有同疴但是治法大不同大補甲乙始無訛兼之腎寒無有火不能滋養萌芽長枝柯因用吳萸萸肉與故紙肉肉桂附附子二術蒼朮白朮紫蘇搓小茴川椒茯苓半夏升麻之類大培命土使根牢不得橫決起風波古云肝屬風木喜條達不宜攻伐用太阿吾初不服今貼然始知古時肝腎虛寒多不似今日因風來縱火一不降伏立起波今遇少婦用大補不敢與肝再操戈可知治肝之法亦不一不得泥住平賊科平賊之義出聖人聖人致治日日新有時用征伐有時用和親征伐之義我為主和親之義他為臣雖說治道有升降以之治病定出神不從此處去翻案必泥平賊為正論可知醫道要活潑那有萬病不回春肝經虛寒反生橫決之病實不甚多間或有之脈理不清治錯者不少故為此歌以救其弊肝木虛橫只宜補脾脾土一旺肝自收斂不敢與土為敵矣雖不補肝而補肝之理自寓焉肝木太旺宜瀉肝瀉得肝時脾自安肝木虛橫只扶脾扶得脾時肝自持況乎補脾必補命門火命火一旺肝自左只顧兒火日興旺無暇與土再操戈吾初不知補肝法誰知補脾更比補肝嘉補得脾土如山嶽肝木根深自結花肝經治之不得宜從脾土下手吾言人家治病先治脾吾家治病先治肝看似治病無主見豈知肝木興旺最易痊雖說為賊能剋土亦能生火補脾元縱有天大病或清肝或疏肝或平肝或和肝略加補益入胃裡一切百病皆能安若是肝木有也無恐絕脾土生化原其脈必懶散其人必調殘溫之不能起涼之不能堪補之無有力瀉之不能甘以其命火無生氣不能運轉大周天為從有了病淹淹纏纏滯脾間可知風木搖動雖不好若無根柢也是難必須補益好先生細細治之方周全頭上諸症以牛黃散為主藥紫金丹亦可人之一身頂最高非風非火不能招火性本炎上風勢往上飄論治頭上症散風除火是根苗但恐滯氣壅塞住不得牛黃牛黃散總不消我嘗細思頭上理必得清揚若羽毛清揚之藥上至頭目或清空或發表荷葉一枚作引牢牛黃雖少亦將軍中有巴豆霜故也十二經中細細調上至崑崙下海底透澈心神與腎交此等病兒中指定脈氣上衝入雲霄直貫中指故也不論喉咄與耳聾不論發頤並眼眊皆是中氣滯不通壅塞風火往上飄不得牛黃為主藥焉能聖德醍醐貫頂高頭上清涼發散必兼流行始妙凡是頭上火與風清涼發散是正經不使牛黃牛黃散與金丹方子雖好總無功清涼反使火激注發散反使心脹膨必得二藥為經紀清涼發散始流行頭上有火便下來心中膨脹頓一清但是二藥宜斟酌宜多宜少宜從容方本吾家屢試驗故敢注之為二銘如今病以治風為主如今人心最不平不得厲氣總不中況當午會火已極火已極時盡是風今病盡從風上起不痛治風總不靈吾嘗診脈細看症不是頭懵便耳聾不是喉呃便眼紅明明皆是風證見如何皆用涼藥清治火定然風束住治風能使火外松治火不過為輔佐治風定然作主盟病輕二麻天麻麻黃二活羌活獨活自能已病重必須蠍子與蜈蚣再加金石往下墜再加金丹往下行重用厲劑方能愈不如此治病難輕大抵運會使之然吾嘗以此為先鋒頭上諸症亦有陰毒結就一切頭懵與頭疼一切鼻衄與眼紅任憑百方皆治到不見絲毫有重輕皆是陰毒結已久不用毒藥總不中我嘗調和二將軍一遇此症為先鋒若是下頭有不順加上斑斑蟊麻蓖麻往下行若是上頭有不順加上馬前往上衝上頭下頭俱流利那有內毒不外松況且風藥大使用一竅通時百竅通任是世上修行客不過千竅萬竅共玲瓏縱有一切小陰翳焉能滯隔藥王大和衷牙疼有假火牙疼恆作火來看亦有似火實是寒雖然面腫只半邊不是面上都腫完雖然疼時有不疼不是一疼無休端疼痛無休是真火此皆濕寒生風熱逼起無根火上竄只用清涼去解散不用引火去歸元細辛防風能散濕肉桂熟地往下牽往下牽時用肉桂不使附子往上參附子之性無停留渾身疼痛是真詮不可二味一齊用使他上下無邊堰此症皆用水酒煎因他性溫能散寒治咽喉諸症宜分虛實喉症虛實治不同實者宜針宜針乳蛾頭尾莫針中間虛莫攻甘甘草桔桔梗三黃黃芩黃連黃柏黑梔子治實症虛只元參並麥冬量加四物午後重屬陰虛加四物湯四君子午前重屬陽虛加四君子每從桂附去收功氣血虛甚必用金匱腎氣丸八味地黃丸始能收功以二藥之功有肉桂附子故也以上數方有出自己見者有出自傳聞者有出自別書者皆百發百中自記咽喉兩邊有硬根多是陰毒結就成有一幼婦請我治喉嚨我一診脈是寒風但用熱藥痛出汗三月之病一時清隔了數月又不好這回兩邊時硬疼日日吃飯亦無礙但覺時候不沖融我用大熱一兩付以為藥到必成功誰知吃了全不效知是陰毒結已成從此不敢用平藥只用毒藥細細攻毒藥不過三幾味攙入丸藥使除風吃了此藥喉便癢數日之間即成功第一用山甲第二用全蟲全蠍第三用鬱金第四用明雄第五用稜三稜術文術第六用蜈蚣小小方兒即能愈毒症即藉毒藥攻從此治喉嚨恆以此藥為先鋒任是喉強如樹皮無不得此便成功如今喉症多有毒較之往日大不同以後臨症宜細酌專靠平藥必不中治今喉症以除風為主咽喉不利最多端總以除風為大關陰風入骨寒入竅陰寒在內難驟宣時候久了起疙瘩疙瘩堅硬皮不丹或白或紫或淡紅仍是陰寒伏裡邊雖然發熱成毒火因寒作熱總是陰熱往外鑽正當乘機去發散透出毒火是真詮多用風藥為上策少用清涼為正端多用風藥必上壅加上蓖蓖麻杷枇杷葉往下牽少用寒涼恐束住加上肉肉桂附附子引歸元此是治喉真妙訣如今氣運最為先我嘗治眼科必以此方為神丹我嘗治頭疼必以此方為仙丸喉症亦從頭上起舍了此方必不佔試觀古人治喉咄必用郁砂往下傳鬱金硃砂加巴豆霜為丸試觀古人治腎寒必用辛細辛附附子往上宣可知少陰通喉嚨少陰腎經上通喉嚨上焦風火下焦剜一切上壅下不來不透腎經總不安巴霜細辛附子皆能通腎我因時下喉症甚是危不得不將此理再傳宣少年人喉疼多是寒症一人喉疼並喉干愈吃清涼愈不痊一日請我去看看我言皮色不變喉不丹必是少陰受風寒況且脈道甚遲遲那有真火往上竄君必身上時發冷君必骨里略帶酸看君成室必不久以致喉症甚流連他言正是如此無別說年前已度玉門關即用肉桂八味與之食大加風藥天麻白附子殭蠶之類除內寒只吃一付便能愈何用外處尋金丹有咽喉忽腫作疼飲食不能下咽但此症實火易治而虛火難醫實火世醫皆有妙方即用桔梗豆根芩連花粉之類治之立消惟虛火乃腎火不能潛藏於命門浮游於咽喉之間虛火惟夜重於日清晨反覺少輕若實火清晨反重夜間反輕實火口燥舌乾虛火口不渴舌滑以此辨之斷不差錯余用元參一兩熟地一兩麥冬五錢萸肉二錢山藥五錢茯苓五錢五味子一錢白芥子三錢好肉桂一錢三分青鹽少許煎服一劑痛除腫亦盡消則龍雷之火有不歸根於命門者乎絕勝於八味地黃湯也倘喉腫閉塞滴水不能下方用附子三錢破故紙五錢撞細末調糊作膏藥貼兩腳心以火烘之一時喉寬可以服藥矣屢試屢驗真奇方也孫鎮川謹識婦人喉症因陰虛而得者不少婦人陰虛亦最多一受寒邪起乳蛾渾身壯熱不能止以為風火定不錯多少盲醫無識見動將甘桔去搜羅不是牛子加射干便是元參並薄荷以治風火甚是好以治此症錯又錯此症皆自房中得腎水虧損立起波不用肉附八味丸不能治此雙乳蛾若能初起即嚼桂亦可補此少陰科再說閨中待嫁女亦有此症若沉疴不於此中討消息動將甘桔去止遏豈知描鸞繡鳳多閒暇蝴蝶一夢起風波愈吃此藥愈不得皆是同室暗操戈生此門者死此戶幾個人兒知清楚古人立下地黃湯原是此症真妙著我見人命多喪此故將此方再吟哦此症因風火而起者固多亦有因少陰虧損而然者人多忽焉而不察往往命染黃泉而不知甚可哀也故再筆之於此陰蛾之症腎水虧極虛火浮騰不能歸原看似蛾而非蛾也若早晨痛輕午後痛重至晚而痛更甚得熱則快遇寒則加方用引火歸原而痛頓失萸肉六錢大熟地一兩麥冬一兩川膝錢半車前子二錢五分五味子一錢五分好肉桂一錢附子三分青鹽一分煎服立愈此方大補腎水則火息引火歸原則痛消也孫鎮川謹識風火上壅咳嗽不已在本人皆以為寒豈知因濕生熱因熱生風往往如此不可不知咳嗽之症亦多端不必定是風與寒風寒之症啞喉嚨發表溫中自能痊若是風火往上壅愈吃熱藥愈不安他說他是寒利害我一診脈脈上攢大加風藥清上焦射干葶藶滑石連再加蓖蓖麻杷杷葉往下行二芍赤芍白芍大戟入腎肝連吃兩付便能愈方知上頭風火下頭剜因悟先兄好酒熱上贊大清風熱始得安不用十棗十棗湯瀉下焦濕熱轉眼往上翻可知一切上壅症必要下焦去透穿下焦透穿病自已此是濕熱大證見若是癆嗽大不然癆嗽全憑補丹田丹田補實病自己肉肉桂附附子吳萸引歸元熟地萸肉並山藥宿砂益智烏梅兼此是歸根覆命大治法何至睡倒坐不安吾嘗作有癆嗽詩正可與此參一參隆冬驟得寒嗽皆是風毒為祟治以馬前丸為最治病透字最為先不得透字總不佔在表宜透發在裡宜透穿一毫有不透即有一毫不安然吾本無甚病惟到隆冬嗽忽添即用馬前服壯丸馬前用法甚多隨人所加加於治嗽藥中即是馬前服壯丸脫了衣裳擁被眠初時不見有動靜二更時節忽戰戰上至顛頂下湧泉似有微汗欲外鑽忽而嗽大起忽而數吐痰須臾之間即安然從此再無病來纏可知病疾皆從積滯生有風積有寒積有氣積有食積不得透字總不佔無怪老陳已八十朱仙鎮人終年制此馬前丸以為病自毛竅入必自毛竅宣我初意不解時候久了得的端試觀市上甚重英雄丸那有人參入其間不過生烏一大塊生川烏治里好了治沉寒彼治沉寒甚有力此治風毒如刀剜我今封他為將軍使他四外去開關如今風毒甚是多不得厲劑必不佔症雜藥雜有先後遞用者病雜藥亦雜必與合處見精佳亦有病雜藥亦雜必與分處見權拿雖然一付藥有合有分始無差我嘗治一傷寒症見了藥水便腸滑平素不論補瀉藥一入肚中便瀉出汗從何處發且是肝經滯而熱不得破藥不合法如此病疾甚別緻縱有仙人亦難去治他我用參黨參術白朮苓雲苓草甘草三生引方見首卷細辛白芷共升麻俟他渾身汗出後再加金丹破肝家加入煎藥汁中只是一藥分補瀉有先有後便堪誇可知君子時中理一用藥時自知嘉白露前後病同治不同一年之病秋最多涼茶涼水夏間哈人受熱極便欲寒寒一束住病立作不是噦嘔便是瀉不是痢疾便是瘧初得之時皆是火利濕清熱是正著時候久了便生寒仍是前病要變藥白露以前一樣治白露以後又一科或是補瀉一齊用或是寒暖交相和前日豬苓滑石好今日茯苓赤石摸前日柴胡前胡切今日羌活獨活搓前日黃芩黃連入今日乾姜乾葛合前日梔子連翹煎今日山藥萸肉嚼同此一節治不同莫謂吾人好前卻休慌忙須斟酌不可泥住前方為妙著吾嘗於此細忖度時候久了便生寒時候久了便有錯多少年老與雜疾竟有以此致沉疴只因不知如來轉法輪以成今日之子莫夏秋吐瀉交加雖甚危殆補藥宜慎從來吐症用硝黃瀉症升提是為良若是二症一齊見必須術白朮苓雲苓補中央如今治法大不同再用此法便不良只因毒火如膠膝沾住腸胃不光堂若用術苓必立起反與敵家齎之糧何如六一六一散加牛黃牛黃散涼水飲下漸漸康再噦再瀉亦不妨腸味滌盡永無殃生梨生瓜且咀嚼略飲面水便回陽何須術苓四君子鬥起病來反著忙我嘗細思治病理始知世道宜酌量病尋出路宜順勢而導之病尋出路人不知只要盡力以送之本在臟腑里今忽到眼前本在臟腑里今忽到鼻端本在臟腑里今忽到喉間即此便是他出路只要盡力與發散即此可悟治眼之理或清散頭懵頭疼多用升柴前胡之類或熱散喉咄寒嗽多用麻黃羌活獨活之類不是除風便化痰有寒風有火風有寒痰有火痰宜分別治之如若大涼與大瀉大涼恐有以激之然亦有用之者關脈實有用酒軍醋軍者若尺實則不拘乎此矣恐於此處不甚甘凡治上焦病大約如此便能安若是下焦尋出路不用導法便不安本在臟腑里今忽在莖前本在臟腑里今忽在膝前本在臟腑里今忽在腳端即此便是他出路只要盡力與疏湔或滋腎或平肝不是和血便化堅有用斑蟊下之有用肉桂引之皆是要著如若大補治鶴膝風有用防風一兩炙耆四兩大汗而愈與大提有陰虛下陷腿疼者用升柴二活而愈恐於此處不相干凡治下焦病大約如此便能安譬如橫客來與主不相安只要疾速送門前宜用量天尺治上焦之病宜用下水船治下焦之病即此便是小神仙病在上取諸下病在下取諸上皆是要著人病往往在中州指脾胃而言不是上出便下流既從上邊出便從上邊援吾嘗作有吐法歌不可不講究用六一散牛黃散以吐之但是世間嘔吐者幾個下邊若行舟不是水不流便是屁不周若要求來歷必於此處進一籌再加行藥方得既從下邊流便從下邊搜吾嘗作有導法詩不可不講究有用承氣湯有用十棗湯但是世間泄瀉者往往上邊塞磚頭不是氣凝胸便是痰壅喉若要求來歷必於此處進一籌須要大開胸膈人家請我去診脈便當上下細細搜不可見病便治病以為門前作應酬此與病尋出路詩似乎不相侔言之各有當講了這頭講那頭治病須要順時令霜降以後皆是寒那有一人煉仙丹不是蒼蒼朮麻麻黃去出汗便是肉肉桂附附子暖命元不是五味五倍收散缺便是黨參黃耆提上顛於今已兩月未曾一人用芩黃芩連黃連因憶麥楂爛沒好漢盡皆濕熱衝上天不是六一牛黃散便是噙化冰荷丸那有大熱與大補不過清涼二字為主權故我錄之以示人寒熱之藥皆能隨時作金丹治病要臨時得竅不論好歹藥治病總在臨時恰中竅藥不中竅總不妙有一孕婦將分娩妄進補益塞氣道胸中噫氣不能止我用牛黃甚是妙牛黃散中有巴霜只和滑石哈兩口其人驚喜若再造大瀉濕水而愈又有孕婦將分娩妄進補益塞便道日飲涼水不能止我用金丹甚是妙紫金丹中有巴霜只用滑石哈兩口其人驚喜若再造大瀉膠糖而愈可知治病無奇方只要臨時恰中竅好如瞎子遇仙橋好如迷人得大道治病有標本之殊從來治病有兩般泥住一邊便為偏我嘗治一士人病本是久瀉不能餐忽染外邊火頓而喉不安我一診脈是虛火便用肉桂往下牽一身之病皆治著引熱下行便還元他兄一見為太熱只用酒連治一邊雖然能暫愈與他本底全不佔他兄言之甚得意我只置之若固然可知醫道甚是大治本治標皆能痊必須本原盡澄澈方是聖人之十全心中虛滿與實症不同只宜空中著眼方見手法又有隔二隔三治法不可不知人有虛滿往上壅實無一物在胸中不是寒來便是火不是氣來便是風只宜掃去浮雲歸洞壑不可硝芒硝黃大黃用大行辛細辛芷白芷能散寒荊荊芥防防風能除風火宜用芩黃芩連黃連氣宜用橘紅只要上焦無壅滯便可妙手稱空空可知人身之氣如橐龠原無一絲滯不通有了一絲滯不通便是呃逆貫當胸如若下焦與中焦或可峻劑用力攻至於上焦有不順只宜妙手去蕩空不是先生不著緊必以此治方可澈底以澄清亦有引入海底歸洞壑亦有墜入丹田作主翁此又納入須彌穴此又降入水晶宮醫道玄遠妙無窮豈可狃於子莫之執中腑病治臟臟病治腑原自相通噦嘔原因肺經壅有時全不關肺經我嘗治一傷寒症只有二尺膠不行我用金丹與芒硝下焦大腸通時上自通肺經結糞原因大腸干有時病不在腑間我嘗治一腸秘症只因肺虛不能傳多用潞黨與當歸元氣一旺立時宣因悟肺逆不止用牙皂大腸藥大腸原與相應叫因悟小腸不通用菖蒲心經藥心經原是他樞要因悟下焦大腸乾燥用黃芩肺藥華蓋肺滋潤為善道此本表裡不相離好如男女夫與妻縱隔千里總一家那有芝蘭參與差臟腑之病不同治法亦異現在之症皆自六腑來久病必定五臟裁六腑之病浮浮治五臟之病深深推浮治不必論上下那邊有病那邊開久病便須上下相叫應這邊有病那邊猜吾言治病治上下大抵多從五臟來五臟病脈恆皆出本位六腑病脈只在六部該亦有久病新得時下症時病端自久病來此又病症多變化病過七日多有變化還要脈症細細推中秋人有疼痛噦瀉皆是伏暑未盡看似寒症不可遽以寒論凡是肚疼必多寒惟到中秋細細參中秋時節寒雖來夏末餘熱未盡殫不是吐瀉交相雜便是疼痛不能堪吐瀉疼痛雖利害不可遽作陰寒看只宜四物加白芍只宜六一帶金丹只宜甜梨與西瓜只宜醋麩與熱磚只宜糖紅糖酒水酒炒山楂只宜雷火罐子搬縱有脈理好先生不可到此生事端一診脈理便顛倒虛實寒熱盡茫然只因暑伏脈亦伏不能洞見真病源我嘗治此千千萬始敢如此胡亂言不如按住伏暑細細思不如按住秋初淡淡觀只用浮皮創癢方便可一付把病剜如依脈理去調理誤了人病自招愆中秋之時伏暑未盡治法以此為例按中秋腹疼吐瀉兼作皆因伏暑寒熱鬱滯於中焦蓋邪在上焦則吐在下焦則瀉在中焦則吐而且瀉故脈雖沉伏而不可遽用熱藥此因伏暑而致吐瀉也用黃連香薷飲為最穩若暑濕積聚停滯於內而腹痛者宜推蕩調氣利濕為主不可與前症同治也孫鎮川謹識寒噦火噦皆因氣虛統不住宜健脾為主餘隻帶治七月間斷不可用此法古言噦症有寒熱皆從飯後去決別食遠猶噦便是寒食近即噦必是熱如今氣運大不然寒熱皆從飯時決我嘗見一人六脈冷如雪吃了一口噦一口心中全無一點熱我用熱補齊上前始得一付心熨貼連吃數付已大愈後因嚼桂病轉烈吃了一口噦一口又請我去把病閱前日之噦全是寒今日之噦盡是熱只用前日大補方刪了熱藥帶涼血加上白及與白芍一見清補便回轍不論飯近與飯遠寒熱皆從當下決可知百病胥隨氣運轉不得執住古人無二說按嘔吐有食入而即出者乃腎水虛不能潤喉所致是有火也若久食而反出者乃腎火虛不能溫脾因脾寒而反出是無火也欲治反胃嘔吐者理當從腎詳辨有火無火之分如無火而反吐宜用萸肉五錢大熟地一兩茯苓三錢半澤瀉二錢丹皮二錢山藥四錢肉桂一錢附子一錢水煎服即八味湯也治有火反吐方用熟地一兩半萸肉五錢山藥八錢澤瀉三錢丹皮三錢雲苓五錢麥冬六錢五味二錢砂仁二錢煎服即麥味地黃湯也二方臨症加減治反胃嘔吐實有神功又有嘔吐傾胃而出者必傷胃氣胃氣一傷多致不救然亦有寒火之殊有火者用薑黃連三錢雲苓一兩潞黨二錢砂仁二錢無火者用白朮一兩潞黨三錢乾薑三錢丁香二分若下瀉者俱宜加車前子三錢一劑即可奏效凡遇此症者總以先固胃氣為本緩則脾敗主亡雖有靈丹妙手奚施哉孫鎮川謹識治瘧以平肝為主一切病症皆由肝況乎瘧疾據之為主權雖說濕痰恆在脾不治肝經總支離青皮能散肝山楂能調肝桃仁能平肝醋軍能行肝看似一洗脾經寒不透肝經總不完如果食水瀉不下再加金丹便能罷金丹能瀉陰分食水亦有肝盛脾經弱須得補脾那一著蒼朮半夏能燥濕宿砂乾薑能去惡補得脾土與肝齊他自不敢妄支離亦有肝寒脾亦寒脾寒未有不虛者必用肉肉桂附附子補脾元補得脾土如山嶽肝木根深蒂固盤縱有狂風來相擺德厚無疆搖動難老瘧子虛瘧子多補脾土而愈亦有肝經鬱滯脾不開只在皮里為禍災大加蒼蒼朮麻麻黃去出汗肝木調達上不來亦有肝經抑鬱濕寒水不在皮毛在臟里看似傷寒一寒一熱有似傷寒實是濕水為病莫出汗大瀉濕水病自已宜用甘遂大戟之類亦有肝經抑鬱痰停胸二寸頭上似蟲行只用截瘧丹導痰截瘧丹方用土信一兩綠豆粉面四兩共研細分作四百付大人每服一付小兒半付涼水送下先一時服忌飲熱茶及一切溫熱之物附註導出痰涎病自完可知瘧疾寒熱皆在肝總以平肝為正端有時肝經平不得還須他經善周旋他經周旋肝自和終以此地為橐龠前後瘧痢平肝兩論平肝者即所以和脾也脾胃一和濕痰自解瘧痢可去矣鎮治此症屢試屢驗無不奉此為主臬孫鎮川謹識瘧疾不易治要有把握以傷寒瘟疫雜症括盡治瘧之理是我家創治法如今瘧疾甚是多治家盡是胡亂摸初起即作傷寒治在表在裡分清楚在表便去透發汗無汗要有汗有汗要無汗在裡補瀉有兩科宜補宜瀉宜利亮宜補宜瀉要拿住病不然反覺利害不必婆婆媽媽去開拓半表半裡宜化痰大除痰飲是正著以常山不二飲十棗湯為例亦有初得之時甚狼狽溫涼補瀉一齊搓雖然用藥甚是雜按脈切理那裡錯此病便作瘟疫治俟他少輕加截藥不俟少輕必截不住時候久了即作雜症論不必泥住濕痰瘧溫涼補瀉各有脈加上治痰便不錯無痰不作瘧但治此症宜狼豁先去截頭為正著凡病皆宜截頭若是截頭用狼豁一付兩付便如初只因此症來里猛他用虐時我亦虐瘧者虐也要顧名思義即用熱補宜金剛不可仙丹養太和何必如此設名色瘧有熱瘧寒瘧風瘧暑瘧濕瘧痰瘧經瘧臟瘧食瘧瘴瘧鬼瘧之分使人心神無捉摸治痢積以濕熱論痢積皆因積滯生涼氣涼血要分清不論紅白皆濕熱貿然用補便不通氣分要將檳榔用血分無如白芍精只宜清利去刮摩積滯黏膩非刮摩不行不可硝芒硝黃大黃用大行大行便將積滯滑過去此症皆由肝橫來剋土用行藥土愈虧肝愈橫不如用生芍以斂之生芍多用是正經即在氣分亦宜多用至於年老與久痢不可執此以為名宜熱宜補又宜澀返還元陽是正經此皆治痢之大略還要脈理為真憑夏秋感暑熱之氣患痢膿血甚有日夜百幾十次不止者至危至急之症也如用涼藥止血利藥攻邪俱非善法余每治此症僅用和平緩淡之藥故能痢止身健亦無損於正氣方用當歸白芍多至二兩枳殼檳榔各二錢陳卜子蘿蔔子西滑石各三錢木香甘草各一錢煎服輕者一劑至重者二三劑即愈妙在歸芍之多用平肝氣即所以和脾也脾胃有生髮之機大腸有轉導之化卜子檳榔消積之神劑木香甘草調和於遲速之間使瘀滯盡除而無內留宿毒之患矣余治此症數十年屢試屢驗故敢筆之於篇末孫鎮川謹識治痢以平肝為主百般病症皆由肝況乎痢積在夏天濕熱抑鬱不能達肝木條暢甚是難不是胸膈有不順便是滯泥在腸間人說宜用厲劑去行他吾說此症開胸最為先胸膈一開飲食進已得治病之大端雖然濕熱盡在脾豈知橫抉皆在肝青皮能疏肝桃仁能破肝再加生芍白芍二三兩使他脾里去斂肝當歸能滑潤車前能鑽研亦是治痢之金丹不論紅白皆濕熱總以二物為最先如果痢疾盡白膿腹毛檳榔宜多添川貝川樸不相離枳殼枳實齊上前看似清利去治脾實以平肝為主權生地丹皮皆帶用木通澤瀉緊接連吾嘗治此千千萬無不條暢老根源至於年老與久痢又以熱補為真詮吾嘗作有治痢詩蒙醫須讀那一篇濕熱已久內里必有綠水藏在元府之裡宜細治之凡是風腫先腫頭眼皮腫麵皮腫水腫定從腳上流流在腳上是證見斷乎濕熱聚中州況乎心肺有證見二寸翻飽又寸頭定是肝橫來剋土一寒一熱生綠油晝里痞悶夜乾燒專與此人作對頭欲將此症連根拔必瀉綠水方能休但是此癥結已久驟瀉綠水使人愁凡是大瀉必大吐瀉里緊了入九幽如此病症熱已深必有黃水在外頭先瀉黃水病半愈即扶正氣建根由正氣一旺能飲食再進行藥便周流即有綠水在內里金丹一到便出頭此是治病真節次補瀉相間方無憂大凡治病遵素問大積大聚有正謀我嘗治此甚擔心故敢著之為論頭病脈與病症一一相合尤須細治方子精良脈上存脈不精良何處尋我之方子雖從脈上得只按三部亦不真凡是脈出寸口空中飛必用牛黃牛黃散始合機二胡柴胡前胡二活羌活獨活恆相依三麻麻黃升麻天麻三花凌霄花菊花覆花必為歸凡是脈走下部甚是長必用金丹始為良左邊必加利水藥右邊更須去寬腸此是瀉法真證見吾欲銘之於鼎常況乎瘧痢時症常大燒限定時刻不可逃太陽證見日亭午陽明燥金未申交少陽寒熱寅卯見限定時刻甚昭昭再與脈理細參想那有溫涼補瀉差分毫我嘗治一右尺拉尾巴右尺出乎本位甚長胃中劈柴見一條胃中脈絲絲乾硬不和此是沉寒真證見不用大瀉不能消宜用牛黃散先瀉黃水後綠水一瀉瀉有廿余遭凡是大瀉必大吐幾乎一命入陰曹大積大聚去其大半而止自是千古定法此人性急不能少待故致過下之過即用參耆肉附四五兩始得屈平把命招雖然沉積盡去了不如和緩為最高此是僥倖以成功若不成功怨滔滔濕腫非兼巴霜不可宜相虛實量加之巴豆利濕最相宜一切濕腫他為師只要多加培土藥不怕病大難支持肉肉桂附附子吳萸能生火早為脾土立根基蒼蒼朮麻麻黃獨活能散濕早為脾土作防維再用十棗十棗湯量加三四分作引子水往下流不侵脾脾土旺盛堤防固不怕江河日日滋我嘗遇症甚是危痰涎湧盛濕無疑濕熱出不去便作痰涎上湧伸手攝住腎子子好如冰彈包熱皮凡是大寒症腎子無有不涼者以此為人命之根也此是貼身大證見何須診脈細細思小腹微腫有邊是有水氣宜瀉小腹微腫下邊起便是濕寒結在裡十棗湯頭正用著大瀉寒濕病自已大寒結滯不宜用行藥水本柔軟不用說一到隆冬便似鐵人本空空無有物一受風寒便心咄甚至上下滯不通大腫大脹痛欲絕豈真食積塞滿胸不過濕寒水暗結只宜蒼蒼朮麻麻黃二活羌活獨活去透發肉肉桂附附子吳萸炮姜歠連吃兩付便流通內里溫散外洞澈亦有蔥姜炒麩拓亦有椒桂入齒齧不可妄意用行藥一見硝芒硝黃大黃把命折有用二醜與巴豆不過席上地下別只因人身虛弱甚以致此症似霜雪一見陽春便回來宜從此處想真訣陰黃陽黃治法有辨黃病皆因濕作熱抑鬱之久無從泄不是皮色黃花染便是二目黃表貼治宜蒼朮與茵陳黑礬燒紅梔子往下掣泡入酒中加陳皮紅糖為引細細嚼每晚服一切濕氣盡引下便無身黃使人說又有陰黃寒最重彼色明亮此有別必用肉桂與附子灰暗煙燻始盡撤陰黃陽黃有兩般不得泥住清涼不用熱此是治病之大關須探本原連根抉按黃病之症一身盡黃兩目亦黃雖成於濕熱畢竟脾虛不能分消水濕以致鬱而成黃余用薏苡三兩茯苓一兩茵陳三錢陳皮二錢車前一兩上肉桂三分芡實三錢大劑服之分消水濕前藥多是健脾固氣之品用茵陳以解濕熱肉桂引水入於膀眈從小便出三四劑後減半加白朮五錢服之再用二三劑愈後永無後患矣孫鎮川謹識治腿以破小腸為主一身之氣注小腸才有腿疼尿必黃縱然不黃尿必熱大抵鬱滯在膀胱如若濕熱陷下焦腿腫腎亦腫大破肝腎加之涼金丹紫金丹和藥甚是好只消一付立除殃亦有虛弱用熱補必借十棗為之湯斑蟊二枚為引子大加升提是神方脈上部皆空便加風藥升提此症出來多左腿大約腎虛遭禍殃間有乾枯虛弱甚必補腎水滋元陽歸地宿砂故紙之類如滯膀胱氣不通恐怕不久見閻王吾嘗治此千千萬溫涼補瀉細酌量註定太陽用宣泄不滯此竅最為良腿疼即弱症亦須先行後補凡是疼痛皆不通不得行藥總不中吾嘗以此治堅結不料二腿疼痛亦能松二腿紅腫常用此一付二付便收功誰知骨瘦如柴虛弱甚一用打藥亦甚靈斑蟊一到小腸開滴滴達達尿甚紅金丹一到大腸開積積渣渣下黏膿初時不見有重輕吾意打藥必不中再與二黃硫黃地黃共為丸三兩把數日之間走如風一闔一闢天地理始知此症總宜通但是大黃用不得其性寒涼欠沖融吾嘗治此用金丹以其有山甲以其有蜈蚣以其有全蠍以其有明雄兼些莪莪朮稜與鬱金能開竅能和衷能散寒能除風不怕上去行里猛只要後頭暖融融一付兩付便能愈方知行藥甚有功百病以通利為主虛症宜少用不宜多用治腿疼痛離不了金丹如今氣運大不同但觀治腿已分清古時治腿分虛實今時治腿總宜通腿腫腿脹無論矣縱是虛弱亦要行吾嘗治此一切症離了金丹便不中細究此症真消息始知脈竄上焦下焦空雖然下焦宜用補不瀉上焦脈不行瀉到下焦歸本位便無疼痛諸毛病此真氣運一大變不常治此總朦朧疝症皆起於濕寒疝氣皆因濕與寒濕寒作熱痛不堪不是濕氣不下流不是寒氣他不頑頑住氣血一大塊那有真火在其間不用大熱硬不消不用大破氣不旋不用除風他不散不用去濕他不寬再加升升麻柴柴胡往上提再加溫和透余寒清涼不妨少用些引出濕熱便能痊以此治疝甚得法不怕腫硬數十年治疝氣方吾嘗見一疝症當立一方一藥而愈疝氣初起腎子堅肉肉桂附附子吳萸加金丹青皮當歸白芍藥椒川椒茴西茴故紙引歸元三陳薏米並滲濕二胡前胡柴胡升麻提上顛病在下者取諸上清氣上升濁氣下降辛細辛本少陰藥芷白芷消腫黃柏帶清熱斑蟊三個直下達陰關膽顫心寒症治方人有膽顫心寒之症皆是濕毒痰涎為祟治以白砒為最我治吐血症數天忽得膽顫並心寒知是痰涎為祟果即用火煉降仙丹火煉降仙丹有名不得治法總不佔必須白信如硫璃白如硫璃明如玉始堪以治內症若外症則不拘乎此矣必須蕎麥麵裹圓蕎麥麵大制信毒雖吃一分亦無礙必須烈火燒透亮必須陳醋濕周全打開信石用一兩明雄就得二兩研共合一處為細末便是涼水降仙丹用此藥以涼水為引每吃二釐便能愈無不應手立時痊如若吃時先相脈脈上無火純是寒或是二寸頭上如麥屑或是二寸頭上如針尖皆是濕寒怪怪症此藥下去穩如山如若脈上數有力不必此藥作舟船試觀京都甚重靈寶丹亦是明雄和砒研但是修合甚得法以治濕寒天下傳我制此藥不及此以治濕寒類瘧子以治痰迷類風顛無不一藥而愈如刀剜如若外治身上疼只用生研入膏丹如若外治瘡爛口只合輕粉共枯礬滲爛肉上微有癢意即宜洗去另上長藥如若外治疥痕干只合巴霜豬油煎內治外治皆有力毒症得此若遇仙若是脈症不清楚不必將此置市前陰寒就是大毒物我膀疼痛不能行多少妙藥全不靈一用菩薩三十六金剛一帖貼之便收功菩薩膏中多毒藥以毒攻毒毒便輕我膀疼痛無甚毒只因年老毛竅松試觀李華弔古文墮指裂膚處處同陰寒就是大毒物那有一個悟當躬試思洞房花燭暖融融猶有一二變成凶陰風入骨寒入竅誰能出此圈套中痛癢本於濕寒非用熱藥毒藥亦不能了凡是痛癢本濕寒時候久了熱不堪治以清涼必不效熱藥毒藥宜對參常治小兒尿不得腎痛腎癢不能堪內用肉肉桂附附子並斑斑蟊麻蓖麻外用醋麩共熱磚又治小兒癢不堪和血涼血全不佔外用輕粉和潮腦內用硫黃與馬前只消一付便能愈那有痛癢不能安有人好用太平藥一遇此症便茫然豈知聖人致治理削平禍亂最為先濕熱創治法惟有一婦病難療心中痛癢不能招兼之玉門起燎泡小水不下腫不消我用苦參七八兩只消一付除根苗此是濕熱創始法混入惡毒便失調治濕寒方水銀銀硃本治楊梅之要藥凡治濕寒熱結必須以此為例欲用毒藥有真詮不得真詮莫妄談果能用之真的當不用渣滓只用煙水銀銀硃並黃丹安息香合麝片菸清晨漱口吸四袋連吃四天便清宣皆如此吃內不傷臟腑外把病立剜瘡症三天便結痂不過身上微含懶不過口中痛流涎晝里忌鹽七天正夜裡銜枚始能安任是楊梅天大毒一見此藥便豁然方詳四卷外科門此毒能治他毒不用說矣以治濕寒老瘧子以治濕寒吐水黏以治濕寒起疙瘩脖項腫硬堅如鐵石以治濕寒死眼前一切痰厥狀類羊羔風此藥燥烈無與比抉住根子把病剜看似大毒服不得清煙一過便了然縱有天師再臨凡亦必謂此為飛丹此藥可名飛仙丹試觀菩薩僅有三十六金剛僅有毒藥不可餐甘遂動數兩二兩生用巴豆恆數錢八錢生研川烏草烏各一兩生用皆能用蠍子七錢蜈蚣十條緊相連芫花七錢大戟八錢一齊入陀僧四兩木鱉一兩共細研只緣用之真的當況且過火入油煎吾輩脈理果通達即不過火亦能餐凡此皆是濕寒生暗毒雜入群藥最便便我嘗用些三生引以治滑瀉甚安然只緣雜入群藥有包羅正可與此相對參莫謂毒藥甚可駭毒症須得毒藥剜試觀古來治國亦如此用賊擒賊把邊安以毒攻毒甚是好壯士長歌入漢關濕寒雜疾宜用雷火再進丸藥濕寒雜疾脈無神淹淹纏纏入鬼林縱有名藥不見效不如先進雷火洗幾巡此症盡是濕寒水脾胃敗極飯不親惟宜干酒去點著洗了前心洗後心洗至數巡身變熱一回便得酒一斤天天洗了天天搬後心更比前心親前心多骨搬不住後心脊骨兩邊尋上至頸項下尾閭罐罐比接罐罐勻一切濕寒盡拔出再用丸藥便回春宜補相火宜健脾茶湯茶水少入唇如此連日用洗法不怕二豎與為鄰治酒病有先熱後寒之分醉漢心裡亂翻花好似馬前飼暮鴉初得之時皆濕熱必須清涼瀉胃家噦嘔可證山楂乾葛宜多用以其能解酒味嘉時候久了便成寒再用此藥必不佔必須川烏草烏散脾濕憎寒可證必須肉肉桂附附子吳萸暖命元肚痛可證間有五內虛寒甚參黨參術白朮苓雲苓半半夏宜多餐亦有烏梅成兩用以其收斂帶平肝此皆治酒之要藥前後脈理要細參初時皆熱久了便寒凡症類然而酒尤甚焉者治沉寒必須重加透澈藥始得治病總要去透澈一不透澈便隔越於今四月日猶蝕於今五月天下熱盡皆陰寒為病疾不見陽和便卼臲或是抑鬱成痿痹或是腫硬暗結血必須蒼朮麻黃之溫散必須乾薑獨活之燥烈必須川烏草烏之峻發必須肉桂吳萸之辛熱必須馬前烏蛇之利竅必須山甲全蠍之洞穴內用蔥酒和藥煎外炒黑豆將皮貼如再陰寒透不出再加金丹為妙訣我嘗治此千千萬無不陽春化積雪
  hash: sha256:ed965951c25280586f9759cd54d2acd161ed22342f69106389b0be887e7b4659
  markers:
  - {type: 'tls:head', offset: 0, content: '', id: KR3eq093_jc_003-d9.h1s1}
  - {type: 'tls:div-start', offset: 2, content: '', id: KR3eq093_jc_003-d9d2, level: 2, head_text: 調氣總歌}
  - {type: 'tls:head', offset: 2, content: '', id: KR3eq093_jc_003-d9.d2.h1s1}
  - {type: 'tls:div-end', offset: 319, content: '', id: KR3eq093_jc_003-d9d2}
  - {type: 'tls:div-start', offset: 319, content: '', id: KR3eq093_jc_003-d9d3, level: 2, head_text: 丹溪治病以調氣為先}
  - {type: 'tls:head', offset: 319, content: '', id: KR3eq093_jc_003-d9.d3.h1s1}
  - {type: 'tls:div-end', offset: 538, content: '', id: KR3eq093_jc_003-d9d3}
  - {type: 'tls:div-start', offset: 538, content: '', id: KR3eq093_jc_003-d9d4, level: 2, head_text: 治病以調氣為主即調血亦調血中之氣也故以調氣名之}
  - {type: 'tls:head', offset: 538, content: '', id: KR3eq093_jc_003-d9.d4.h1s1}
  - {type: 'tls:div-end', offset: 727, content: '', id: KR3eq093_jc_003-d9d4}
  - {type: 'tls:div-start', offset: 727, content: '', id: KR3eq093_jc_003-d9d5, level: 2, head_text: 順氣調氣下氣有三法惟下氣為最難}
  - {type: 'tls:head', offset: 727, content: '', id: KR3eq093_jc_003-d9.d5.h1s1}
  - {type: 'tls:div-end', offset: 943, content: '', id: KR3eq093_jc_003-d9d5}
  - {type: 'tls:div-start', offset: 943, content: '', id: KR3eq093_jc_003-d9d6, level: 2, head_text: 年老有積亦當攻伐}
  - {type: 'tls:head', offset: 943, content: '', id: KR3eq093_jc_003-d9.d6.h1s1}
  - {type: 'tls:div-end', offset: 1288, content: '', id: KR3eq093_jc_003-d9d6}
  - {type: 'tls:div-start', offset: 1288, content: '', id: KR3eq093_jc_003-d9d7, level: 2, head_text: 年老補瀉並用亦是治法}
  - {type: 'tls:head', offset: 1288, content: '', id: KR3eq093_jc_003-d9.d7.h1s1}
  - {type: 'tls:div-end', offset: 1410, content: '', id: KR3eq093_jc_003-d9d7}
  - {type: 'tls:div-start', offset: 1410, content: '', id: KR3eq093_jc_003-d9d8, level: 2, head_text: 老人疼痛多是氣虛生痰}
  - {type: 'tls:head', offset: 1410, content: '', id: KR3eq093_jc_003-d9.d8.h1s1}
  - {type: 'tls:div-end', offset: 1562, content: '', id: KR3eq093_jc_003-d9d8}
  - {type: 'tls:div-start', offset: 1562, content: '', id: KR3eq093_jc_003-d9d9, level: 2, head_text: 治病先治肝}
  - {type: 'tls:head', offset: 1562, content: '', id: KR3eq093_jc_003-d9.d9.h1s1}
  - {type: 'tls:div-end', offset: 1736, content: '', id: KR3eq093_jc_003-d9d9}
  - {type: 'tls:div-start', offset: 1736, content: '', id: KR3eq093_jc_003-d9d10, level: 2, head_text: 雜病多在陰分宜從陰分尋出路大病久病亦然}
  - {type: 'tls:head', offset: 1736, content: '', id: KR3eq093_jc_003-d9.d10.h1s1}
  - {type: 'tls:div-end', offset: 2260, content: '', id: KR3eq093_jc_003-d9d10}
  - {type: 'tls:div-start', offset: 2260, content: '', id: KR3eq093_jc_003-d9d11, level: 2, head_text: 金丹亦能解表}
  - {type: 'tls:head', offset: 2260, content: '', id: KR3eq093_jc_003-d9.d11.h1s1}
  - {type: 'tls:div-end', offset: 2445, content: '', id: KR3eq093_jc_003-d9d11}
  - {type: 'tls:div-start', offset: 2445, content: '', id: KR3eq093_jc_003-d9d12, level: 2, head_text: 治病須要兼風藥}
  - {type: 'tls:head', offset: 2445, content: '', id: KR3eq093_jc_003-d9.d12.h1s1}
  - {type: 'tls:div-end', offset: 2718, content: '', id: KR3eq093_jc_003-d9d12}
  - {type: 'tls:div-start', offset: 2718, content: '', id: KR3eq093_jc_003-d9d13, level: 2, head_text: 治病風藥斷不可少}
  - {type: 'tls:head', offset: 2718, content: '', id: KR3eq093_jc_003-d9.d13.h1s1}
  - {type: 'tls:div-end', offset: 2944, content: '', id: KR3eq093_jc_003-d9d13}
  - {type: 'tls:div-start', offset: 2944, content: '', id: KR3eq093_jc_003-d9d14, level: 2, head_text: 肝經虛弱反生橫決之病非補不行}
  - {type: 'tls:head', offset: 2944, content: '', id: KR3eq093_jc_003-d9.d14.h1s1}
  - {type: 'tls:div-end', offset: 3292, content: '', id: KR3eq093_jc_003-d9d14}
  - {type: 'tls:div-start', offset: 3292, content: '', id: KR3eq093_jc_003-d9d15, level: 2, head_text: 肝木虛橫只宜補脾脾土一旺肝自收斂不敢與土為敵矣雖不補肝而補肝之理自寓焉}
  - {type: 'tls:head', offset: 3292, content: '', id: KR3eq093_jc_003-d9.d15.h1s1}
  - {type: 'tls:div-end', offset: 3415, content: '', id: KR3eq093_jc_003-d9d15}
  - {type: 'tls:div-start', offset: 3415, content: '', id: KR3eq093_jc_003-d9d16, level: 2, head_text: 肝經治之不得宜從脾土下手}
  - {type: 'tls:head', offset: 3415, content: '', id: KR3eq093_jc_003-d9.d16.h1s1}
  - {type: 'tls:div-end', offset: 3604, content: '', id: KR3eq093_jc_003-d9d16}
  - {type: 'tls:div-start', offset: 3604, content: '', id: KR3eq093_jc_003-d9d17, level: 2, head_text: 頭上諸症以牛黃散為主藥紫金丹亦可}
  - {type: 'tls:head', offset: 3604, content: '', id: KR3eq093_jc_003-d9.d17.h1s1}
  - {type: 'tls:div-end', offset: 3807, content: '', id: KR3eq093_jc_003-d9d17}
  - {type: 'tls:div-start', offset: 3807, content: '', id: KR3eq093_jc_003-d9d18, level: 2, head_text: 頭上清涼發散必兼流行始妙}
  - {type: 'tls:head', offset: 3807, content: '', id: KR3eq093_jc_003-d9.d18.h1s1}
  - {type: 'tls:div-end', offset: 3920, content: '', id: KR3eq093_jc_003-d9d18}
  - {type: 'tls:div-start', offset: 3920, content: '', id: KR3eq093_jc_003-d9d19, level: 2, head_text: 如今病以治風為主}
  - {type: 'tls:head', offset: 3920, content: '', id: KR3eq093_jc_003-d9.d19.h1s1}
  - {type: 'tls:div-end', offset: 4101, content: '', id: KR3eq093_jc_003-d9d19}
  - {type: 'tls:div-start', offset: 4101, content: '', id: KR3eq093_jc_003-d9d20, level: 2, head_text: 頭上諸症亦有陰毒結就}
  - {type: 'tls:head', offset: 4101, content: '', id: KR3eq093_jc_003-d9.d20.h1s1}
  - {type: 'tls:div-end', offset: 4259, content: '', id: KR3eq093_jc_003-d9d20}
  - {type: 'tls:div-start', offset: 4259, content: '', id: KR3eq093_jc_003-d9d21, level: 2, head_text: 牙疼有假火}
  - {type: 'tls:head', offset: 4259, content: '', id: KR3eq093_jc_003-d9.d21.h1s1}
  - {type: 'tls:div-end', offset: 4411, content: '', id: KR3eq093_jc_003-d9d21}
  - {type: 'tls:div-start', offset: 4411, content: '', id: KR3eq093_jc_003-d9d22, level: 2, head_text: 治咽喉諸症宜分虛實}
  - {type: 'tls:head', offset: 4411, content: '', id: KR3eq093_jc_003-d9.d22.h1s1}
  - {type: 'tls:div-end', offset: 4566, content: '', id: KR3eq093_jc_003-d9d22}
  - {type: 'tls:div-start', offset: 4566, content: '', id: KR3eq093_jc_003-d9d23, level: 2, head_text: 咽喉兩邊有硬根多是陰毒結就成}
  - {type: 'tls:head', offset: 4566, content: '', id: KR3eq093_jc_003-d9.d23.h1s1}
  - {type: 'tls:div-end', offset: 4812, content: '', id: KR3eq093_jc_003-d9d23}
  - {type: 'tls:div-start', offset: 4812, content: '', id: KR3eq093_jc_003-d9d24, level: 2, head_text: 治今喉症以除風為主}
  - {type: 'tls:head', offset: 4812, content: '', id: KR3eq093_jc_003-d9.d24.h1s1}
  - {type: 'tls:div-end', offset: 5118, content: '', id: KR3eq093_jc_003-d9d24}
  - {type: 'tls:div-start', offset: 5118, content: '', id: KR3eq093_jc_003-d9d25, level: 2, head_text: 少年人喉疼多是寒症}
  - {type: 'tls:head', offset: 5118, content: '', id: KR3eq093_jc_003-d9.d25.h1s1}
  - {type: 'tls:div-end', offset: 5514, content: '', id: KR3eq093_jc_003-d9d25}
  - {type: 'tls:div-start', offset: 5514, content: '', id: KR3eq093_jc_003-d9d26, level: 2, head_text: 婦人喉症因陰虛而得者不少}
  - {type: 'tls:head', offset: 5514, content: '', id: KR3eq093_jc_003-d9.d26.h1s1}
  - {type: 'tls:div-end', offset: 5910, content: '', id: KR3eq093_jc_003-d9d26}
  - {type: 'tls:div-start', offset: 5910, content: '', id: KR3eq093_jc_003-d9d27, level: 2, head_text: 風火上壅咳嗽不已在本人皆以為寒豈知因濕生熱因熱生風往往如此不可不知}
  - {type: 'tls:head', offset: 5910, content: '', id: KR3eq093_jc_003-d9.d27.h1s1}
  - {type: 'tls:div-end', offset: 6188, content: '', id: KR3eq093_jc_003-d9d27}
  - {type: 'tls:div-start', offset: 6188, content: '', id: KR3eq093_jc_003-d9d28, level: 2, head_text: 隆冬驟得寒嗽皆是風毒為祟治以馬前丸為最}
  - {type: 'tls:head', offset: 6188, content: '', id: KR3eq093_jc_003-d9.d28.h1s1}
  - {type: 'tls:div-end', offset: 6489, content: '', id: KR3eq093_jc_003-d9d28}
  - {type: 'tls:div-start', offset: 6489, content: '', id: KR3eq093_jc_003-d9d29, level: 2, head_text: 症雜藥雜有先後遞用者}
  - {type: 'tls:head', offset: 6489, content: '', id: KR3eq093_jc_003-d9.d29.h1s1}
  - {type: 'tls:div-end', offset: 6676, content: '', id: KR3eq093_jc_003-d9d29}
  - {type: 'tls:div-start', offset: 6676, content: '', id: KR3eq093_jc_003-d9d30, level: 2, head_text: 白露前後病同治不同}
  - {type: 'tls:head', offset: 6676, content: '', id: KR3eq093_jc_003-d9.d30.h1s1}
  - {type: 'tls:div-end', offset: 6919, content: '', id: KR3eq093_jc_003-d9d30}
  - {type: 'tls:div-start', offset: 6919, content: '', id: KR3eq093_jc_003-d9d31, level: 2, head_text: 夏秋吐瀉交加雖甚危殆補藥宜慎}
  - {type: 'tls:head', offset: 6919, content: '', id: KR3eq093_jc_003-d9.d31.h1s1}
  - {type: 'tls:div-end', offset: 7083, content: '', id: KR3eq093_jc_003-d9d31}
  - {type: 'tls:div-start', offset: 7083, content: '', id: KR3eq093_jc_003-d9d32, level: 2, head_text: 病尋出路宜順勢而導之}
  - {type: 'tls:head', offset: 7083, content: '', id: KR3eq093_jc_003-d9.d32.h1s1}
  - {type: 'tls:div-end', offset: 7463, content: '', id: KR3eq093_jc_003-d9d32}
  - {type: 'tls:div-start', offset: 7463, content: '', id: KR3eq093_jc_003-d9d33, level: 2, head_text: 病在上取諸下病在下取諸上皆是要著}
  - {type: 'tls:head', offset: 7463, content: '', id: KR3eq093_jc_003-d9.d33.h1s1}
  - {type: 'tls:div-end', offset: 7698, content: '', id: KR3eq093_jc_003-d9d33}
  - {type: 'tls:div-start', offset: 7698, content: '', id: KR3eq093_jc_003-d9d34, level: 2, head_text: 治病須要順時令}
  - {type: 'tls:head', offset: 7698, content: '', id: KR3eq093_jc_003-d9.d34.h1s1}
  - {type: 'tls:div-end', offset: 7838, content: '', id: KR3eq093_jc_003-d9d34}
  - {type: 'tls:div-start', offset: 7838, content: '', id: KR3eq093_jc_003-d9d35, level: 2, head_text: 治病要臨時得竅不論好歹藥}
  - {type: 'tls:head', offset: 7838, content: '', id: KR3eq093_jc_003-d9.d35.h1s1}
  - {type: 'tls:div-end', offset: 8004, content: '', id: KR3eq093_jc_003-d9d35}
  - {type: 'tls:div-start', offset: 8004, content: '', id: KR3eq093_jc_003-d9d36, level: 2, head_text: 治病有標本之殊}
  - {type: 'tls:head', offset: 8004, content: '', id: KR3eq093_jc_003-d9.d36.h1s1}
  - {type: 'tls:div-end', offset: 8145, content: '', id: KR3eq093_jc_003-d9d36}
  - {type: 'tls:div-start', offset: 8145, content: '', id: KR3eq093_jc_003-d9d37, level: 2, head_text: 心中虛滿與實症不同只宜空中著眼方見手法又有隔二隔三治法不可不知}
  - {type: 'tls:head', offset: 8145, content: '', id: KR3eq093_jc_003-d9.d37.h1s1}
  - {type: 'tls:div-end', offset: 8394, content: '', id: KR3eq093_jc_003-d9d37}
  - {type: 'tls:div-start', offset: 8394, content: '', id: KR3eq093_jc_003-d9d38, level: 2, head_text: 腑病治臟臟病治腑原自相通}
  - {type: 'tls:head', offset: 8394, content: '', id: KR3eq093_jc_003-d9.d38.h1s1}
  - {type: 'tls:div-end', offset: 8581, content: '', id: KR3eq093_jc_003-d9d38}
  - {type: 'tls:div-start', offset: 8581, content: '', id: KR3eq093_jc_003-d9d39, level: 2, head_text: 臟腑之病不同治法亦異}
  - {type: 'tls:head', offset: 8581, content: '', id: KR3eq093_jc_003-d9.d39.h1s1}
  - {type: 'tls:div-end', offset: 8721, content: '', id: KR3eq093_jc_003-d9d39}
  - {type: 'tls:div-start', offset: 8721, content: '', id: KR3eq093_jc_003-d9d40, level: 2, head_text: 中秋人有疼痛噦瀉皆是伏暑未盡看似寒症不可遽以寒論}
  - {type: 'tls:head', offset: 8721, content: '', id: KR3eq093_jc_003-d9.d40.h1s1}
  - {type: 'tls:div-end', offset: 9068, content: '', id: KR3eq093_jc_003-d9d40}
  - {type: 'tls:div-start', offset: 9068, content: '', id: KR3eq093_jc_003-d9d41, level: 2, head_text: 寒噦火噦皆因氣虛統不住宜健脾為主餘隻帶治}
  - {type: 'tls:head', offset: 9068, content: '', id: KR3eq093_jc_003-d9.d41.h1s1}
  - {type: 'tls:div-end', offset: 9585, content: '', id: KR3eq093_jc_003-d9d41}
  - {type: 'tls:div-start', offset: 9585, content: '', id: KR3eq093_jc_003-d9d42, level: 2, head_text: 治瘧以平肝為主}
  - {type: 'tls:head', offset: 9585, content: '', id: KR3eq093_jc_003-d9.d42.h1s1}
  - {type: 'tls:div-end', offset: 10049, content: '', id: KR3eq093_jc_003-d9d42}
  - {type: 'tls:div-start', offset: 10049, content: '', id: KR3eq093_jc_003-d9d43, level: 2, head_text: 瘧疾不易治要有把握以傷寒瘟疫雜症括盡治瘧之理是我家創治法}
  - {type: 'tls:head', offset: 10049, content: '', id: KR3eq093_jc_003-d9.d43.h1s1}
  - {type: 'tls:div-end', offset: 10382, content: '', id: KR3eq093_jc_003-d9d43}
  - {type: 'tls:div-start', offset: 10382, content: '', id: KR3eq093_jc_003-d9d44, level: 2, head_text: 治痢積以濕熱論}
  - {type: 'tls:head', offset: 10382, content: '', id: KR3eq093_jc_003-d9.d44.h1s1}
  - {type: 'tls:div-end', offset: 10755, content: '', id: KR3eq093_jc_003-d9d44}
  - {type: 'tls:div-start', offset: 10755, content: '', id: KR3eq093_jc_003-d9d45, level: 2, head_text: 治痢以平肝為主}
  - {type: 'tls:head', offset: 10755, content: '', id: KR3eq093_jc_003-d9.d45.h1s1}
  - {type: 'tls:div-end', offset: 11005, content: '', id: KR3eq093_jc_003-d9d45}
  - {type: 'tls:div-start', offset: 11005, content: '', id: KR3eq093_jc_003-d9d46, level: 2, head_text: 濕熱已久內里必有綠水藏在元府之裡宜細治之}
  - {type: 'tls:head', offset: 11005, content: '', id: KR3eq093_jc_003-d9.d46.h1s1}
  - {type: 'tls:div-end', offset: 11241, content: '', id: KR3eq093_jc_003-d9d46}
  - {type: 'tls:div-start', offset: 11241, content: '', id: KR3eq093_jc_003-d9d47, level: 2, head_text: 病脈與病症一一相合尤須細治}
  - {type: 'tls:head', offset: 11241, content: '', id: KR3eq093_jc_003-d9.d47.h1s1}
  - {type: 'tls:div-end', offset: 11596, content: '', id: KR3eq093_jc_003-d9d47}
  - {type: 'tls:div-start', offset: 11596, content: '', id: KR3eq093_jc_003-d9d48, level: 2, head_text: 濕腫非兼巴霜不可宜相虛實量加之}
  - {type: 'tls:head', offset: 11596, content: '', id: KR3eq093_jc_003-d9.d48.h1s1}
  - {type: 'tls:div-end', offset: 11784, content: '', id: KR3eq093_jc_003-d9d48}
  - {type: 'tls:div-start', offset: 11784, content: '', id: KR3eq093_jc_003-d9d49, level: 2, head_text: 小腹微腫有邊是有水氣宜瀉}
  - {type: 'tls:head', offset: 11784, content: '', id: KR3eq093_jc_003-d9.d49.h1s1}
  - {type: 'tls:div-end', offset: 11824, content: '', id: KR3eq093_jc_003-d9d49}
  - {type: 'tls:div-start', offset: 11824, content: '', id: KR3eq093_jc_003-d9d50, level: 2, head_text: 大寒結滯不宜用行藥}
  - {type: 'tls:head', offset: 11824, content: '', id: KR3eq093_jc_003-d9.d50.h1s1}
  - {type: 'tls:div-end', offset: 12005, content: '', id: KR3eq093_jc_003-d9d50}
  - {type: 'tls:div-start', offset: 12005, content: '', id: KR3eq093_jc_003-d9d51, level: 2, head_text: 陰黃陽黃治法有辨}
  - {type: 'tls:head', offset: 12005, content: '', id: KR3eq093_jc_003-d9.d51.h1s1}
  - {type: 'tls:div-end', offset: 12278, content: '', id: KR3eq093_jc_003-d9d51}
  - {type: 'tls:div-start', offset: 12278, content: '', id: KR3eq093_jc_003-d9d52, level: 2, head_text: 治腿以破小腸為主}
  - {type: 'tls:head', offset: 12278, content: '', id: KR3eq093_jc_003-d9.d52.h1s1}
  - {type: 'tls:div-end', offset: 12467, content: '', id: KR3eq093_jc_003-d9d52}
  - {type: 'tls:div-start', offset: 12467, content: '', id: KR3eq093_jc_003-d9d53, level: 2, head_text: 腿疼即弱症亦須先行後補}
  - {type: 'tls:head', offset: 12467, content: '', id: KR3eq093_jc_003-d9.d53.h1s1}
  - {type: 'tls:div-end', offset: 12721, content: '', id: KR3eq093_jc_003-d9d53}
  - {type: 'tls:div-start', offset: 12721, content: '', id: KR3eq093_jc_003-d9d54, level: 2, head_text: 治腿疼痛離不了金丹}
  - {type: 'tls:head', offset: 12721, content: '', id: KR3eq093_jc_003-d9.d54.h1s1}
  - {type: 'tls:div-end', offset: 12844, content: '', id: KR3eq093_jc_003-d9d54}
  - {type: 'tls:div-start', offset: 12844, content: '', id: KR3eq093_jc_003-d9d55, level: 2, head_text: 疝症皆起於濕寒}
  - {type: 'tls:head', offset: 12844, content: '', id: KR3eq093_jc_003-d9.d55.h1s1}
  - {type: 'tls:div-end', offset: 12967, content: '', id: KR3eq093_jc_003-d9d55}
  - {type: 'tls:div-start', offset: 12967, content: '', id: KR3eq093_jc_003-d9d56, level: 2, head_text: 治疝氣方}
  - {type: 'tls:head', offset: 12967, content: '', id: KR3eq093_jc_003-d9.d56.h1s1}
  - {type: 'tls:div-end', offset: 13080, content: '', id: KR3eq093_jc_003-d9d56}
  - {type: 'tls:div-start', offset: 13080, content: '', id: KR3eq093_jc_003-d9d57, level: 2, head_text: 膽顫心寒症治方}
  - {type: 'tls:head', offset: 13080, content: '', id: KR3eq093_jc_003-d9.d57.h1s1}
  - {type: 'tls:div-end', offset: 13471, content: '', id: KR3eq093_jc_003-d9d57}
  - {type: 'tls:div-start', offset: 13471, content: '', id: KR3eq093_jc_003-d9d58, level: 2, head_text: 陰寒就是大毒物}
  - {type: 'tls:head', offset: 13471, content: '', id: KR3eq093_jc_003-d9.d58.h1s1}
  - {type: 'tls:div-end', offset: 13594, content: '', id: KR3eq093_jc_003-d9d58}
  - {type: 'tls:div-start', offset: 13594, content: '', id: KR3eq093_jc_003-d9d59, level: 2, head_text: 痛癢本於濕寒非用熱藥毒藥亦不能了}
  - {type: 'tls:head', offset: 13594, content: '', id: KR3eq093_jc_003-d9.d59.h1s1}
  - {type: 'tls:div-end', offset: 13744, content: '', id: KR3eq093_jc_003-d9d59}
  - {type: 'tls:div-start', offset: 13744, content: '', id: KR3eq093_jc_003-d9d60, level: 2, head_text: 濕熱創治法}
  - {type: 'tls:head', offset: 13744, content: '', id: KR3eq093_jc_003-d9.d60.h1s1}
  - {type: 'tls:div-end', offset: 13805, content: '', id: KR3eq093_jc_003-d9d60}
  - {type: 'tls:div-start', offset: 13805, content: '', id: KR3eq093_jc_003-d9d61, level: 2, head_text: 治濕寒方}
  - {type: 'tls:head', offset: 13805, content: '', id: KR3eq093_jc_003-d9.d61.h1s1}
  - {type: 'tls:div-end', offset: 14261, content: '', id: KR3eq093_jc_003-d9d61}
  - {type: 'tls:div-start', offset: 14261, content: '', id: KR3eq093_jc_003-d9d62, level: 2, head_text: 濕寒雜疾宜用雷火再進丸藥}
  - {type: 'tls:head', offset: 14261, content: '', id: KR3eq093_jc_003-d9.d62.h1s1}
  - {type: 'tls:div-end', offset: 14429, content: '', id: KR3eq093_jc_003-d9d62}
  - {type: 'tls:div-start', offset: 14429, content: '', id: KR3eq093_jc_003-d9d63, level: 2, head_text: 治酒病有先熱後寒之分}
  - {type: 'tls:head', offset: 14429, content: '', id: KR3eq093_jc_003-d9.d63.h1s1}
  - {type: 'tls:div-end', offset: 14597, content: '', id: KR3eq093_jc_003-d9d63}
  - {type: 'tls:div-start', offset: 14597, content: '', id: KR3eq093_jc_003-d9d64, level: 2, head_text: 治沉寒必須重加透澈藥始得}
  - {type: 'tls:head', offset: 14597, content: '', id: KR3eq093_jc_003-d9.d64.h1s1}
  - {type: 'tls:div-end', offset: 14761, content: '', id: KR3eq093_jc_003-d9d64}
