body:
  text: 卷二古今用藥不同皇降而王王而霸世運升沉關造化三代以上皆純王三代以下必兼霸治化每隨氣運轉遵此用藥真無價天師生於皇古初岐伯生於黃帝時國初臨凡將世化洋洋大筆甚淋漓滄海無邊把舟駕去今僅餘二百年石室岐伯著石室祕録多用重大之劑附注揚帆立時跨無奈俗醫執不肯案頭小本把人詐豈是二豎未肯離一葦作航妄凌架吾獨把棹不敢移天師謂我不必怕洪波巨浪亂翻花款乃一聲一齊下兩岸人聲亂驚啼吾獨船頭食甘蔗以此方兒去治人可謂霸中又用霸其實穩坐釣魚船未見揶揄小兒把人罵今日謹告小後生不學天師更學嘎余前治一暴得鼻血症已經無藥不投均難稍為遏止因視內熱太甚即用生地一斤佐以生側柏葉炭之類水和生搗取汁涼服立獲神效後又用桃仁紅花當歸等諸和血之品淤血盡從大便而下亦無後患藉此可知先生是言為不虛矣然要看病之淺深緩急萬不可輕施重劑致偏害而莫克挽回也世再晚鄧漢東林春氏拜讀霸藥亦不可少吾謂天師藥甚霸縱有二豎亦不怕其實藥味甚平和和風甘雨連九夏一切大毒藥並未繞筆下但具翻山倒海力不得不謂霸天師之霸原是假後學之霸乃真霸一切攻伐大毒藥往往用之若食蔗毒藥得炮製之法亦不毒矣治病最有力豈是後學好奇異如今世道人心甚可詫不用此藥便不靈用得此藥回造化如今之人多厄逆不用此藥不能下如今之人多喉閉不用此藥不能下如今之人多塞胸不用此藥不能下如今之人多癥結不用此藥不能下如今之人多瘰癧不用此藥不能下如今之人多石淋不用此藥不能下如今之人多鬼窟不用此藥不能下有此奇奇怪怪症必用奇奇怪怪藥安能捨此不用罷吾嘗立方時必兼此味作舟駕雖有堂堂正正藥舍了此味不神化譬如由基射伯棼只在當面那一詐譬如關帝斬蔡陽只在背後那一叱如此一點藥不必多用一點就到也最靈也最捷好似神龍飛火射今日謹告小後主莫謂江東無小霸凡用霸道毒藥其勢不得不然非有過人之識脈理分明病原參透不可妄加至炮製藥時尤要遵古今良法百倍其功轉極毒之品成極平之性否則恐致誤事孫鎮川謹識毒藥按法炮製最有奇功篇中言厄逆等症每因氣鬱所致用此藥則氣血周流上下貫通病自愈矣非病症察明勿妄投侄孫浚川謹識治病有先霸后王之不同大熱大涼有幾番用得好時病立痊病一痊時便須已不如和緩為上仙大補大瀉有幾番用得好時病立痊病一痊時便須已不如平妥為上仙凡是病症皆有偏不得矯枉過正必不安好似秦人之暴虐必得霸王之鐵鞭一若平定了便須治世之曹參治病亦如治天下有時用霸王霸藥專治暴症有時用曹參日飲醇酒以自樂又有黃老那一篇大病已竟抉去了全憑蓋公去周旋治病有和緩治法仍以和緩為是凡大攻伐之後邪雖去而正氣虧矣若培養稍差致變他症亦復不少慎之慎之然尤不可因循以誤事也林春謹識病有可以用霸之時則霸之可以用王之時則王之蓋醫道亦宜學君子而時中也侄金門敬識病宜用金丹不論老弱貴賤客有問於豫曰君好用金丹何以古人未嘗言豫曰世道每從人心轉人心就是病根源疇昔人心多純良世道亦無偏有病多傳陽一用大黃便安然如今人心多嶢溪世道亦曲彎有病多傳陰不用金丹便不占客曰信如君所言此藥只可治丁壯不可治連娟纖弱貌附注只可治村夫不可治高賢豫曰瘟疫流行不論人貴賤老幼一樣傳吃了多藥不見效得此一分便安然我嘗治小兒和入滑石立時歡紫金丹性燥和入滑石以平之小兒服之易納附注我嘗治高人丸入黃蠟立時痊治病只要有兼藥無非濟世之舟船治病只要有和藥無非救苦之仙丹治病只論病全在立時能豁然不必參苓白朮散不必真珠元麝丸百病皆因積滯生不用此藥必不靈如但積滯用大黃尚有多竅不能通得了此藥便貫穿再用補益亦易痊得了此藥便流通再用滋養亦易安非是我家好迅利如今疵癘大非前世道每隨人心轉焉能泥住古道無變遷縱是軒岐再治世亦必將此再傳宣不能捨此全不用以為治世之神仙客笑豫亦笑遂各退處於無言治雜疾老病風藥行藥相輔而行有一老醫性好用馬前不論是甚病總以此為先多是雜病盡皆丸藥他言我好用馬前病自毛竅宣猶之君好用金丹病自腸胃捐我言君言雖有理只是性太偏誰知今日之病偏又偏不兼二人之偏猶不占今日之病多從風上得不用風藥必不痊風藥少了不中用風藥多了往上竄風藥甚多不必定是馬前不用金丹貫頂子不能運轉大周天上頭有病上頭表下頭有病下頭宣雜疾老病恆如此不如此治必不安我嘗二藥一齊用上下周流無弊端大抵運會使之然我亦不敢多變遷雜貨湯歌病有專補者有專瀉者有專熱者有專涼者惟雜症則不然故作歌以紀之世人用藥不精良動云醫是雜貨湯豈知醫道精良亦如此藥不雜兮不成方但是藥雜心不雜總要病上去著忙不似盲醫無主見惡濫雜碎一鍋湯或補上而瀉下或補下而瀉上必須細推詳或補左而瀉右或補右而瀉左必須細酌量既欲用參耆又要用硝黃既欲用連柏又要用桂薑不是仙人好奇異實是脈理生光芒不惟一身之症有不同即此一經亦分張此中自具陰陽補瀉理曲曲折折莫荒唐看似雜兮實不雜百萬雄兵擁韓王我今專為雜症言豈是尋常小文章按病只一條藥可專用則藥不必雜也若一人而具虛實寒熱之症故用藥亦具溫涼補瀉之品蓋病雜故用藥亦雜要以脈理為準侄金門謹志夏秋之間用藥不得不雜病到夏秋甚是雜雖老名醫亦無法一症常具溫涼補瀉理汗吐下法不得不齊加我嘗遇此症便用九里山前擺陳法頭痛如劈是少陰細辛白芷得多加心中嘈雜欲嘔出黃連滑石得多加渾身大熱汗不流防風二活羌活獨活得多加五內乾燥不能忍芩黃芩連黃連梔梔子柏黃柏得多加不然先用六一牛黃六一散又加牛黃散去導吐再用煎藥更覺嘉此症原由風木搖動無止息所以寒火濕熱亂翻花只要立志去平賊金丹和入紫金丹和入渴藥之中掃根芽不是我心雜亂無主意九里山旗樊噲拿或用蔥水煎或用醋麩拓內有清涼去解散外用過熱亦不差縱有霸王作病神不過烏江去看他吐法不可廢古人治病有三法不用汗吐便用下後人有言吐傷人遂將吐法一齊罷豈知痰實與風火每在上焦凌空架不用吐法便不靈膈上之病如何化吾嘗治一頭懵頭暈症頭懵頭暈痰火無疑昏昏沉沉睡不下自言胸滿欲作嘔嘔出病來勝用瀉必本人有欲嘔之意方可以言吐我言吐法久不用我若用時人盡詫便將六一牛黃散六一牛黃二散用白礬皂角末亦可疊飲疊吐人人怕豈知痰涎吐盡便無病不知不覺又大下可知病在上焦無停留不用下藥亦能下隨用黃連清一清一天雲霧散了罷因悟疫邪傳裡表未松渾身大熱不能行再説羌羌活麻麻黃去出汗此中實滿欲結胸只得承氣並調胃一瀉二瀉便安寧隨飲茶湯一大碗不知不覺汗已傾里症通時外亦通可知治病須要看所急該吐該下宜立行不必狐疑生枝節一竅通時百竅通但觀前症細細思可知用兵貴先鋒亦有猛然嘔吐甚可驚滴水入口不能容翻江倒海連日夜聲聲叫娘不能行只用六一六一散兼牛黃散惡水惡露布洗水以飲藥頻頻壓頻頻壓時頻頻傾但得一勺入胃裡胃中火盡便安寧再將清補去調變轉眼時節又復生更有猛然大瀉糞門開若將腸胃湧出來衣帶褲子提不住腹內腸鳴似奔雷果然實火脈有力便將承氣去安排脈實有力宜用不然亦須清補實火下盡便如初何用參黨參苓茯苓仔細裁此皆嘔因嘔用通因通用也較上二説更深哉毒藥制好能治大病毒藥真正製得好大病一見便能了憶昔一時大家瘧惟有土信稱至寶麵包燒紅用醋洗一兩明雄二兩石膏生熟各二兩共豆緑豆粉半斤搗併合一處為仙丹以治濕瘧真絶妙又嘗糯米炒斑蟊以治下焦血滯竅又嘗沙土炒馬前以治偏枯身潦倒多少名醫不以痊惟此三味一筆掃休説諸藥甚是毒斬關奪隘他最巧試看興王佐命臣那有一個和平老毒症非用毒藥不行嗄病不曾親手經不知其中底理清我嘗濕癬滯兩腿用些毒藥便能輕可知一切疥癩症皆是陰寒濕毒結滯成不用信石與硇砂不用斑蟊與蜈蚣不用麝香與輕粉不用蟾酥與陀僧而能這毒都治了真是挾山超海同或用些須熬膏藥或用些須完丸行真是洪爐一點雪毒症還須毒藥攻病有風火濕寒之毒便須從此下手如今氣運大非前病症多有毒症兼不用毒藥卻不效一加毒藥便立痊我嘗遇些喉結症屢次用藥毫不占一見毒藥便立痊我嘗遇些淋閉症屢次用藥毫不占一見毒藥便立痊我嘗遇些肚疼症屢次用藥毫不占一見毒藥便立痊我嘗遇些瘡腫症屢次用藥毫不占一見毒藥便立痊從此知備毒藥好見了病症必審端看他來歷有不善即須毒藥立上前有風毒有火毒用上此藥能立捐有寒毒有濕毒用上此藥能立剜雖有餘波容易治全要這裡拔幟以登先好如項王已入牛竇里那有不是漢江山關格之症宜加二將軍以行之凡人關格氣不通纏頭汗出往上行有一成童似中風兩手兩足舉不能直條條里臥茵席纏頭汗出往上行我用金丹去破血加上風藥使沖融果然汗出比前多但是下焦未全通又用牛黃去開拓加上風藥使和同這回大汗滿周身兩手兩足皆有功獄其實脈道不見大結滯只得舍脈從症為正宗二藥全賴巴霜力風藥駕御俱凌空大黃沉濁無生氣不能通行十二經我用二藥皆此意每從大汗顯神通此是我家創治法莫説風症不可兼藥行大藥引子甚是得力治病引子最為先引子便是先鋒官先鋒如硬實他自打敵前我嘗治傷寒大蔥一把煮水煎我嘗治吐衄茅根一握煮水煎我嘗治腹疼黑豆一碗炒焦煮水煎我嘗治尿血薊根一束煮水煎我嘗治瘡腫忍冬一掐煮水煎我嘗治風症艾葉一團煮水煎我嘗治眼紅薄荷一襟煮水煎我嘗治滑瀉五倍一兩煮水煎我嘗治虛熱童便一罐當水煎又嘗薑汁一大盞對藥治頑痰又嘗韭汁一大杯入藥治血鮮又嘗酪酼一大壺炒藥炒大黃半斤治喉干治火厄之症又嘗治半邊外用醋麩炒熱裹腿纏又嘗治項強外用熱磚枕藉眠又嘗治瘰癧外用神針把火燃硫黃麝硃砂合銀硃捲入油紙煉成丸用針挑住貼瘰癧上日一次以火燃之諸如此類症引子最為先好似烏騅馬全在霸王去著鞭又如青龍刀全在關帝去傳宣幸當用藥時不妨此筆添按自古用兵最重先鋒取能沖陳開路直搗敵巢用藥如用兵此言大藥引子亦如是也不得謂其大而減之侄孫浚川謹志病在血分多從小腸而出不必另尋出路下法以此為正病在血分得最多皆因情欲起風波情欲多了暗受傷一有風寒便黏著不是濕腫往下流便是氣惱橫擊搏不是癥瘕為聚散便是寒熱為鼓橐此病皆自小腸出全賴肝腎去疏鑿與胃大腸並不挨不必硝芒硝黃大黃去開拓不論虛實與寒火皆從血分去斟酌我嘗治此千千萬無不以此為關鑰人説下法不在此我不與彼強聒聒治病不必定用此病藥凡事有滯即生熱不結氣來便結血萬病皆從氣血壅鬱而生我嘗治一眼疾眼甚紅搜風涼血一齊攻兩關不見大結滯若有結滯便用酒軍醋軍只用金丹和藥中吃得兩付便能愈因他破滯兼除風又嘗治一少年腿甚疼腫硬無頭甚可驚因用發散和血藥加上金丹調入中只吃兩付疼已愈亦因破滯能除風可知治病全在看活潑看得活時無不通金丹原非二症藥我若用時妙化工蠟匱金丹以治虛弱人亦有神效鄉愚治病甚是難一付不效便生端有一村婦虛寒甚內里積滯結腎肝本該先補後攻伐無奈性急欲速完只得調和加金丹意欲一付把病剜誰知金丹性暴戾積滯已久不能安我用黃蠟匱金丹藥性平和便有緣不怕積滯久不通漸漸磨來漸漸攻只吃數丸有轉機再吃數丸有大功任是虛寒難支持不加補藥亦能中此真濟世之菩提此真活人之仙翁願將座右書一通用藥真詮過燥過濡之藥久用便有變化人有濕寒甚不安必須蒼朮硫黃與馬前若是日用常常服再得地黃方周全人有虛熱甚不安必須二芍赤芍白芍生地與車前若是日用常常服再得術苓白朮茯苓方周全不是用藥好夾雜暫服久服要細參暫服一偏便能了久服必得和藥入其間正治不得必用反治久治腿疼不能了一加升提便順道久治便血不能了一加升提便入竅此是回環大道理醫家用之真絶妙丸藥真詮丸藥通利莫認真兼通四肢方為神若不橫行竟直走閃下病疾何處尋爛積丸大黃二醜各一斤君子肉二兩山甲一兩滑石二斤皂角一斤骨養面為丸卜子萊蔔子一斤用以之爛積甚是速山甲皂角卜子是此方妙處四消丸大黃三兩二醜三兩與僵蟲即殭蠶四錢桃杏桃仁三錢杏仁三錢山甲二片石決明一兩外滾芒硝完丸好此是四消用藥精山甲桃仁杏仁是此方妙處丸藥用補必帶和方可補氣補血莫認真補中帶和方出神煎藥純補猶可説久服丸藥須細斟時下小方亦有可取不在脈理亦有病多少名醫不中用竟有出個方兒甚是巧村夫野婦竟成聖前日有長腳搭背雖多用藥空受罪有言捲住火艾用煙燻熏來熏去病自退又有大胯突硬甚可驚多少名醫治不中有言此是沉寒滯裡邊無大寒者必不作大熱只用拓法便能生蔥薑炒醋麩頻拓頻換又有少婦心翻病不寧清涼解散全無功有言此是火煞子須用鹽水打穴中打遍手彎並腿彎手彎腿彎打過皆青一針舌根便立清又有妄用針法氣不通用盡打藥毫不靈有言皂角末最善裝入竹筒吹腸中大抵病不在內里只用外治病自己強似出外請先生時下小方亦可取內治不得須外治內治外治皆要通泥住一邊便不中我嘗遇一大便不通症此人用此行彼人用彼行愈行愈不中我用皂角末裝入竹筒中即將竹簡置糞門一吹便有功如何能見效縱是神仙知不清又嘗遇一小便不通症這人用這攻那人用那攻愈攻愈不中我用水銀珠裝入雞翎中水銀一珠入鐵勺用油煎紅再用茶盅浣淨油方入雞瓴筒中雞瓴入腎竅一滴便有功如何怎見效縱是神仙知不清可知天下小方兒皆具大神通只要用得著便是君子而時中金石之藥能涼血除風風火諸症宜用人生氣逆不能行痰涎風火從此生實用肝橫來剋土不得金石必不中滑石能利竅赤石能澀精磁石能墜痰硃砂能鎮驚磁石滋腎水赤金把火平避陽砂兮善涼血自然銅兮多通經一切氣逆不能行必得金石始克清況乎金石能生水轉眼萌芽又發生雖與肝木相為敵實與肝木若有情我今再勸司命者還須山經誦一通金石之藥治虛癆雜疾百藥不效者甚有奇驗涼血破血金石堪一切虛癆他能痊補藥破藥全不效治得久時心內翻但用二藥研為末避陽砂自然銅硃砂礞石琥珀之類紅糖和入日日餐不論邪祟與狐鬼真是神仙絶妙丹巴豆贊非起盡油斷不可用吾嘗制有牛黃散必以巴豆盛玉碗吾嘗制有紫金丹必以巴豆上翠盤如此藥料甚是毒胡為尊寵若上仙上下飛行常自在左右周流恆貫穿世上不知此味好恆以大黃為主權豈知大黃行火不行寒寒症用他腹塞磚巴豆行寒兼行火表裡周流到處安行火須加清涼藥行寒便自作軍官可以除暴安良一身之宰氣為主病自氣得自氣宣通也多少壘塊不自達必得此味始破堅氣滯氣分牛黃散氣滯血分紫金丹一身之氣雖由肺一身之病常在肝若能平肝火不動肺中之氣自安然何必肺中去導滯何必胃中去化堅肺中有滯胃中有堅亦須去治如此言之以見肝中病多也吾嘗治病先平賊總因命火肝中攢命火去入三焦胞絡之中如此説來不治肺何必牛黃散是餐不知病在血分十常九病在氣分僅二三吾嘗二藥一齊備金丹用盡牛黃全可知病在氣分甚是少病在血分有萬千如此説來甚是好何不使彼指巴豆言先著鞭不知此味須賴輔相力上下周流無弊端不必多用止絲忽如虎生翼便為官主也大黃必待入里用此藥不里亦能宣病在上焦恆有痰使他化痰最娟娟病在上焦恆有滯使他導滯亦便便但在上焦宜用少毫釐絲忽便通宣病在中下能消積或寒或火皆安然胃中虛寒莫多用肝中有滯他為先只要多加平肝藥巴霜夾入群藥之中以為丸散一切百病無不痊我用此藥號無敵天下因此稱為仙豈知神仙原自巴豆得不用巴豆亦枉然大黃説豫贊巴豆之第三夕有一將軍橫空而來曰子何視巴將軍之重視豫之輕耶豈以豫之不才乎豫曰子雖有才但嗜酒太甚不可以獨任故不多言也將軍曰喉之役豫嗜酒三斤而強寇以殲吾獨無三兩之力乎有一怒婦脈滯寸口中下無脈豫以大黃三兩酒三斤煎至一碗飲之一藥而愈心之師豫嗜酒兩碗而伏戎以滅吾獨無四兩之力乎有一人後心時乎刺痛豫以大黃四兩酒兩碗煎至一碗飲之一藥而愈崑崙之戰豫嗜酒四斤而梟賊以誅吾獨無四兩之力乎一人病頭風終年不愈豫以大黃四兩酒四斤煎至一碗飲之一藥而愈厄咽之戲豫嗜酒三壺而滑賊以息吾獨無半斤之力乎一人厄逆不止豫以大黃半斤酒三壺煎至一碗飲之一藥而愈有功者嘗無功者罰古之道也子何斤斤於此乎且傷之起瘟疫之來非豫寸步不能行子能使巴將軍肩此任乎豫之素性嗜酒固所不免嗜醋亦時有之邪傳肝經必用醋炒子何斤斤於此乎豫笑將軍亦笑遂黯然而逝故志之按以大黃之峻下輒用至四兩半斤未免駭人不知大黃見酒則性平蓋酒能升提用酒煎則不即下行而先上升待將頭病治住至下行時性已不峻矣大黃用酒煎斯為有制之兵侄孫浚川謹識血症眼症多用大黃而愈者不可不知血症絶少用大黃以其與症費酌量若果真是大實症其氣剛其脈強即用大黃亦何妨吾嘗治吐血一兩二兩不足用三兩四兩或酒炒或醋炒始平康可知衄血與便血實與此症正相當還要細酌量脈斷不可用絶勝虛弱人或蕩胸或滌腸或慎酒或戒房淹淹纏纏見閻王眼症絶少用大黃以其與症費酌量眼疾多是搜風散熱若果真是大實症其氣剛其脈強即用大黃亦何妨吾嘗治眼疼一兩二兩不中用三兩四兩始平康百中一二可知眼眵與眼蒙與此正相當還要細酌量絶勝虛弱人或歸當歸地地黃或羌羌活防防風或云皮或檳榔淹淹纏纏入膏肓吾今始知大黃好只要症脈恰相當好如秦政之暴虐今日正遇楚霸王山甲可封平和將軍山甲亦可號將軍我嘗治病屢出神有一婦人月病久諸藥不效死為鄰腹疼臥床甚難忍一為診脈脈橫陳即用山甲末一兩黃蠟為丸麝香勻日食一錢痛即止不滿十日大回春又有男兒虛癆久諸藥不效死為鄰一寒一熱不能止一為診脈積已深即用山甲末一兩黃蠟為丸青黛勻日食二錢熱已止不滿十日大回春又有癆疾寒瘧久諸藥不效死為鄰一寒一熱不能止一為診脈氣在心即用山甲末二錢玉金煎湯紅糖吞當即平復無一病不滿十日大回春又有虛癆蠱症久諸藥不效死為鄰補之不得瀉不得一為診脈脈陰沉即用山甲末二錢麝香和入茶細吞吃了時節忽大汗腫硬一消即回春好如汾陽見吐蕃不動聲色若甚親百萬雄兵盡懾服那有一個作梗人我如藥中去為政定封山甲為將軍大黃巴豆雖無敵氣血旺時穩稱心若遇此症氣淹淹不得此藥怎回春一切病積盡去了無風無火無煙塵若問大黃與巴豆定當俯首稱為臣病到此時難為力焉得如此怎稱心馬前子贊若有中其毒者飲香油自解馬前大毒甚可驚得了製法有殊功黑豆水煮三炷香時以透為度連豆水盛放十餘日將藥撈出去皮心用馬牙沙炒焦黑研末備用丸散皆可豆水埋之以盡滅其毒我嘗治些大風症無不以此為先鋒上至顛頂下湧泉百骨百節皆流通譬之項王烏騅馬一到壁上便凌空譬之柳州白花蛇一遇癘症便乘風此真天下大奇物不可使之抑鬱在土中我初見此便埋之土中恐人中其毒也斑蟊引子贊每用二枚研入藥中小腸不透用斑蟊糯米炒黃糯米同炒以米黃為度毒自消腰疼腿疼無出路淋閉腫滿受監牢非得此藥不貫串焉能上下氣迢迢萆麻治淋甚好萆麻之性善於收斂故能開放無敵萆麻從未入湯藥誰知添入甚合作吾嘗冶血淋必加金丹為要著誰知遇此症甚危只好半天病又作因悟天地動靜理一翁一闢通橐籥有合必有開欲前必先卻即用萆麻二十枚以其善收合譬如拉大車已竟陷泥窩向西不得走只得向東薄俟得車活動回頭便出窩縱有老淋二十年無不以此開關鑰加斑蟊五六個滑石二三兩乾漆二錢肉桂五分共為細末升麻煎湯日日飲之可知烏梅能出汗以其善收合五倍能化毒以其善束約因悟唐家李鄴侯終身守退以入閣絶勝三齊王有進無退卒遭未央禍風毒堅硬用蜈蚣足不能治全蠍亦可有一項腫堅似鐵大抵濕寒水暗結我用蜈蚣足一錢研為細末使餔啜和入風藥去出汗一夜蝕爛水外泄過了幾日漸長住內里作膿似火熱蝕開一口膿外流我用風藥大補氣與血過了幾日又長住一身之病盡皆撤又有肚疼夜無節我研蜈蚣使餔啜和入湯藥飲一付從此肚疼盡皆撤蜈蚣隨人去使用內外表里盡洞徹全蠍與此正相等一切風症盡昭雪人身之藥勝似草頭萬倍夏秋噦嘔死為鄰婦人惡布最出神惡布為水吞滑石一吞二吞便回春平地人參最難尋其實皆在女人身女人身上混沌皮即紫河車小兒落下等灰泥如能為藥以濟人便是當面遇軒岐更有女子身上血起死回生不用説得了此水以煎藥即是靈山白玉屑尿臊罐子治臀中惡毒鎮店便溺慎為先一或中毒即難堪有一中毒臀癢甚恨不使刀把病剜老臊尿罐得一個大煮風藥荊芥防風羌活獨活廣椒皂角枯礬芥子火艾老蔥等之類把湯安脫了褲子坐罐上略熏一時手抓湔庶可惡毒盡洗淨再無楊梅生禍端細辛宜大用細辛猛烈上頭顛頭疼如劈立時痊有了火症不必用有了寒疼他為先若夫寒火夾雜候有酒軍有酒芩有酒連得此拔幟以登先可以立大功可以稱為仙勝似平平淡淡藥僅僅逐隊而隨班凡用此等藥看監製看包羅有了監製與包羅縱然多用不生波他如麻黃白芷與川芎無不並此一樣看譬如武侯在軍中魏延不敢反譬如汾陽掌大纛懷恩無變遷古人每每用數分恆若禁止不敢添不是古人無識見古今氣運須細參不是後人多明哲如今疵癘大非前我今幸生古人後豈敢多改變猶是前人意總要善周全不得不因氣運為變遷不得不因疵癘為牽連不怕此等藥多倔強多香竄有了監製他為先有了包羅他上前如此英雄藥使他抑鬱在土間我亦不安然硫黃能治濕寒百病製法用豆腐一塊入硫黃於內同煮二炷香時取硫黃研末麵糊為丸每服二三錢硫黃原是火之精一切濕熱他能清濕熱原從寒上得抑鬱之久與熱同熱藥皆補他能通薑桂附子守而不走硫黃走而不守疏通元府妙化工濕熱引下便無病故云一切濕熱他能清治濕寒抑鬱之熱若真火症他焉能治如若疥癬毒上壅內吃外治皆有功巴豆水銀共油豬板油搗以搓皮外立時輕更治濕寒腹甚疼但吃此味必能通更治脾虛