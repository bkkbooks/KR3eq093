  - {type: 'tls:head', offset: 2, content: '', id: KR3eq093_jc_002-d8.d2.h1s1}
  - {type: 'tls:div-end', offset: 357, content: '', id: KR3eq093_jc_002-d8d2}
  - {type: 'tls:div-start', offset: 357, content: '', id: KR3eq093_jc_002-d8d3, level: 2, head_text: 霸藥亦不可少}
  - {type: 'tls:head', offset: 357, content: '', id: KR3eq093_jc_002-d8.d3.h1s1}
  - {type: 'tls:div-end', offset: 820, content: '', id: KR3eq093_jc_002-d8d3}
  - {type: 'tls:div-start', offset: 820, content: '', id: KR3eq093_jc_002-d8d4, level: 2, head_text: 治病有先霸后王之不同}
  - {type: 'tls:head', offset: 820, content: '', id: KR3eq093_jc_002-d8.d4.h1s1}
  - {type: 'tls:div-end', offset: 1074, content: '', id: KR3eq093_jc_002-d8d4}
  - {type: 'tls:div-start', offset: 1074, content: '', id: KR3eq093_jc_002-d8d5, level: 2, head_text: 病宜用金丹不論老弱貴賤}
  - {type: 'tls:head', offset: 1074, content: '', id: KR3eq093_jc_002-d8.d5.h1s1}
  - {type: 'tls:div-end', offset: 1455, content: '', id: KR3eq093_jc_002-d8d5}
  - {type: 'tls:div-start', offset: 1455, content: '', id: KR3eq093_jc_002-d8d6, level: 2, head_text: 治雜疾老病風藥行藥相輔而行}
  - {type: 'tls:head', offset: 1455, content: '', id: KR3eq093_jc_002-d8.d6.h1s1}
  - {type: 'tls:div-end', offset: 1659, content: '', id: KR3eq093_jc_002-d8d6}
  - {type: 'tls:div-start', offset: 1659, content: '', id: KR3eq093_jc_002-d8d7, level: 2, head_text: 雜貨湯歌}
  - {type: 'tls:head', offset: 1659, content: '', id: KR3eq093_jc_002-d8.d7.h1s1}
  - {type: 'tls:div-end', offset: 1934, content: '', id: KR3eq093_jc_002-d8d7}
  - {type: 'tls:div-start', offset: 1934, content: '', id: KR3eq093_jc_002-d8d8, level: 2, head_text: 夏秋之間用藥不得不雜}
  - {type: 'tls:head', offset: 1934, content: '', id: KR3eq093_jc_002-d8.d8.h1s1}
  - {type: 'tls:div-end', offset: 2181, content: '', id: KR3eq093_jc_002-d8d8}
  - {type: 'tls:div-start', offset: 2181, content: '', id: KR3eq093_jc_002-d8d9, level: 2, head_text: 吐法不可廢}
  - {type: 'tls:head', offset: 2181, content: '', id: KR3eq093_jc_002-d8.d9.h1s1}
  - {type: 'tls:div-end', offset: 2675, content: '', id: KR3eq093_jc_002-d8d9}
  - {type: 'tls:div-start', offset: 2675, content: '', id: KR3eq093_jc_002-d8d10, level: 2, head_text: 毒藥制好能治大病}
  - {type: 'tls:head', offset: 2675, content: '', id: KR3eq093_jc_002-d8.d10.h1s1}
  - {type: 'tls:div-end', offset: 2823, content: '', id: KR3eq093_jc_002-d8d10}
  - {type: 'tls:div-start', offset: 2823, content: '', id: KR3eq093_jc_002-d8d11, level: 2, head_text: 毒症非用毒藥不行}
  - {type: 'tls:head', offset: 2823, content: '', id: KR3eq093_jc_002-d8.d11.h1s1}
  - {type: 'tls:div-end', offset: 2945, content: '', id: KR3eq093_jc_002-d8d11}
  - {type: 'tls:div-start', offset: 2945, content: '', id: KR3eq093_jc_002-d8d12, level: 2, head_text: 病有風火濕寒之毒便須從此下手}
  - {type: 'tls:head', offset: 2945, content: '', id: KR3eq093_jc_002-d8.d12.h1s1}
  - {type: 'tls:div-end', offset: 3157, content: '', id: KR3eq093_jc_002-d8d12}
  - {type: 'tls:div-start', offset: 3157, content: '', id: KR3eq093_jc_002-d8d13, level: 2, head_text: 關格之症宜加二將軍以行之}
  - {type: 'tls:head', offset: 3157, content: '', id: KR3eq093_jc_002-d8.d13.h1s1}
  - {type: 'tls:div-end', offset: 3344, content: '', id: KR3eq093_jc_002-d8d13}
  - {type: 'tls:div-start', offset: 3344, content: '', id: KR3eq093_jc_002-d8d14, level: 2, head_text: 大藥引子甚是得力}
  - {type: 'tls:head', offset: 3344, content: '', id: KR3eq093_jc_002-d8.d14.h1s1}
  - {type: 'tls:div-end', offset: 3692, content: '', id: KR3eq093_jc_002-d8d14}
  - {type: 'tls:div-start', offset: 3692, content: '', id: KR3eq093_jc_002-d8d15, level: 2, head_text: 病在血分多從小腸而出不必另尋出路下法以此為正}
  - {type: 'tls:head', offset: 3692, content: '', id: KR3eq093_jc_002-d8.d15.h1s1}
  - {type: 'tls:div-end', offset: 3844, content: '', id: KR3eq093_jc_002-d8d15}
  - {type: 'tls:div-start', offset: 3844, content: '', id: KR3eq093_jc_002-d8d16, level: 2, head_text: 治病不必定用此病藥}
  - {type: 'tls:head', offset: 3844, content: '', id: KR3eq093_jc_002-d8.d16.h1s1}
  - {type: 'tls:div-end', offset: 4005, content: '', id: KR3eq093_jc_002-d8d16}
  - {type: 'tls:div-start', offset: 4005, content: '', id: KR3eq093_jc_002-d8d17, level: 2, head_text: 蠟匱金丹以治虛弱人亦有神效}
  - {type: 'tls:head', offset: 4005, content: '', id: KR3eq093_jc_002-d8.d17.h1s1}
  - {type: 'tls:div-end', offset: 4165, content: '', id: KR3eq093_jc_002-d8d17}
  - {type: 'tls:div-start', offset: 4165, content: '', id: KR3eq093_jc_002-d8d18, level: 2, head_text: 用藥真詮}
  - {type: 'tls:head', offset: 4165, content: '', id: KR3eq093_jc_002-d8.d18.h1s1}
  - {type: 'tls:div-start', offset: 4169, content: '', id: KR3eq093_jc_002-d8.d18d2, level: 3, head_text: 過燥過濡之藥久用便有變化}
  - {type: 'tls:head', offset: 4169, content: '', id: KR3eq093_jc_002-d8.d18.d2.h1s1}
  - {type: 'tls:div-end', offset: 4279, content: '', id: KR3eq093_jc_002-d8.d18d2}
  - {type: 'tls:div-end', offset: 4279, content: '', id: KR3eq093_jc_002-d8d18}
  - {type: 'tls:div-start', offset: 4279, content: '', id: KR3eq093_jc_002-d8d19, level: 2, head_text: 正治不得必用反治}
  - {type: 'tls:head', offset: 4279, content: '', id: KR3eq093_jc_002-d8.d19.h1s1}
  - {type: 'tls:div-end', offset: 4329, content: '', id: KR3eq093_jc_002-d8d19}
  - {type: 'tls:div-start', offset: 4329, content: '', id: KR3eq093_jc_002-d8d20, level: 2, head_text: 丸藥真詮}
  - {type: 'tls:head', offset: 4329, content: '', id: KR3eq093_jc_002-d8.d20.h1s1}
  - {type: 'tls:div-end', offset: 4361, content: '', id: KR3eq093_jc_002-d8d20}
  - {type: 'tls:div-start', offset: 4361, content: '', id: KR3eq093_jc_002-d8d21, level: 2, head_text: 爛積丸}
  - {type: 'tls:head', offset: 4361, content: '', id: KR3eq093_jc_002-d8.d21.h1s1}
  - {type: 'tls:div-end', offset: 4419, content: '', id: KR3eq093_jc_002-d8d21}
  - {type: 'tls:div-start', offset: 4419, content: '', id: KR3eq093_jc_002-d8d22, level: 2, head_text: 四消丸}
  - {type: 'tls:head', offset: 4419, content: '', id: KR3eq093_jc_002-d8.d22.h1s1}
  - {type: 'tls:div-end', offset: 4482, content: '', id: KR3eq093_jc_002-d8d22}
  - {type: 'tls:div-start', offset: 4482, content: '', id: KR3eq093_jc_002-d8d23, level: 2, head_text: 丸藥用補必帶和方可}
  - {type: 'tls:head', offset: 4482, content: '', id: KR3eq093_jc_002-d8.d23.h1s1}
  - {type: 'tls:div-end', offset: 4519, content: '', id: KR3eq093_jc_002-d8d23}
  - {type: 'tls:div-start', offset: 4519, content: '', id: KR3eq093_jc_002-d8d24, level: 2, head_text: 時下小方亦有可取}
  - {type: 'tls:head', offset: 4519, content: '', id: KR3eq093_jc_002-d8.d24.h1s1}
  - {type: 'tls:div-end', offset: 4747, content: '', id: KR3eq093_jc_002-d8d24}
  - {type: 'tls:div-start', offset: 4747, content: '', id: KR3eq093_jc_002-d8d25, level: 2, head_text: 內治不得須外治}
  - {type: 'tls:head', offset: 4747, content: '', id: KR3eq093_jc_002-d8.d25.h1s1}
  - {type: 'tls:div-end', offset: 4930, content: '', id: KR3eq093_jc_002-d8d25}
  - {type: 'tls:div-start', offset: 4930, content: '', id: KR3eq093_jc_002-d8d26, level: 2, head_text: 金石之藥能涼血除風風火諸症宜用}
  - {type: 'tls:head', offset: 4930, content: '', id: KR3eq093_jc_002-d8.d26.h1s1}
  - {type: 'tls:div-end', offset: 5073, content: '', id: KR3eq093_jc_002-d8d26}
  - {type: 'tls:div-start', offset: 5073, content: '', id: KR3eq093_jc_002-d8d27, level: 2, head_text: 金石之藥治虛癆雜疾百藥不效者甚有奇驗}
  - {type: 'tls:head', offset: 5073, content: '', id: KR3eq093_jc_002-d8.d27.h1s1}
  - {type: 'tls:div-end', offset: 5161, content: '', id: KR3eq093_jc_002-d8d27}
  - {type: 'tls:div-start', offset: 5161, content: '', id: KR3eq093_jc_002-d8d28, level: 2, head_text: 巴豆贊非起盡油斷不可用}
  - {type: 'tls:head', offset: 5161, content: '', id: KR3eq093_jc_002-d8.d28.h1s1}
  - {type: 'tls:div-end', offset: 5675, content: '', id: KR3eq093_jc_002-d8d28}
  - {type: 'tls:div-start', offset: 5675, content: '', id: KR3eq093_jc_002-d8d29, level: 2, head_text: 大黃說}
  - {type: 'tls:head', offset: 5675, content: '', id: KR3eq093_jc_002-d8.d29.h1s1}
  - {type: 'tls:div-end', offset: 6102, content: '', id: KR3eq093_jc_002-d8d29}
  - {type: 'tls:div-start', offset: 6102, content: '', id: KR3eq093_jc_002-d8d30, level: 2, head_text: 血症眼症多用大黃而愈者不可不知}
  - {type: 'tls:head', offset: 6102, content: '', id: KR3eq093_jc_002-d8.d30.h1s1}
  - {type: 'tls:div-end', offset: 6366, content: '', id: KR3eq093_jc_002-d8d30}
  - {type: 'tls:div-start', offset: 6366, content: '', id: KR3eq093_jc_002-d8d31, level: 2, head_text: 山甲可封平和將軍}
  - {type: 'tls:head', offset: 6366, content: '', id: KR3eq093_jc_002-d8.d31.h1s1}
  - {type: 'tls:div-end', offset: 6724, content: '', id: KR3eq093_jc_002-d8d31}
  - {type: 'tls:div-start', offset: 6724, content: '', id: KR3eq093_jc_002-d8d32, level: 2, head_text: 馬前子贊若有中其毒者飲香油自解}
  - {type: 'tls:head', offset: 6724, content: '', id: KR3eq093_jc_002-d8.d32.h1s1}
  - {type: 'tls:div-end', offset: 6891, content: '', id: KR3eq093_jc_002-d8d32}
  - {type: 'tls:div-start', offset: 6891, content: '', id: KR3eq093_jc_002-d8d33, level: 2, head_text: 斑蟊引子贊每用二枚研入藥中}
  - {type: 'tls:head', offset: 6891, content: '', id: KR3eq093_jc_002-d8.d33.h1s1}
  - {type: 'tls:div-end', offset: 6955, content: '', id: KR3eq093_jc_002-d8d33}
  - {type: 'tls:div-start', offset: 6955, content: '', id: KR3eq093_jc_002-d8d34, level: 2, head_text: 蓖麻治淋甚好蓖麻之性善於收斂故能開放無敵}
  - {type: 'tls:head', offset: 6955, content: '', id: KR3eq093_jc_002-d8.d34.h1s1}
  - {type: 'tls:div-end', offset: 7176, content: '', id: KR3eq093_jc_002-d8d34}
  - {type: 'tls:div-start', offset: 7176, content: '', id: KR3eq093_jc_002-d8d35, level: 2, head_text: 風毒堅硬用蜈蚣足不能治全蠍亦可}
  - {type: 'tls:head', offset: 7176, content: '', id: KR3eq093_jc_002-d8.d35.h1s1}
  - {type: 'tls:div-end', offset: 7333, content: '', id: KR3eq093_jc_002-d8d35}
  - {type: 'tls:div-start', offset: 7333, content: '', id: KR3eq093_jc_002-d8d36, level: 2, head_text: 人身之藥勝似草頭萬倍}
  - {type: 'tls:head', offset: 7333, content: '', id: KR3eq093_jc_002-d8.d36.h1s1}
  - {type: 'tls:div-end', offset: 7445, content: '', id: KR3eq093_jc_002-d8d36}
  - {type: 'tls:div-start', offset: 7445, content: '', id: KR3eq093_jc_002-d8d37, level: 2, head_text: 尿臊罐子治臀中惡毒}
  - {type: 'tls:head', offset: 7445, content: '', id: KR3eq093_jc_002-d8.d37.h1s1}
  - {type: 'tls:div-end', offset: 7547, content: '', id: KR3eq093_jc_002-d8d37}
  - {type: 'tls:div-start', offset: 7547, content: '', id: KR3eq093_jc_002-d8d38, level: 2, head_text: 細辛宜大用}
  - {type: 'tls:head', offset: 7547, content: '', id: KR3eq093_jc_002-d8.d38.h1s1}
  - {type: 'tls:div-end', offset: 7816, content: '', id: KR3eq093_jc_002-d8d38}
  - {type: 'tls:div-start', offset: 7816, content: '', id: KR3eq093_jc_002-d8d39, level: 2, head_text: 硫黃能治濕寒百病}
  - {type: 'tls:head', offset: 7816, content: '', id: KR3eq093_jc_002-d8.d39.h1s1}
  - {type: 'tls:div-end', offset: 8101, content: '', id: KR3eq093_jc_002-d8d39}
  - {type: 'tls:div-start', offset: 8101, content: '', id: KR3eq093_jc_002-d8d40, level: 2, head_text: 翻用大柴胡實與大柴胡相表裡}
  - {type: 'tls:head', offset: 8101, content: '', id: KR3eq093_jc_002-d8.d40.h1s1}
  - {type: 'tls:div-end', offset: 8306, content: '', id: KR3eq093_jc_002-d8d40}
  - {type: 'tls:div-start', offset: 8306, content: '', id: KR3eq093_jc_002-d8d41, level: 2, head_text: 麻黃桂枝湯不必泥}
  - {type: 'tls:head', offset: 8306, content: '', id: KR3eq093_jc_002-d8.d41.h1s1}
  - {type: 'tls:div-end', offset: 8910, content: '', id: KR3eq093_jc_002-d8d41}
  - {type: 'tls:div-start', offset: 8910, content: '', id: KR3eq093_jc_002-d8d42, level: 2, head_text: 駁汪訒庵譏陶節庵傷寒書}
  - {type: 'tls:head', offset: 8910, content: '', id: KR3eq093_jc_002-d8.d42.h1s1}
  - {type: 'tls:div-end', offset: 9235, content: '', id: KR3eq093_jc_002-d8d42}
  - {type: 'tls:div-start', offset: 9235, content: '', id: KR3eq093_jc_002-d8d43, level: 2, head_text: 傷寒雜病六字訣}
  - {type: 'tls:head', offset: 9235, content: '', id: KR3eq093_jc_002-d8.d43.h1s1}
  - {type: 'tls:div-end', offset: 9429, content: '', id: KR3eq093_jc_002-d8d43}
  - {type: 'tls:div-start', offset: 9429, content: '', id: KR3eq093_jc_002-d8d44, level: 2, head_text: 寒症亦不甚少}
  - {type: 'tls:head', offset: 9429, content: '', id: KR3eq093_jc_002-d8.d44.h1s1}
  - {type: 'tls:div-end', offset: 9979, content: '', id: KR3eq093_jc_002-d8d44}
  - {type: 'tls:div-start', offset: 9979, content: '', id: KR3eq093_jc_002-d8d45, level: 2, head_text: 傷寒初起治法有受寒中寒之分有三端者少有二端者多}
  - {type: 'tls:head', offset: 9979, content: '', id: KR3eq093_jc_002-d8.d45.h1s1}
  - {type: 'tls:div-end', offset: 10158, content: '', id: KR3eq093_jc_002-d8d45}
  - {type: 'tls:div-start', offset: 10158, content: '', id: KR3eq093_jc_002-d8d46, level: 2, head_text: 傷寒以解表為主未至胃府結實胃府結實脈必實大應指而起斷不可下}
  - {type: 'tls:head', offset: 10158, content: '', id: KR3eq093_jc_002-d8.d46.h1s1}
  - {type: 'tls:div-start', offset: 10682, content: '', id: KR3eq093_jc_002-d8.d46d4, level: 3, head_text: 烏附膏藥方}
  - {type: 'tls:head', offset: 10682, content: '', id: KR3eq093_jc_002-d8.d46.d4.h1s1}
  - {type: 'tls:div-end', offset: 10740, content: '', id: KR3eq093_jc_002-d8.d46d4}
  - {type: 'tls:div-end', offset: 10740, content: '', id: KR3eq093_jc_002-d8d46}
  - {type: 'tls:div-start', offset: 10740, content: '', id: KR3eq093_jc_002-d8d47, level: 2, head_text: 傷寒傷風有分辨無大分辨總以表汗為主其異只在白芍耳}
  - {type: 'tls:head', offset: 10740, content: '', id: KR3eq093_jc_002-d8.d47.h1s1}
  - {type: 'tls:div-end', offset: 10855, content: '', id: KR3eq093_jc_002-d8d47}
  - {type: 'tls:div-start', offset: 10855, content: '', id: KR3eq093_jc_002-d8d48, level: 2, head_text: 傷寒有二}
  - {type: 'tls:head', offset: 10855, content: '', id: KR3eq093_jc_002-d8.d48.h1s1}
  - {type: 'tls:div-end', offset: 10915, content: '', id: KR3eq093_jc_002-d8d48}
  - {type: 'tls:div-start', offset: 10915, content: '', id: KR3eq093_jc_002-d8d49, level: 2, head_text: 傷風有二}
  - {type: 'tls:head', offset: 10915, content: '', id: KR3eq093_jc_002-d8.d49.h1s1}
  - {type: 'tls:div-end', offset: 11019, content: '', id: KR3eq093_jc_002-d8d49}
  - {type: 'tls:div-start', offset: 11019, content: '', id: KR3eq093_jc_002-d8d50, level: 2, head_text: 傷寒傷風有相兼而見者}
  - {type: 'tls:head', offset: 11019, content: '', id: KR3eq093_jc_002-d8.d50.h1s1}
  - {type: 'tls:div-end', offset: 11124, content: '', id: KR3eq093_jc_002-d8d50}
  - {type: 'tls:div-start', offset: 11124, content: '', id: KR3eq093_jc_002-d8d51, level: 2, head_text: 寒症有傷寒受寒中寒之分治亦不同}
  - {type: 'tls:head', offset: 11124, content: '', id: KR3eq093_jc_002-d8.d51.h1s1}
  - {type: 'tls:div-end', offset: 11337, content: '', id: KR3eq093_jc_002-d8d51}
  - {type: 'tls:div-start', offset: 11337, content: '', id: KR3eq093_jc_002-d8d52, level: 2, head_text: 風症有傷風受風中風之分治亦不同}
  - {type: 'tls:head', offset: 11337, content: '', id: KR3eq093_jc_002-d8.d52.h1s1}
  - {type: 'tls:div-end', offset: 11570, content: '', id: KR3eq093_jc_002-d8d52}
  - {type: 'tls:div-start', offset: 11570, content: '', id: KR3eq093_jc_002-d8d53, level: 2, head_text: 虛熱不盡風寒猶存宜發散兼收斂}
  - {type: 'tls:head', offset: 11570, content: '', id: KR3eq093_jc_002-d8.d53.h1s1}
  - {type: 'tls:div-end', offset: 11698, content: '', id: KR3eq093_jc_002-d8d53}
  - {type: 'tls:div-start', offset: 11698, content: '', id: KR3eq093_jc_002-d8d54, level: 2, head_text: 傷寒誤瀉必須再發散}
  - {type: 'tls:head', offset: 11698, content: '', id: KR3eq093_jc_002-d8.d54.h1s1}
  - {type: 'tls:div-end', offset: 11847, content: '', id: KR3eq093_jc_002-d8d54}
  - {type: 'tls:div-start', offset: 11847, content: '', id: KR3eq093_jc_002-d8d55, level: 2, head_text: 乾燒之症必須內外兼理}
  - {type: 'tls:head', offset: 11847, content: '', id: KR3eq093_jc_002-d8.d55.h1s1}
  - {type: 'tls:div-end', offset: 12077, content: '', id: KR3eq093_jc_002-d8d55}
  - {type: 'tls:div-start', offset: 12077, content: '', id: KR3eq093_jc_002-d8d56, level: 2, head_text: 人身寒熱有一摸手即得者}
  - {type: 'tls:head', offset: 12077, content: '', id: KR3eq093_jc_002-d8.d56.h1s1}
  - {type: 'tls:div-end', offset: 12535, content: '', id: KR3eq093_jc_002-d8d56}
  - {type: 'tls:div-start', offset: 12535, content: '', id: KR3eq093_jc_002-d8d57, level: 2, head_text: 痰涎為祟寒熱往來非用導吐法不行}
  - {type: 'tls:head', offset: 12535, content: '', id: KR3eq093_jc_002-d8.d57.h1s1}
  - {type: 'tls:div-end', offset: 12740, content: '', id: KR3eq093_jc_002-d8d57}
  - {type: 'tls:div-start', offset: 12740, content: '', id: KR3eq093_jc_002-d8d58, level: 2, head_text: 沉陰傷寒甚是難治}
  - {type: 'tls:head', offset: 12740, content: '', id: KR3eq093_jc_002-d8.d58.h1s1}
  - {type: 'tls:div-end', offset: 13030, content: '', id: KR3eq093_jc_002-d8d58}
  - {type: 'tls:div-start', offset: 13030, content: '', id: KR3eq093_jc_002-d8d59, level: 2, head_text: 傷寒瘟疫治法到底不同}
  - {type: 'tls:head', offset: 13030, content: '', id: KR3eq093_jc_002-d8.d59.h1s1}
  - {type: 'tls:div-end', offset: 13235, content: '', id: KR3eq093_jc_002-d8d59}
  - {type: 'tls:div-start', offset: 13235, content: '', id: KR3eq093_jc_002-d8d60, level: 2, head_text: 治瘟疫舌胎最當家}
  - {type: 'tls:head', offset: 13235, content: '', id: KR3eq093_jc_002-d8.d60.h1s1}
  - {type: 'tls:div-end', offset: 13571, content: '', id: KR3eq093_jc_002-d8d60}
  - {type: 'tls:div-start', offset: 13571, content: '', id: KR3eq093_jc_002-d8d61, level: 2, head_text: 風火濕寒交雜多是風木為祟}
  - {type: 'tls:head', offset: 13571, content: '', id: KR3eq093_jc_002-d8.d61.h1s1}
  - {type: 'tls:div-end', offset: 13781, content: '', id: KR3eq093_jc_002-d8d61}
  - {type: 'tls:div-start', offset: 13781, content: '', id: KR3eq093_jc_002-d8d62, level: 2, head_text: 治虛症以扶正氣為主}
  - {type: 'tls:head', offset: 13781, content: '', id: KR3eq093_jc_002-d8.d62.h1s1}
  - {type: 'tls:div-end', offset: 14195, content: '', id: KR3eq093_jc_002-d8d62}
  - {type: 'tls:div-start', offset: 14195, content: '', id: KR3eq093_jc_002-d8d63, level: 2, head_text: 治病以胃為主不論粗細人}
  - {type: 'tls:head', offset: 14195, content: '', id: KR3eq093_jc_002-d8.d63.h1s1}
  - {type: 'tls:div-end', offset: 14748, content: '', id: KR3eq093_jc_002-d8d63}
  - {type: 'tls:div-start', offset: 14748, content: '', id: KR3eq093_jc_002-d8d64, level: 2, head_text: 冒虛不可下}
  - {type: 'tls:head', offset: 14748, content: '', id: KR3eq093_jc_002-d8.d64.h1s1}
  - {type: 'tls:div-end', offset: 14903, content: '', id: KR3eq093_jc_002-d8d64}
  - {type: 'tls:div-start', offset: 14903, content: '', id: KR3eq093_jc_002-d8d65, level: 2, head_text: 補脾歌}
  - {type: 'tls:head', offset: 14903, content: '', id: KR3eq093_jc_002-d8.d65.h1s1}
  - {type: 'tls:div-end', offset: 15720, content: '', id: KR3eq093_jc_002-d8d65}
  - {type: 'tls:div-start', offset: 15720, content: '', id: KR3eq093_jc_002-d8d66, level: 2, head_text: 萬病皆以脾胃為主}
  - {type: 'tls:head', offset: 15720, content: '', id: KR3eq093_jc_002-d8.d66.h1s1}
  - {type: 'tls:div-end', offset: 16488, content: '', id: KR3eq093_jc_002-d8d66}
  - {type: 'tls:div-start', offset: 16488, content: '', id: KR3eq093_jc_002-d8d67, level: 2, head_text: 痰症多從外面而得}
  - {type: 'tls:head', offset: 16488, content: '', id: KR3eq093_jc_002-d8.d67.h1s1}
  - {type: 'tls:div-end', offset: 16629, content: '', id: KR3eq093_jc_002-d8d67}
  - {type: 'tls:div-start', offset: 16629, content: '', id: KR3eq093_jc_002-d8d68, level: 2, head_text: 病從飲食男女得者甚多}
  - {type: 'tls:head', offset: 16629, content: '', id: KR3eq093_jc_002-d8.d68.h1s1}
  - {type: 'tls:div-end', offset: 16759, content: '', id: KR3eq093_jc_002-d8d68}
  - {type: 'tls:div-start', offset: 16759, content: '', id: KR3eq093_jc_002-d8d69, level: 2, head_text: 凡治久病只論當下不必細問來由所謂君子而時中也}
  - {type: 'tls:head', offset: 16759, content: '', id: KR3eq093_jc_002-d8.d69.h1s1}
  - {type: 'tls:div-end', offset: 17221, content: '', id: KR3eq093_jc_002-d8d69}
  - {type: 'tls:div-start', offset: 17221, content: '', id: KR3eq093_jc_002-d8d70, level: 2, head_text: 虛癆陰熱之症非加補脾之藥必不愈欲加補脾之藥不瀉元府之陰熱斷不能加也此中斬關奪隘正是人鬼分界處全在眼明手快相其機宜而乘之耳}
  - {type: 'tls:head', offset: 17221, content: '', id: KR3eq093_jc_002-d8.d70.h1s1}
  - {type: 'tls:div-end', offset: 17682, content: '', id: KR3eq093_jc_002-d8d70}
  - {type: 'tls:div-start', offset: 17682, content: '', id: KR3eq093_jc_002-d8d71, level: 2, head_text: 癆病有色癆氣癆之分不可一例而觀}
  - {type: 'tls:head', offset: 17682, content: '', id: KR3eq093_jc_002-d8.d71.h1s1}
  - {type: 'tls:div-end', offset: 18338, content: '', id: KR3eq093_jc_002-d8d71}
  - {type: 'tls:div-start', offset: 18338, content: '', id: KR3eq093_jc_002-d8d72, level: 2, head_text: 虛癆陰熱用大黃原是創格有小心不敢用者只用山甲亦可}
  - {type: 'tls:head', offset: 18338, content: '', id: KR3eq093_jc_002-d8.d72.h1s1}
  - {type: 'tls:div-end', offset: 18658, content: '', id: KR3eq093_jc_002-d8d72}
  - {type: 'tls:div-start', offset: 18658, content: '', id: KR3eq093_jc_002-d8d73, level: 2, head_text: 呃逆之症盡由命根虧損不能引虛火歸元所致}
  - {type: 'tls:head', offset: 18658, content: '', id: KR3eq093_jc_002-d8.d73.h1s1}
  - {type: 'tls:div-end', offset: 18996, content: '', id: KR3eq093_jc_002-d8d73}
  - {type: 'tls:div-start', offset: 18996, content: '', id: KR3eq093_jc_002-d8d74, level: 2, head_text: 惡露水大治呃逆之症}
  - {type: 'tls:head', offset: 18996, content: '', id: KR3eq093_jc_002-d8.d74.h1s1}
  - {type: 'tls:div-end', offset: 19290, content: '', id: KR3eq093_jc_002-d8d74}
  - {type: 'tls:div-start', offset: 19290, content: '', id: KR3eq093_jc_002-d8d75, level: 2, head_text: 治癆嗽要補先天命門穴}
  - {type: 'tls:head', offset: 19290, content: '', id: KR3eq093_jc_002-d8.d75.h1s1}
  - {type: 'tls:div-end', offset: 19472, content: '', id: KR3eq093_jc_002-d8d75}
  - {type: 'tls:div-start', offset: 19472, content: '', id: KR3eq093_jc_002-d8d76, level: 2, head_text: 滑瀉之症非加三生飲不可}
  - {type: 'tls:head', offset: 19472, content: '', id: KR3eq093_jc_002-d8.d76.h1s1}
  - {type: 'tls:div-end', offset: 19696, content: '', id: KR3eq093_jc_002-d8d76}
  - {type: 'tls:div-start', offset: 19696, content: '', id: KR3eq093_jc_002-d8d77, level: 2, head_text: 學生二十之前後病以六味地黃湯為主藥再看所加}
  - {type: 'tls:head', offset: 19696, content: '', id: KR3eq093_jc_002-d8.d77.h1s1}
  - {type: 'tls:div-end', offset: 19920, content: '', id: KR3eq093_jc_002-d8d77}
  - {type: 'tls:div-start', offset: 19920, content: '', id: KR3eq093_jc_002-d8d78, level: 2, head_text: 補益必得仙人煉神還虛之意方好}
  - {type: 'tls:head', offset: 19920, content: '', id: KR3eq093_jc_002-d8.d78.h1s1}
  - {type: 'tls:div-end', offset: 20162, content: '', id: KR3eq093_jc_002-d8d78}
  - {type: 'tls:div-start', offset: 20162, content: '', id: KR3eq093_jc_002-d8d79, level: 2, head_text: 補益不可泥}
  - {type: 'tls:head', offset: 20162, content: '', id: KR3eq093_jc_002-d8.d79.h1s1}
  - {type: 'tls:div-end', offset: 20591, content: '', id: KR3eq093_jc_002-d8d79}
  - {type: 'tls:div-start', offset: 20591, content: '', id: KR3eq093_jc_002-d8d80, level: 2, head_text: 補益有陰陽之分不得泥住治一邊}
  - {type: 'tls:head', offset: 20591, content: '', id: KR3eq093_jc_002-d8.d80.h1s1}
  - {type: 'tls:div-end', offset: 20767, content: '', id: KR3eq093_jc_002-d8d80}
  - {type: 'tls:div-start', offset: 20767, content: '', id: KR3eq093_jc_002-d8d81, level: 2, head_text: 黨參黃耆白朮三藥定評}
  - {type: 'tls:head', offset: 20767, content: '', id: KR3eq093_jc_002-d8.d81.h1s1}
  - {type: 'tls:div-end', offset: 20825, content: '', id: KR3eq093_jc_002-d8d81}
  - {type: 'tls:div-start', offset: 20825, content: '', id: KR3eq093_jc_002-d8d82, level: 2, head_text: 補陰亦有至理終難驟見起色}
  - {type: 'tls:head', offset: 20825, content: '', id: KR3eq093_jc_002-d8.d82.h1s1}
  - {type: 'tls:div-end', offset: 21013, content: '', id: KR3eq093_jc_002-d8d82}
  - {type: 'tls:div-start', offset: 21013, content: '', id: KR3eq093_jc_002-d8d83, level: 2, head_text: 虛弱人能受陽藥猶易治}
  - {type: 'tls:head', offset: 21013, content: '', id: KR3eq093_jc_002-d8.d83.h1s1}
  - {type: 'tls:div-end', offset: 21099, content: '', id: KR3eq093_jc_002-d8d83}
  - {type: 'tls:div-start', offset: 21099, content: '', id: KR3eq093_jc_002-d8d84, level: 2, head_text: 補藥亦多聊舉一二以為例}
  - {type: 'tls:head', offset: 21099, content: '', id: KR3eq093_jc_002-d8.d84.h1s1}
  - {type: 'tls:div-end', offset: 21192, content: '', id: KR3eq093_jc_002-d8d84}
  - {type: 'tls:div-start', offset: 21192, content: '', id: KR3eq093_jc_002-d8d85, level: 2, head_text: 治病有即瀉為補者方能治此虛滯之症}
  - {type: 'tls:head', offset: 21192, content: '', id: KR3eq093_jc_002-d8.d85.h1s1}
  - {type: 'tls:div-end', offset: 21548, content: '', id: KR3eq093_jc_002-d8d85}
  - {type: 'tls:div-start', offset: 21548, content: '', id: KR3eq093_jc_002-d8d86, level: 2, head_text: 久病必須掃盡外症方可治其根本}
  - {type: 'tls:head', offset: 21548, content: '', id: KR3eq093_jc_002-d8.d86.h1s1}
  - {type: 'tls:div-end', offset: 21748, content: '', id: KR3eq093_jc_002-d8d86}
  - {type: 'tls:div-start', offset: 21748, content: '', id: KR3eq093_jc_002-d8d87, level: 2, head_text: 人有徹骨寒症縱用好藥一兩付不能了}
  - {type: 'tls:head', offset: 21748, content: '', id: KR3eq093_jc_002-d8.d87.h1s1}
  - {type: 'tls:div-end', offset: 22082, content: '', id: KR3eq093_jc_002-d8d87}
  - {type: 'tls:div-start', offset: 22082, content: '', id: KR3eq093_jc_002-d8d88, level: 2, head_text: 治遺泄之症老幼不同}
  - {type: 'tls:head', offset: 22082, content: '', id: KR3eq093_jc_002-d8.d88.h1s1}
  - {type: 'tls:div-end', offset: 22305, content: '', id: KR3eq093_jc_002-d8d88}
  - {type: 'tls:div-start', offset: 22305, content: '', id: KR3eq093_jc_002-d8d89, level: 2, head_text: 遺泄之症最難治}
  - {type: 'tls:head', offset: 22305, content: '', id: KR3eq093_jc_002-d8.d89.h1s1}
  - {type: 'tls:div-end', offset: 22616, content: '', id: KR3eq093_jc_002-d8d89}
  - {type: 'tls:div-start', offset: 22616, content: '', id: KR3eq093_jc_002-d8d90, level: 2, head_text: 血症不離地黃湯吐血之症三年不犯方算全愈不然猶不可測切宜保養}
  - {type: 'tls:head', offset: 22616, content: '', id: KR3eq093_jc_002-d8.d90.h1s1}
  - {type: 'tls:div-end', offset: 23143, content: '', id: KR3eq093_jc_002-d8d90}
  - {type: 'tls:div-start', offset: 23143, content: '', id: KR3eq093_jc_002-d8d91, level: 2, head_text: 治血症上下不同}
  - {type: 'tls:head', offset: 23143, content: '', id: KR3eq093_jc_002-d8.d91.h1s1}
  - {type: 'tls:div-end', offset: 23308, content: '', id: KR3eq093_jc_002-d8d91}
  - {type: 'tls:div-start', offset: 23308, content: '', id: KR3eq093_jc_002-d8d92, level: 2, head_text: 吐血因遺精而得者甚多}
  - {type: 'tls:head', offset: 23308, content: '', id: KR3eq093_jc_002-d8.d92.h1s1}
  - {type: 'tls:div-end', offset: 23520, content: '', id: KR3eq093_jc_002-d8d92}
  - {type: 'tls:div-start', offset: 23520, content: '', id: KR3eq093_jc_002-d8d93, level: 2, head_text: 病有所以然須從此處去治}
  - {type: 'tls:head', offset: 23520, content: '', id: KR3eq093_jc_002-d8.d93.h1s1}
  - {type: 'tls:div-end', offset: 23776, content: '', id: KR3eq093_jc_002-d8d93}
  - {type: 'tls:div-start', offset: 23776, content: '', id: KR3eq093_jc_002-d8d94, level: 2, head_text: 吐血之症只宜清補而已一見熱藥便吐}
  - {type: 'tls:head', offset: 23776, content: '', id: KR3eq093_jc_002-d8.d94.h1s1}
  - {type: 'tls:div-end', offset: 24063, content: '', id: KR3eq093_jc_002-d8d94}
  - {type: 'tls:div-start', offset: 24063, content: '', id: KR3eq093_jc_002-d8d95, level: 2, head_text: 山中之藥能壯筋骨服壯之人宜用}
  - {type: 'tls:head', offset: 24063, content: '', id: KR3eq093_jc_002-d8.d95.h1s1}
  - {type: 'tls:div-end', offset: 24175, content: '', id: KR3eq093_jc_002-d8d95}
  - {type: 'tls:div-start', offset: 24175, content: '', id: KR3eq093_jc_002-d8d96, level: 2, head_text: 水中之物能眠陽虛癆之人宜用}
  - {type: 'tls:head', offset: 24175, content: '', id: KR3eq093_jc_002-d8.d96.h1s1}
  - {type: 'tls:div-end', offset: 24329, content: '', id: KR3eq093_jc_002-d8d96}
  - {type: 'tls:div-start', offset: 24329, content: '', id: KR3eq093_jc_002-d8d97, level: 2, head_text: 海龍能補陰回陽}
  - {type: 'tls:head', offset: 24329, content: '', id: KR3eq093_jc_002-d8.d97.h1s1}
  - {type: 'tls:div-end', offset: 24423, content: '', id: KR3eq093_jc_002-d8d97}
  - {type: 'tls:div-start', offset: 24423, content: '', id: KR3eq093_jc_002-d8d98, level: 2, head_text: 平地有二物亦能眠陽}
  - {type: 'tls:head', offset: 24423, content: '', id: KR3eq093_jc_002-d8.d98.h1s1}
  - {type: 'tls:div-end', offset: 24465, content: '', id: KR3eq093_jc_002-d8d98}
  - {type: 'tls:div-start', offset: 24465, content: '', id: KR3eq093_jc_002-d8d99, level: 2, head_text: 養病歌}
  - {type: 'tls:head', offset: 24465, content: '', id: KR3eq093_jc_002-d8.d99.h1s1}
  - {type: 'tls:div-end', offset: 24720, content: '', id: KR3eq093_jc_002-d8d99}
metadata:
  title: 蠢子醫
  edition:
    short: jc
  source:
    repository: tls-texts
