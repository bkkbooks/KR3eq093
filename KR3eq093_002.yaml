有三端者少有二端者多傷寒初起分兩端只泥發汗便有偏若是脈浮兼有力或弦或緊在外邊一經發汗便能愈此是受寒非中寒受寒只在肌膚里中寒已入骨髓間二脈不浮不弦緊不起不伏在裡邊好似平人沒有病中候無神鬆懈連便須肉附吳萸入骨治補氣補血是正傳溫暖腠理髮帶汗一付兩付便安然此是中寒非受寒渾身疼痛不能堪若但發汗必不愈必須溫里藥上前小小蒙醫多不識故為爾等細細言傷寒以解表為主未至胃府結實胃府結實脈必實大應指而起斷不可下人老氣衰毛竅松不知不覺便中風中字比受字重輕輕發汗必不濟事兩膀疼痛不能忍小小發汗必不靈再説大劑透毛骨病雖暫愈益虛中先用火罐搬一搬便得身體一時輕再用火艾灸一灸又得身體一時輕可知風自毛竅入必得透出毛竅始能松更用烏附熬膏藥常常貼之方有功因悟傷寒病治法不透發汗總不靈我嘗治一重傷寒睜眼胡説呶呶生我為大加發汗一兩劑譫語如故依舊形因摸手心乾燥甚手心腳心與中心相應心中不透手心必燥此法切不可廢知是骨髓不透血不榮再加清表仍發汗手心溫潤漸漸平因悟疫邪傳胃舌乾黃燥糞不盡舌不清舌黃不退還須再下猶之手心不潤還須再表醋軍用醋軍必用桃仁紅花邪傳陰分故也酒軍用酒軍必用枳實芒硝邪傳陽分故也疊代用傳陰傳陽始收功若是傷寒傳胃府舌不幹黃外無憑胃脈必實大洪數應指但是心煩恆悶亂胃脈應指而起便行得得了調胃承氣便安寧亦有傳胃大下後病雖回頭火橫生必俟進飯昏沉候忽然一汗神頓清飯能壓虛火不知不覺便入睡鄉矣猛然一汗頓覺神思精爽從前未出之汗至此透出皆由前日邪氣傳入里風藥未透骨髓中所以傳經入里而發熱清表必加酒與蔥荊芥防風前胡柴胡皆可加直中入里而發熱溫暖命火加防風麻黃羌活獨活皆可加必將客邪徐引出免致後日火橫生可知風自毛竅入到底透出毛竅始能平烏附膏藥方川烏三錢草烏三錢附子二錢桑寄生三錢獨活二錢半秦艽二錢當歸三錢紅花二錢白芥子三錢乳香一錢半沒藥一錢半香油紅丹傷寒傷風有分辨無大分辨總以表汗為主其異只在白芍耳時症不外風與寒診脈下藥要分端傷風必是脈和緩渾身痠懶不能安傷寒必是脈弦緊渾身搐戰不能眠傷風手心微含潤傷寒手面澀而干初起病症略相似麻黃桂枝各有單麻黃湯主治傷寒桂枝湯主治傷風俱見仲景傷寒論傷寒有二同是傷寒有重輕二者亦要去分清傷寒輕者麻黃解傷寒重者豈易平重須川烏與草烏補氣補血始稱情薑桂吳萸猶多加豈但麻黃湯為名傷風有二同是傷風有兩端不可泥住桂枝單果然脈和無大病桂枝一付湯立痊如若喉咄聲嘶重尤須肉肉桂附附子辛細辛芷白芷添其人受風又受寒不加大熱必不占我嘗見此痛流汗重用大熱始得安脈上強硬可憑可知古人立方重分辨吾人亦要善周旋傷寒傷風有相兼而見者傷風雖説是風亦有寒但看酸懈那一端傷寒雖説是寒亦有風便看搐顫便知清二者均要去出汗但是出汗有重輕陰邪痛出方能愈陽邪再出便虛中故曰白芍微帶斂桂枝湯中有白芍使他寒從毛竅松聖人用藥上天平但看二子去問行寒症有傷寒受寒中寒之分治亦不同寒症初起有三端一味發散便有偏若但發汗便能愈必是脈弦脈緊為可觀宜用麻黃湯若不弦緊脈如綿不起不伏在中間其人力乏痛汗飲水以致渾身疼痛酸懈故見此脈也必須大補氣血黨參白朮當歸熟地暖命元肉桂附子炮薑方可透發這陰寒看這陰寒怎樣重猶是受寒非中寒若是中寒入內里骨頭骨節盡含酸六脈遲滯全不動渾身一塊冰凌丸必須熱補痛出汗方能貞下去啓元內用肉附透臟里外用蔥薑暖丹田過了七日便不治全憑急火熱上前寒症就有怎利害不但仲景麻黃單風症有傷風受風中風之分治亦不同風症初起有三端不但桂枝去斂汗若僅陽邪入腠理桂枝一付便立痊此本陽邪容易治脈上和緩竄指間若是陰風入骨寒入竅只在內里亂動攤不是大搐便大顫毫無形影到指尖此是肝膽受風邪甲木搖動支持難必須芎川芎歸當歸羌羌活防防風痛出汗蔥水和糖當飯餐又有風邪中臟湧痰涎忽而倒地挪捶拳羊羔風症從此起不是左癱並右癱此等風症入骨治二烏川烏草烏二活羌活獨活大透宣即補氣血吃兩付繼進馬前服壯丸方見四卷婦科附注日飲皂牙皂礬白礬使吐水雷火針灸暖命元可知風症有陽亦有陰還須方內細細參虛熱不盡風寒猶存宜發散兼收斂凡是風寒骨內侵一寒一熱汗津津再説風藥去表汗已竟汗透熱不禁再説純補去固表內里風寒尚有存不如蒼蒼朮麻麻黃仍帶用加上五味酸棗仁一闔一闢天地理動靜機緘不由人試觀做文章一反一正方出神試觀煉仙丹一呼一吸便還真治病不知此中真消息縱遇盧醫不成春傷寒誤瀉必須再發散傷寒未解遽用瀉渾身冰涼似霜雪只得回頭用熱補大加發散是正説發散緩了病不治發散緊了即回轍但是回轍身熱燥動至兩鼻外出血即用清解亦不妨必須多方透肌熱生蜜和酒前心打打了前心後心折再進火罐搬一搬一切熱燥必漸泄隨用清涼去解散無不應手立時制此正轉敗為功日不如此治便澌滅豈可他誤我亦誤坐視此人抱恨別乾燒之症必須內外兼理人有乾燒滯皮中清涼解散全無功多是羊毛疔露頭滯住一身熱熊熊不如先用黃蒿一大把拿在手中搓當胸前後心皆搓即和蜜水頻頻打用干酒打後以蜜搓之見了紫點用針攻更取火罐搬一搬一切滯氣盡皆松再吃清涼去解散無不應手立時輕吾嘗治此千千萬斷必以此為先鋒更有錦文與紫萍清涼解散與此同但是針法有不用莫謂異曲而同工因悟人受風寒貫當胸渾身痠懶四肢疼內用熱藥去解散或用醋麩蔥薑加入炒熱尉有功可知聖人修身理以之治病妙無窮養中固所以制外制外亦所以養中莫謂壺中日月小四大神洲無不通人身寒熱有一摸手即得者一診脈時手甚熱知是寒向裡邊撤寒既裡邊作主人熱必向外去為客所以一摸他裡手便似出爐鐵寒症者多一診脈時手甚寒知是熱向裡邊殫熱既裡邊作主人寒必向外去為客所以一摸他裡手便以掬霜雪熱症者多亦有外寒內亦寒五臟六腑冰凌丸如此之寒寒徹骨怪得十指玉筍攢必是大寒症亦有外熱內亦熱五臟六腑火龍血如此之熱熱烙人怪得十指煬灶爇是大火症更有熱厥與寒厥瘟疫條款從此設熱厥便將大黃用寒厥必須肉肉桂附附子折二厥雖然外相同究竟內里有分別即請小便觀一觀便將內里盡昭雪內裡熱時便黃濁不黃必濁內裡寒時便澄徹此是千古不易法以之治病有妙訣寒熱有因傷寒見者有不因傷寒見者皆因濕寒作熱痰涎滯住經絡而初起看似傷寒實非傷寒宜開痰宜瀉水豈可與傷寒同日語哉寒熱皆從傷寒見一見此症便發汗亦有痰涎滯經絡一寒一熱若流電但是按脈大不同不弦不緊為可辨弦緊是傷寒不弦不緊是痰涎為祟細按濡滯亦不免一見茶湯便流汗不似傷寒汗難出見了汗時病立斷此症雖然汗流身到了那時病仍犯似乎瘧疾往來氣滯寒熱從晝起血滯寒熱在夜半治宜斑蟊十棗湯十棗湯加斑蟊一二枚加上化痰前胡橘紅厚朴之類便無患痰涎為祟寒熱往來非用導吐法不行濕熱能作熱與寒凡是癆症類皆然況乎夏秋濕作熱常有痰涎在胸間十天半月不能食痰在胸間胸已滿矣焉能飲食冷茶冷水時一餐不是晝里時寒熱便是夜裡熱與寒或有間日一發作或有晝夜相接連細按脈理無滯結不起不伏在中間誰知脈已出本位一診中指始瞭然或如羅紋或水旋痰涎一擁到頭顛用補用瀉皆不效不如導法最為先蒼蒼朮半半夏為君皂皂角礬白礬研使他飲此便湧痰湧出痰涎心寬綽再無一寒一熱作祟緣窗外明月圈外注只要上下細周旋沉陰傷寒甚是難治沉陰傷寒治甚難乾燒如𨫼接連天酒軍醋軍疊代用大瀉膠糖始少安轉眼如故仍乾燒青龍青龍湯方見仲景傷寒論飲下汗亦難胸中虛滿欲作嘔生梨咀嚼以壓干乾燒不退如何好大煮蔥水青龍煎痛飲一碗始出汗骨瘦如柴支架難古云隆冬痼寒夏始見吳生吳又可非之甚是偏吾甥痼寒因尿床隆冬褥被未嘗干始瀉膠糖終緑塊沉陰痼寒露一斑吾治此病甚擔心有言溫補庶可痊吾診此脈盡長洪其中積渣謂脈微帶刺硬附注時一參説是沉寒實實有如此乾燒補甚難生梨生瓜時時壓且顧急火把眉燃俟得蔥水痛出汗乾燒少退漸加餐或進滑石以壓熱或進金丹以破寒每吃四五丸二味只須循循進恐怕傷胃飲食難遲至半月少壯實大加金丹始得痊一切沉寒盡下來再無一寒一熱到眼前傷寒瘟疫治法到底不同傷寒瘟疫治不同到了入胃便相通入了胃時便結實一樣通利一樣靈雖然如相近宜涼宜溫總分明傷寒瀉時火將軍大加溫散方有功瘟疫到底用大黃一切清利藥相從如果寒熱交相雜還是脈理認不清候久了有互用陰陽遞轉或相同傷寒傳裡與瘟疫治法相同或清或涼或瀉服之均能獲效但傷寒在外溫散而愈者有之傳裡攻瀉而痊者有之決不能容留日久惟瘟疫自里達外清解而復涼瀉清瀉而復涼解遞相輪環有經旬彌月不能身涼體淨者此二症之所以區別也孫鎮川謹識治瘟疫舌胎最當家傷寒不必看舌胎惟有瘟疫舌上來舌上濕黃行不得尚未傳裡切不可行舌上干黃宜大開傳裡必矣急用行藥酒軍傳陽用醋軍傳陰用必合著行血行氣仔細裁傳陽晝重傳陰夜重舌上淡黑陰寒久男子因陰寒而得女子因經寒而然或是深黃似香灰與那魚肚濕滑甚一切將軍莫妄猜宜興脆磁干而裂舌上雖白老樹推干如樹皮雖白亦行大小承氣並調胃舌上幹甚雖白亦行三方並見仲景傷寒論惟有乾黑治不回舌上乾黑內已壞雖行無益此是吳生治疫法吳又可瘟疫論言之最詳不看脈理亦通哉按瘟症舌黑如墨重用石膏至三四兩有連服數劑色變而生者仲唐附識按傷寒時疫及一切雜症凡見舌起芒刺胎聚干黃者宜急下之若舌黑如墨而乾者或涼或下勿可遲疑恐熱盛亡陰至成逆症如舌黑滑潤二便清利如常者宜速滋陰生水是已現胎均有急象皆不可緩只在醫人者詳查而明辨可也孫鎮川謹識風火濕寒交雜多是風木為祟有一成童風症多傷寒瘟疫一齊搓四肢冰冷是瘟疫渾身戰栗受寒過喉間痰喘慳不出夜裡大熱甚可愕一看此症無經紀知是甲木搖動妄起波只要入手先擒賊暗扶胃氣無差訛外用蒼蒼朮麻麻黃去出汗內用三陳三陳湯去消磨加上金丹往下行一切滯氣盡從陰分削不使胃氣有所傷便可一付起沉疴吾今謹告小後生再遇此症莫驚愕只要脈上分清楚只要藥上無偏頗一切寒火交雜症全憑認定老賊窩認定老賊有主意便可立時斬麼魔吾今已七十猶奉此意為金科不敢一絲有走作治虛症以扶正氣為主論治病時只論病不可輕意去扶正一切邪氣猶未除妄加補益必立橫所以傷寒與瘟疫不肯參黨參耆黃耆竟持贈如若正氣有大虧雖吃名藥亦不應不是湯頭有不合只緣正氣和不動不用補益必不靈邪氣且將日強硬不如參耆為先鋒不如肉肉桂附附子為使令正氣一足陽回來一切陰霾盡掃淨縱有壘塊不能達略加和藥命立定試觀虞廷去伐苗一舞千羽苗遂聽試觀文王去伐崇一修德政崇立應我嘗治暴脫參耆之外無他贈用黨參黃耆則肉桂附子可知我嘗治沉積肉附之外無他敬用肉桂附子則黨參黃耆可知用里少了不當家參耆歸地常用稱用黨參黃耆未有不兼當歸熟地者有陽不可無陰也雖曰治病宜除邪不使邪所妄縱橫如若真該用補益亦必攻伐盡去淨不問病症之如何總以參耆為之政正氣一旺能飲食補而不能食是不當補而補矣雖有芥蒂亦不橫時候久了盡降伏那有一個作蹭蹬按補虛之要在扶胃氣胃氣強則飲食進飲食進則氣血生所謂得谷者生失谷者死也概用參耆歸地以補虛法至善耳惟多屬膩塞中宮之品恐胃強者能受胃弱者難當臨症猶須斟酌孫鎮川謹識治病以胃為主不論粗細人治病須要尋主翁胃為一身之主失了主翁便不通我嘗治一農婦甚強壯不把胃虛置意中肝腎肺命皆暗結便將四部用藥攻誰知胃虛不當家不能操縱使藥行藥不治病反生病動與主人為敵鋒專補胃家余帶治四經之病始漸平又有書香之婦同日治脈症相同藥亦同但是胃虛加補益諸病如失分外精可知胃為轉輸關一有虧損便不靈胃經虧損藥不運縱有名藥陷入坑不惟無益諸經病反與主人作難星胃經虛弱藥必陷入為禍試觀魯家失柄三桓盛日入臺下便興戎千古亂賊皆如此盡因不認主人翁不知脈理也罷了知道脈理要尋清農婦士婦都一樣豈可外面任溟濛余嘗治一商人年四十餘因勞病暑身熱燥煩醫誤為傷寒用重表之劑遂大汗淋漓神疲氣短口大渴脈細無倫次按之虛無余曰寒傷形為有暑傷氣為不足六脈虛無傷暑明矣急用人參三錢麥冬三錢五味十五粒煎服次日脈證俱減又合四君子湯服之一劑進粥碗許繼而漸培可謂安穀者昌矣越宿汗復大出手足冷至肘膝脈虛且數按之如無余曰虛極矣汗多不止所致耳急服參耆桂附歸術等藥日一進脈證乃爾余悟曰藥之取效必賴胃之運化胃氣虛雖藥對證咸歸罔效計必得適口之味以充胃氣參耆自然得力遂問病者喜食羊肉否曰善余曰肉者胃之藥也羊肉補氣與參耆同功參耆不能取效明是胃虛以肉充之胃氣自強則運化參耆即可奏功再取羊肉煮而食之仍以前藥投之立愈從可知胃為一身之主胃氣強則百病立消胃氣虛則諸病交侵也孫鎮川謹識冒虛不可下有一少年氣甚盛上焦滯結下焦硬中焦脈虛無有力伊欲打藥把胃淨我言胃中空空無有物打藥一到必虛橫不惟上下皆無益且將中間增一病他言我吃丸藥不怨爾果然陷入中焦沒頭送遲至數日要煎藥我言此宜開胸兼扶正如果胸開飲食進再將下焦細細淨伊言我急不能留情願打藥把命聽果然又陷中焦不能出好和水牛落檻阱過了一月忽見面猶然首鼠多蹭蹬補脾歌治病須先明主氣主氣不明空欷歔問是主氣何處來一身之宰曰脾胃先天以命門為主後天以脾胃為主胃為水穀海脾為生化源生化旺時病易已生化虧損病必繁凡是久病要扶脾扶得脾時病不危治病以進飲食為主腸胃通調胸膈利能飲能啖夫何疑我今告你補脾法胃之真類出腎家左腎屬水右腎屬火水即火之根火即水之芽命火旺時脾自旺不必離中問生涯棗仁遠志柏子仁能生脾土不能生胃土腎經寒甚脾必寒肉肉桂附附子黑薑熟地添壯火食氣不可久服若但腎虛並脾虛紙故紙砂宿砂益智肉萸肉地熟地居杜仲山藥芡實雲苓紫河車青鹽皆可用少火生氣可以常服至若脾虛火雜疾病攢無如裴子大補丸參黨參術白朮為君帶黃連枳枳實朴川朴香木香砂宿砂一齊安三消三消飲三陳三陳湯皆並用二方俱見本草綱目煉蜜為丸和為先不大補瀉以治虛癆百損症無不應手漸漸痊雖然是補能導滯痞脹疼痛並調劑雖然是補能流濕瘧痢痰飲便載戢即有虛癆火旺甚量加補脾帶清金一切滋陰與降火虛癆日久總宜慎可知參黨參術白朮苓雲苓草甘草單脾虛無病尚可餐脾虛有病宜去邪誰如大明老裴仙參黨參耆黃耆歸當歸地熟地雖名藥能救氣血大虛弱若要日用常常服便將脾胃上關鑰硝黃枳朴亦名藥胸中壘塊立時削若要日用常常服便將先天真氣脫故曰久病之人宜丸藥無如裴仙那一著暴得之症多平肝吾嘗作有降賊篇以此相濟方無弊莫謂補脾無真傳按胃為水穀之海脾為生化之源生化旺則氣血清和諸病屏息生化衰則氣血虧損百病交侵非細故也惟東垣先生深得其旨闡發脾胃元氣之妙可謂呼聾震聵矣世之醫者徒執病形不推病本脾胃之義置而匆講如脾虛氣短似為痰喘泥為脾熱痰壅瀉以黃芩蘇子脾虛發熱似有外感認為風寒重以表汗脾虛下陷變為後重誤謂積滯下以硝黃枳朴脾虛不運變為水脹中滿猶謂宿積不化導以巴豆二醜勞瘵脾虛食減而噁心溏瀉又用知柏滋陰恣意投之脾胃轉傷而疾轉篤曷可勝言皆因未明主氣之説故也主氣實而攻之則病易愈主氣虛而攻之則病反加非藥不能治病也主氣不能行藥力也鎮治病三十餘年矣凡治內傷雜症即産後諸虛症反覆思維是不能取效者實因未明主氣之説也故敢注之於左孫鎮川謹識萬病皆以脾胃為主自古方術有萬端不得一貫總枉然吾讀醫書浩無涯偶於脾胃到真家脾胃者真氣之樞紐命門者真氣之來由真氣發見無從見真氣運轉説從頭胃在一身常常行無少留待無少停一有氣凝不能行百般疼痛從此生一有痰窒不能行百般怪症從此生一有食滯不能行百般脹悶從此生所以裴子善言醫以有脾胃在胸中人家教他去催生宜用芎歸他把三陳去決壅視彼瞑眩無知狀知是痰塞胃口氣不行人家教他去止崩宜用黨參黃耆他把腸胃沉積攻視彼厄厄欲吐狀知是脾失健運氣不行人家教他去調經宜用桃仁紅花他把腸胃積滯通視彼肺喘便結狀知是氣滯中焦久不行人家教他去定心宜皆棗仁遠志人參砂仁他把蒼蒼朮半半夏去為君視彼嘈雜欲嘔狀知是痰窒中州氣不伸人家教他去安神宜用丹砂龍齒牛黃琥珀他把小胃丹瀉入視彼右關數滑甚知是痰火氣衝心人家教他去治腰宜用杜仲續斷故紙肉桂他把小胃丹去消視彼噁心嘔吐狀知是濕痰陷胯氣不調此皆胃氣之有餘撥轉胃氣在須臾若是胃氣有不足補養胃氣亦不虛試看裴子補養法亦有數端之堪誇人家教他去解結胃中堅解不行已下數四他把補中益氣去流啜視彼脈遲細而虛外面氣弱神疲知是元氣不運病不撤人家教他去清熱宜用黃芩白芍之類他把參薑五味去餔嚼視彼脈洪數無倫外面氣乏神疲呼之不能以語應知是真氣不足無收攝人家教他治水腫宜用巴豆防己之類他加八味培土中黨參黃耆白朮視彼汪洋之肆行知是脾無根柢火不生人家教他治顛狂宜用藜蘆細辛之類他加竹瀝獨參湯視彼濡緩脈氣象外面形瘦色蒼知是胃虛火動妄飛揚可知胃為轉輸關一身流動不能間無論有餘不足症總要使之若轉環轉動胃氣便無病此是治病之大關守住關頭有把握不要案上書如山經云脾胃為後天之根本人果脾胃調和氣血充盛雖有病亦自無妨一失運轉之常則百般病症必從此生篇中引裴子言醫大約於脾胃有餘似不足者以通利為主不足似有餘者以補養為主無非貫以中道則調理脾胃為醫中之王道誠不虛矣不惟發明脾胃為重且有功於裴子也侄金門謹志痰症多從外面而得人言裴子脈甚靈吾言裴子相亦精病到無處尋歸閣每從痰症看神情不是噁心與嘈雜痰凝中州故也便是頭暈並耳鳴痰之外症不是嘔吐妨飲食痰客中焦故也便是瞑眩癡呆呈痰之外候蒼朮半夏宜多加況有脈弦而滑為可憑可知妙理每從空中得神遊象外若神明百般怪症從此起素問言之精又精百般怪症由痰生本於素問病從飲食男女得者甚多禮云飲食男女人之大欲存焉人之得病無多端只因飲食男女忽受寒受了寒邪便凝滯陰火陽火出此間一見陰火六味用六味地黃湯出自朱丹溪一見陽火補中添補中益氣湯出自李東垣二方豈能包盡這些病祗要加減變化圓加減變化何處來還從脈理細細裁脈理便是軍機府又能文來又能武凡治久病只論當下不必細問來由所謂君子而時中也治病總要論當下不論當下便大差陽症傷寒症日久必變陰汗吐下後邪寒邪易侵手足未冷鼻先寒元氣虛弱好整襟脈雖洪數實無根斷續不整疾無倫無次序一似疾行無善步不躓山兮而躓岑縱有便結譫妄症元氣太虛不能運行所致桂附參薑細細斟有因溫補而下者有俟數日再加瀉藥而愈者又有陰症日久時變陽陰症虛癆症也壯火食氣實難當本因羸弱好溫暖桂附連進並黑薑熱入骨髓油入面真陰失守陷膏肓一人虛寒食桂附日久陷入陰分發熱一人虛弱食生薑胡椒太多陷入陰分發熱如油入面清之甚難多致不救凡中此病皆是少年人若老年人不惟無損而且有益咯血盜汗並遺精猶謂虛熱不可清豈知滋陰降火方正為此症續命湯臨危勒馬善收拾撲滅相火滋元陽知柏地黃湯最善守住身體無走泄邪陷陰分最易走泄少年人多死於此多書死字慎行藏禁酒色止妄想病到此時無有過於此法醒時宜坐睡宜醒如履如臨恐有走泄之失牢把尾閭固苞桑此症雖不用大涼滋養氣因是神方裴子治此症亦用滋養之藥但以補脾為主略有轉關即宜禁止滋補藥説得甚好不知此事甚難非加行藥斷不能補觀下二篇始知治癆之難觀下二篇方得治癆之妙此亦千古創格也虛癆陰熱之症非加補脾之藥必不愈欲加補脾之藥不瀉元府之陰熱斷不能加也此中斬關奪隘正是人鬼分界處全在眼明手快相其機宜而乘之耳世間治病最為難惟有虛癆須細參不用滋陰降火藥他必不安然多用滋陰降火藥他亦不安然滋陰降火敗脾元敗了脾元是禍端不是溏瀉防飲食便是虛嗽湧寒痰此時須有補脾法使他暗暗轉機關尋常陰陽交勝理傷寒時氣猶有隔拒不通端如此寒熱日往來豈無陰陽爭勝端不用瀉法必不靈上下一貫始得安必須肉桂能通元府酒軍能通祕結來使用力透元府是真詮若得通時宜立止不然則危矣參耆多用補脾元肉桂少用些如若參耆補不住三生三生飲多助便回旋脾土漸旺能飲食百病以進飲食為主生出陰血癆嗽安血雖統於肝實皆生於脾此個法兒甚是好欲補先瀉無弊端譬如做文章筆不開合文不工譬如煉仙丹氣不升降丹不融我今謹告小後生一切治病理開合升降一樣同晝里不宜近婦女夜裡勒住小仙童用布一幅勒住仙童使莖向後不得妄動醒特宜坐睡宜醒常提精神妙無竅勿謂虛癆之人總宜清瀉法補法必不靈豈知虛癆之極亦有滯塞時必須相其機宜而乘之或當時令一小變或當節序一大更天氣轉人氣通溫涼補瀉必成功吾今始得滋補理方能死中去求生癆病有色癆氣癆之分不可一例而觀吾言治癆甚是難尤須色癆氣癆分其端一人雖然有色癆總以氣癆為主權此人遭後母之變吾初見此症即知結滯堅必須力透元府里肉桂酒軍最為先當吃一兩付滋陰降火始全刪以後漸得用補益即此便是他生端誰知前日之熱熱不斷今日之熱熱午前只用生梨生藕壓一壓以為補益漸可痊誰知午前之熱熱不止如油入面去甚難按脈不見有結滯如何午熱不能刪再為對面觀一觀知有暗氣在心間每吃稀飯三兩口噫氣往往往上翻夜半東方始發白嗽聲一陳噦痰涎此中仍有暗氣結即用蠟匱紫金丹當與數丸透真氣明日即不噦痰涎但是午熱尚未止熱之不可涼亦難涼藥斷不可用忽得京都傳異方加減常山七寶丹牽牛常山檳榔烏梅前胡元參葶藶天冬生地川貝羌活山楂大棗十個中有牽牛透中氣庶乎止熱有真傳誰知一付兩付略見效再吃一付便枉然有言峻補陰血以制火繼以補陽必安然誰知二藥全不效二藥本治色癆之聖藥以治氣癆故不見效病人亦遂厭藥煩仍用望聞細細思定是結氣未全刪即用山甲和青黛丸和黍米吃二錢午熱雖未盡去了已如破獄出牢間以後每用七八分身涼體靜漸漸安午熱已去盡成虛寒矣熱補從此敢多加二豎再不到眼前可知治病須要尋來歷色癆氣癆總分端相脈雖好仍相面虛癆之症難又難癸丑冬有農夫色癆面如土色咳聲串串不停片刻余詢所服之藥伊出方數張均屬補益尚不悖謬伊言皆無一效死在目前余曰是也弱人偏補藥膩胃脘嗽而不止涼風入肺即令服麻黃炭八分蜜炙熟地五錢砂仁搗枳實八分麩炒潞黨五錢一劑嗽如失飲食頗進彼欲照方多服余曰可仍用汝前服數方彼覺不敢入口余曰不汝欺請試之一服精神倍增數劑病去八九可知看藥書論湯頭執固不通者守定古方其誤人不少也林春謹識虛癆陰熱用大黃原是創格有小心不敢用者只用山甲亦可吾言虛癆用大黃亦須與主細商量先備洋參二三兩高麗參多偽故不用吃了此藥吃參湯一張一弛陰陽理轉瞬之時得平康這本斬關奪隘法亦是神仙絶妙方有説此方甚是險不如平妥為的當只用山甲炒焦為末一二兩丸入藥內用麝香初服三錢後用一錢有餘以治午熱甚是好以治此熱亦必良眼前現有康莊道何必鳥道與羊腸不須鄧艾度陰平不須韓信走陳倉此説亦有理我故録之以慰老藥王此症用山甲固可而大黃之説終不可廢故並録之以為日後之法也日至未申以後陽衰陰盛虛癆陰熱多起於此時或發於日落至平旦漸輕蓋氣雖虛而虛中每多有窒故陰熱愚嘗治此症用補益退陰熱藥多不效加醋軍以透之而熱即止又嘗治小兒痞疾陰熱用退陰熱藥多不效加軍灰以透之而熱亦止蓋嘗師此意也侄孫浚川謹記厄逆之症盡由命根虧損不能引虛火歸元所致喉間咄喉中噎大約病在上一節雖説病在上一節實由命火墜不住無以熔化一天雪若要治此症必須大補氣必須大補血必須大補先天真氣穴命根漸興旺命火自發越能引無根火與己甚親切好如真珠簾倒卷好如天河水下折盡有背坐堂盡有廣長舌只見龍戲水那有鳩祝噎此是正治法不得不細説不然但清頭上火但洗心中熱但開胸中痰但透喉中咄此皆從梢治與本全無涉恐化萇弘碧恐染杜鵑血治甚不容易何嘗無妙訣吾今盡傾吐惟君去決別乙巳春余內人偶患此症厄噎之聲同室莫辨人語不容進藥值歐翔墀表兄到舍言京師有方令病人坐正張口以鼻吸氣盡力不能再吸合口咽下急用兩手著力按腹互相推揉自胸推至小腹如是三四即可少止片刻果因此方始得進藥幸無性命之憂今見此書言實由命火墜不住七字不禁心服先生妙論豈庸醫所得而知者哉林春謹識惡露水大治厄逆之症有一癆症甚是寒六脈不動冰凌丸吃了一口噦一口且是吐時常帶丹如此之症甚夾雜已竟不食草余天惟至東方始發白暫用面水以當餐我思此症帶吐血只治噦嘔便是偏即用熱補一大付加上惡露水即婦人經布之水用女兒紅更好去煎待至東方始發白即將此藥代茶餐他就如此吃兩付即進稀粥亦不難我因此水恁見效以後治厄逆動以此水為金丹甚至厄食無起色得了此水便加餐看來此水甚不潔人每掩鼻痛不堪嗚呼噫嘻君不見五臺山上蛆非了至貴不能餐君不見佛寺僧化石非了至富不能啖再説象白與鹿白較比更惡濫那有貧賤之人到口邊慎勿棄此一杯水眼前人命最相關紫河車焙乾為末侯藥煎好以此和入藥中飲之實與仙丹無導然此藥甚難得女兒紅亦然不可以彼而忽此也治癆嗽要補先天命門穴如今癆嗽甚是烈動欲先天命根抉本因年少鑿喪甚兼之虛弱腎水竭真元命火墜不住虛痰虛火往上噎才欲睡著便要起直將心肝湧洞徹如要此人不咳嗽要補先天直氣穴椒茴故紙作引子肉附吳萸熟地切參苓朮草並滲濕烏梅文蛤收散缺先天真氣漸回來五味款冬紫菀啜此與尋常治不同風加薑芥與麻麻黃紅橘紅蒼朮陳皮燥脾濕半夏南星皆有功虛熱骨皮桑皮用條參元參兼補中只須金匙撥一撥何煩鐵板唱江東滑瀉之症非加三生飲不可我嘗治一老醫七十多雞鳴腎瀉有沉疴已經屢次用參耆忽得暴瀉似筒脫吃飯即瀉飯吃藥即瀉藥強力支持猶能行向我一揖請斟酌我為診脈猶未畢衣帶褲子又濕著我用洋參一兩餘三生飲子薑桂多伊言此藥能吃麼我言此是補脾之聖藥病到憊極無能為非得此藥無奈何遂飲此藥一大杯立見起色無蹉跎我用此藥有妙訣多加甘草便平和又嘗用此治慢脾溫脾風小兒一見便能活小兒老頭都一樣起死回生是要著又嘗治些寒痰症也曾依此為金科我每視此為神品以其能止薤露歌只要用之得其宜何必譏此為毒藥學生二十之前後病以六味地黃湯為主藥再看所加六味地黃最好湯一切陰虛他為王年幼學生多犯此舍了此藥總譸張我嘗治些陰虛症多從㗅嚨知端詳不是腫來便是咄不是疼來便是強皆因命火墜不住多在家中少在堂一到學中便發作五更鼓裡念文章口喝涼風支不住紅紅紫紫遍是傷看似火兮非真火皆因命府失元陽若要治此症六味地黃最的當宿砂益智少不了肉桂附子最當行二位雖少亦將軍多少虛火盡歸降不惟此症宜此治縱有他症亦為王此是歸根覆命大治法學生之理須要細思量年幼婦女亦多此症治亦相同其理可想而知也補益必得仙人煉神還虛之意方好不用補益也罷了若用補益要安好試看修仙用補益日鍊金丹以自保不知此中理必説滿腹金丹盛不了其實熊經鴟顧養精神靈山會上顛顛倒並無粒米之可言那有金丹盛不了今人用補益動期長生與不老豈知補益有不當輒生病魔不能了不是水腫滯下焦便是瘧痢日日討何如蕩滌腸胃使清楚能飲能啖養三寶精氣神為三寶即有補益時必得仙人竅有些肉桂引入神有些橘紅便不飽雖然是補能流濕雖然是補能潤燥調燮鼎鼐常通和一竅元神達天表再無滯氣塞滿胸方是神仙養生道何必額外生枝節徒與人家增煩惱我嘗靈山去採芝盡知此中真元妙補益不可泥世人皆説補益好豈知補益不當殊難了試看日月常常行萬古千秋未曾老江河日日流九州四海達昏曉人身原是小天地日月為神江河道胸膈喜順利胃腸喜通調日食三合米勝似參耆一大包參耆雖説能補益大脫大下有幾道就是吃得此藥好豈能日日熬凡是治病理不得泥住一穴以為高縱是虛弱人亦有一經之獨豪就是強壯人亦有一經之獨雕恆藏有餘於不足參耆豈能日日叨恆寓不足於有餘硝黃豈能日日澆必須臨時細斟酌看病下藥惜分毫好如五味之相和不得一味之獨膠好如五音之相雜不得一音之獨豪試觀古之大英雄大豪傑恆勤儉以為高腸胃通調胸膈利粗茶淡飯勝炮羔不必定肉食心廣體胖賽唐堯試看今之呆公子恆列八珍以自高肥濃膩人痞悶生骨瘦如柴常掐腰此皆善於補益者好似螳螂抱樹條可知日用補益理必須胸膈利必須腸胃調不必參耆常常服不必腥葷日日叨能飲能啖神自旺一動一靜樂陶陶即此便是蓬萊客絶勝王母冥蟠桃脾胃者後天之根本氣血虧損固以補益為高若於補益中即加調理脾胃之藥使胸膈順利腸胃通和能飲能食則五穀之精華自生氣血不誠勝於參耆之常為補乎侄金門識補益有陰陽之分不得泥住治一邊補益要通補益方須照人身細思量人身不過一氣血氣血不過一陰陽氣陽而血陰或以陰為主血虛或以陽為王氣虛氣血已自有低昂即或專於去補氣氣中亦自有陰陽或以陰為主條參山藥或以陽為王黨參白朮補氣豈能無低昂即或專於去補血血中亦自有陰陽或以陰為主熟地萸肉或以陽為王川芎當歸補血豈能無低昂此皆專於論補益已見用意之深長豈可泥住黨參與黃耆以為盧醫之錦囊黨參黃耆白朮三藥定評黨參其藥中之聖乎黃耆其藥中之王乎白朮其藥中之君子乎均足以拯難均足以濟急其或動而不臧者以用之者過也補陰亦有至理終難驟見起色一點純陽貴似金醫家胡為專補陰一切虛癆與百損往往邪火往上侵得了陽藥必立起得了陰藥暫安身非是和柏為上品非是六味為至尊只因且顧目前急不得不降火不得不滋陰當下雖然甚穩當那有立地見回春有人悟徹此中理即速用肉桂即速用酒軍力透元府里瀉出濕熱免陰沉再用補藥便得力再用熱藥便還真此法甚好亦極不易細觀治癆二則自知此是菩提再造丸此是洪鈞妙轉輪一點純陽即回來免使淹淹纏纏入鬼林虛弱人能受陽藥猶易治人生端的補陽好能受陽藥病易了此皆未沉於酒色此皆未入於幽渺猶可一用參朮便得力猶可一用肉附便見效豈非人生之至願豈非醫家之妙竅何至陰陰沉沉不能出動與生人有二道補藥亦多聊舉一二以為例酸斂收澀皆是補參耆朮苓定為輔甘淡滲濕亦能補肉附薑茱聊為伍棗仁五味共烏梅酸斂收澀之類天麻苡薏並石乳甘淡滲濕之類皆非大補大熱藥實能有功於脾土吾嘗用意細細思恰是用藥之真譜治病有即瀉為補者方能治此虛滯之症宜補宜瀉宜分明不宜夾雜胡亂行亦有明知此症宜用補驟用補藥必不靈此症皆是濕寒水暗結氣滯中焦久不行看病不見有結滯六脈閉隔總不通一月兩月不能食稀茶稀水時一沖不是噦嘔不能止便是虛滯往上壅看似沉疴不可為一觀神色尚可生不如只用金丹二三分使他先去通一通即用大補十全大補湯一兩付連三趕四貫當中二藥不可相離遠塤箎相引遞為功瀉藥得力補亦得使他運轉乾坤妙化工此即高帝將將法奪印交印只一頃從此脈道得露出從此病疾漸漸輕雖未飲食仍如舊轉眼時節氣滿容勝似專於用補法惡濫雜碎閉當中連吃數付不見效以為病入膏肓不可生我嘗治此亦用補必以瀉法為先容瀉只一分補十分自能運轉周天行此皆虛極氣暗結濕寒濕水滯不通不用此法必不靈一用此法便回生如若脈道皆如舊何用夾雜胡亂行既無虛虛禍亦無實實情方是主人真救星請君閣下藥性賦再將兵法誦一通久病必須掃盡外症方可治其根本久病用補不用説亦須臨症細診別凡是久病必滯痰凡是久病必積熱凡是久病必結氣凡是久病必結血必須掃盡一天云方可洞見真門闑由此而入室由此而得穴一用補藥便得力不難立把病根抉不然貿然用補必不靈好如雪上又添雪吾今得為後學言不是好為雌黃説吾嘗治一月間疾已一年矣及診視風火痰涎無所不有兼之外症夾雜甚是可畏吾先用針以開其路次用牛黃散以導其痰方敢大補氣大補血大補先天真命穴以治其根本甚矣久病之難也人有徹骨寒症縱用好藥一兩付不能了婦人瀉吐動經年多少名醫不能痊我每遇此症只消一付把病剜如何這藥恁見效全在熱補齊上前一則能培脾中土二則能提頭上顛三則能增性命火四則能閉腎門關好如九里擺陳法縱是霸王亦難鑽惟有一婦不見效初吃一付有起色再吃一付瀉更添他就如此來問我我言此人必是冰凌丸非了內里俱溫透不能貞下去起元他因吃藥甚是難只用拓法進熱磚一進熱磚便止住以為得力全在磚我嘗細思此中理此人用磚非一番前日用磚不見效以他原是冰凌丸今日用磚恁見效以他已化冰凌丸冰凌一化便無冰所以一見熱磚便成功我説這話不是要居功一切治病底理要知清世人只知陽春回來好豈知嶺上寒梅十月信已通凡久瀉之症每因脾土太虧命火太弱不能運轉元氣牢固下元所致用熱補以培脾土以壯命火則腎門堅而瀉自止矣若加米殼炒黃作引更妙侄金門識治遺泄之症老幼不同老幼遺泄治不同不除濕熱總不中少年遺泄腎不固黑梔五倍共茯苓為丸服老年遺泄腎不固熟地硫黃帶木通澤瀉更佳為丸服況且老年多半邊硫黃併除四肢風此藥真是老人星照著不可舍此逞英雄五倍子治滑泄之症大有奇驗加上升麻更好五味棗仁烏梅白芨龍骨牡蠣皆有可用總不及此凡是滑泄先澀腸澀住腸胃若錦囊若是驟出胃下口縱有仙藥亦譸張我嘗治此症必以五倍先煮湯有了補藥往上提有了熱藥好發揚縱是天大症只消一付便回陽又嘗用些三生飲加入老人脾泄方只消一付便止住無不立時見藥王遺泄之症最難治遺泄之症最是多不必泥住補益科此症雖由腎經虛實由相火不停梭妄想皆自壯盛起朋從爾思惹麼麼如用溫補泄益甚但吃清利遠嬌娥茯苓五倍為提綱知知母柏黃柏梔子作丸藥一清相火便好日服二錢便能止俟他火起再漸摩不可日用常常服恐戕命元防吃哈知柏雖清相火亦戕命元若要此病連根除除非南海大士過此與吐血最易犯皆因情欲起風波誰學古人清心理雞鳴戒旦藥如何不然但用此藥時一服亦可一止薤露歌如真年長虛弱亦可加補益亦可用肉桂但年長之人有此症者甚少按夢遺之症久則玉關不閉精盡而亡矣余治此症用芡實八錢山藥一兩蓮子五錢茯神三錢棗仁三錢潞黨二錢車前子一錢煎服連吃數付後將前藥為末麵糊為丸服至月餘不必止夢而夢自止不必止精而精不遺也又阿至玉關之不閉哉孫鎮川謹識血症不離地黃湯吐血之症三年不犯方算全愈不然猶不可測切宜保養吐血冶法最多端大抵不離地黃單六味地黃湯八味地黃湯男女虛實要分辨溫涼補瀉須細參女子多有血結症桃仁紅花宜多兼男子亦用男子多有實火症酒軍醋軍宜多添女子亦用亦有血虛色犯紫乾薑附子藥內煎亦有氣虛統不住參黨參耆黃耆三七藥內研亦有吐血兼噦嘔葶藶大乾宜多餐內有濕熱故也亦有吐血恆咳嗽款冬紫苑宜多牽斂肺入腎亦有衄血用梔梔子地生地黃不加大黃必不占此是吾家創治法亦有崩漏用椿椿根白皮榆榆白皮不重參耆必不安如此諸症各有異臨時加減方為仙一切虛癆不離此蒙醫要得讀這篇余嘗治一富商婦因妻妾爭寵屢傷肝氣復又大怒而吐血傾口而出重用涼劑兼帶止血之藥俱不見效因思得病之由乃怒氣傷肝若不平其肝氣而遽用涼藥止血愈激動肝氣則氣愈旺而血愈吐矣又用白芍一兩八錢當歸一兩五錢荊芥灰二錢五分黑梔子三錢柴胡八分紅花一錢五分丹皮二錢甘草錢半水煎服一劑而氣舒二劑而血止三劑全愈矣可知白芍多用之妙平肝又能舒氣荊芥柴胡引血歸經之藥所以奏功甚速而止血實神也當歸不過補血佐白芍以成功耳又有血從口鼻出者有從九竅手足皮毛之孔而出者又有一方當歸一錢黃耆一兩生地兩半熟地兩半芥灰錢半丹皮二錢三七二錢煎服立愈此方妙在補血兼補氣止血兼引血歸經故無論各血症用之皆效也孫鎮川謹識治血症上下不同一婦衄血已二年胸中沉悶如塞磚不捨晝夜津津出多少名醫不能痊我用清空透天庭多加風藥透胸為妙忽湧血魚出鼻淵死血結滯如魚自此通和無血迹再無沉悶在眼前因語一切吐血症皆因窒塞受迍邅不是陰寒結下焦便是虛火滯心間只宜鑽研去調氣不得妄補生病端惟有崩漏病已久陰火沸騰潰堤邊須要參黨參耆黃耆大補氣勿得疏鑿使性偏同是血症分上下惟君看風去使船吐血因遺精而得者甚多氣色陰暗皆陰熱不是遺精便尿血有一壯夫三十餘請我診脈把病説我一診脈脈下流左尺出位似水決素問嘗言獨大病獨大者病獨小者病本於素問不從此説從何説我言中上微弦氣甚弱惟有尺部是真熱每夜邪火一起來恆有美人暗交接且是尿尿如茶湯澀滯莖中似火熱他言我之身體甚是寒一見冷風便吐血我言此是吐血真證見一有遺泄火上噎火上噎兮氣不流下者為精上為血渾身是寒此是熱一見熱藥便卼臲不如知柏八味清相火止住淫邪把病折從此加之以保養再莫看那巫山雪病有所以然須從此處去治治病須治所以然不治所以病不痊我嘗見些吐血症風火一壅到頭顛可惜時下小先生涼藥黑炒下鍋煎如此風火大已極好如杯水救車燃無怪內熱作成膿時乎吐肉甚可憐我獨覆花合前胡元參梔子一齊安再加白芍一二兩使他一劑熱退還但是膿血未盡淨加上漆灰合金蓮蓮子也且用斑蟊與童便肉桂三分引歸元但是正氣未全復不能紅意盡淨宣我思此病本從婦人得不用婦人總不占即用婦人惡露布洗下濁水把藥煎始吃一付便大愈再吃一付把病剜此即平地小人參不可棄置糞堆邊留此以為後學法庶可癆病得生全可知治病須要尋來歷不得來歷總不占若是病症未能愈還是思之未通仙吐血之症只宜清補而已一見熱藥便吐水火二司性命關真陰失守甚是難水即火之根火即水之源真陰一失守虛火往上翻一見熱藥便傾吐一見大補便不安所以一切吐血症只宜涼心腎只宜清肺肝惟有吐血色犯紫熱藥時一餐去了如此症只用六味地黃單古人留下此湯頭實是濟世之舟船我説用大黃用肉桂也是不得有不然寒熱止不住不得不闖這一關如果六味能止住守住身體為最先不宜飲美酒不宜近嬋娟惟當吃藥時不妨惡露水去煎一則能止血二則能還元試看一切厄逆症與此最相關雖未近房室亦是虧本原不挽黃河水倒流不能運轉大周天三花怎聚頂五氣怎朝元女人有此症尚覺易周全女人血當家男人血不足治之實甚難吐血之症亦如此吐血之症亦是女人易治故為爾等再傳宣山中之藥能壯筋骨服壯之人宜用山中物件骨力堅穿山跳澗他無難人生軟弱不能行得了此味便立痊虎骨能硬猴骨軟軟硬適宜最便便鹿角屬陽龜屬陰陰陽相濟最娟娟花蛇烏蛇除陰濕鷹爪羚羊能透穿縱有補氣補血藥不得此味總不堅我今敬勸司命者必須山經讀一篇水中之物能眠陽虛癆之人宜用水中之物能眠陽虛癆之人宜細嘗蒲藕清脆真肥齒菱菱角芡雞頭子甘淡堪潤腸荸薺地梨荸薺之類共為粉紫菜白菜並煮湯海馬海狗能興陽恐恣遊子之邪蕩海蛤海龍能滋腎獨助修士以行藏年幼學生壞此症者不少沙土炒焦為末黃酒下其功不在紫河車下再吃龍骨以固本再飲鱉頭以垂囊沙土炒焦黃酒下庶息後起之相火即返固有之元陽海龍能補陰回陽人有腎虛忽脫陰渾身大汗似雨淋我用海龍一兩條沙土炒焦為末勻黃酒燒滾淒下哈須臾時節即回春較之草頭藥萬倍其功不下海東參人説河車紫河車力更大鎮店集上何處尋不及此藥容易得且治遺精妙如神平地有二物亦能眠陽黑豬鞭子黑牛鞭藏在丹房固下元沙土炒焦研細末酪酼一醉杏花天黑狗鞭亦然養病歌大病只宜治八分治得八分好溫存雖有餘波莫用湯或丸或散最為良只吃二分善將養全靠米麵為主張飲食不妨任所欲或咸或淡不宜拘縱然適口莫浪食只吃八分便已足雞魚肉蛋莫輕嘗青菜稀粥養性王美酒美色休輕看一若看時後悔難病若好時莫貪眠一貪眠時便流連病若好時莫妄動一妄動時生毛病病若好時莫妄餐亦妄餐時病淹纏病若好時莫生氣一生氣時病難治病若好時莫受風一受風時病又生病若好時莫受寒一受寒時病又添頭上有汗莫出門身上無衣莫浪眠久病之人多虛熱生梨生藕時一啜久病之人多好饞美味美果時一餐蜻蜓點水不宜多用得好時養太和我説這話皆經過養病之人細吟哦
