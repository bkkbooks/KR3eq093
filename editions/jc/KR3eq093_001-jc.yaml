  - {type: 'tls:div-start', offset: 6902, content: '', id: KR3eq093_jc_001-d7d17, level: 2, head_text: 古今氣運不同脈理亦異不從此處斬關奪隘無以見手法}
  - {type: 'tls:head', offset: 6902, content: '', id: KR3eq093_jc_001-d7.d17.h1s1}
