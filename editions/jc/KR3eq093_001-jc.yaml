  - {type: 'tls:div-start', offset: 7366, content: '', id: KR3eq093_jc_001-d7d18, level: 2, head_text: 今結胸症與古不同}
  - {type: 'tls:head', offset: 7366, content: '', id: KR3eq093_jc_001-d7.d18.h1s1}
