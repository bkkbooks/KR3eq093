  - {type: 'tls:div-end', offset: 18269, content: '', id: KR3eq093_jc_001-d7.d34d13}
  - {type: 'tls:div-start', offset: 18269, content: '', id: KR3eq093_jc_001-d7.d34d14, level: 3, head_text: 癆症脈似革者死}
  - {type: 'tls:head', offset: 18269, content: '', id: KR3eq093_jc_001-d7.d34.d14.h1s1}
  - {type: 'tls:div-end', offset: 18304, content: '', id: KR3eq093_jc_001-d7.d34d14}
  - {type: 'tls:div-start', offset: 18304, content: '', id: KR3eq093_jc_001-d7.d34d15, level: 3, head_text: 蠱症脈如刀者死}
  - {type: 'tls:head', offset: 18304, content: '', id: KR3eq093_jc_001-d7.d34.d15.h1s1}
  - {type: 'tls:div-end', offset: 18339, content: '', id: KR3eq093_jc_001-d7.d34d15}
  - {type: 'tls:div-start', offset: 18339, content: '', id: KR3eq093_jc_001-d7.d34d16, level: 3, head_text: 關尺火旺鼻如煙煤者死}
  - {type: 'tls:head', offset: 18339, content: '', id: KR3eq093_jc_001-d7.d34.d16.h1s1}
  - {type: 'tls:div-end', offset: 18383, content: '', id: KR3eq093_jc_001-d7.d34d16}
  - {type: 'tls:div-start', offset: 18383, content: '', id: KR3eq093_jc_001-d7.d34d17, level: 3, head_text: 脾虛不動者死}
  - {type: 'tls:head', offset: 18383, content: '', id: KR3eq093_jc_001-d7.d34.d17.h1s1}
  - {type: 'tls:div-end', offset: 18417, content: '', id: KR3eq093_jc_001-d7.d34d17}
  - {type: 'tls:div-start', offset: 18417, content: '', id: KR3eq093_jc_001-d7.d34d18, level: 3, head_text: 病人無神者死脈無神者亦死}
  - {type: 'tls:head', offset: 18417, content: '', id: KR3eq093_jc_001-d7.d34.d18.h1s1}
  - {type: 'tls:div-end', offset: 18615, content: '', id: KR3eq093_jc_001-d7.d34d18}
  - {type: 'tls:div-start', offset: 18615, content: '', id: KR3eq093_jc_001-d7.d34d19, level: 3, head_text: 治病先看氣色吉凶亦可預知}
  - {type: 'tls:head', offset: 18615, content: '', id: KR3eq093_jc_001-d7.d34.d19.h1s1}
  - {type: 'tls:div-end', offset: 18820, content: '', id: KR3eq093_jc_001-d7.d34d19}
  - {type: 'tls:div-end', offset: 18820, content: '', id: KR3eq093_jc_001-d7d34}
  - {type: 'tls:div-start', offset: 18820, content: '', id: KR3eq093_jc_001-d7d35, level: 2, head_text: 決死生外面亦當家}
  - {type: 'tls:head', offset: 18820, content: '', id: KR3eq093_jc_001-d7.d35.h1s1}
  - {type: 'tls:div-end', offset: 19038, content: '', id: KR3eq093_jc_001-d7d35}
  - {type: 'tls:div-start', offset: 19038, content: '', id: KR3eq093_jc_001-d7d36, level: 2, head_text: 脈理雖足憑間有不可憑者不可不知}
