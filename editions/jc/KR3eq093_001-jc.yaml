body:
  text: 卷一學醫真詮學醫第一看藥性有了藥性心有定某藥入某經某藥治某病或是溫或是涼與某症相稱或是補或是瀉與某症相應各藥各有溫涼補瀉理各經各有寒熱虛實症看得到時藥分明此中早已有把柄學了藥性學脈理學了脈理方有用某經是真虛某經是真實用某藥相應某經是真寒某經是真熱用某經相稱各經各有虛實寒熱理各藥各有溫涼補瀉性看得到時脈分明任憑病來如明鏡有了明鏡有把柄一下筆時便入聖不靠湯頭歌不任人家命病端雖夾雜病脈總清淨藥方雖更變藥性總周正君臣佐使無參差便是醫中之捷徑即有天師再臨凡亦難尋找方中病學醫者每多藥性不熟脈理不精果能心如明鏡洞悉某藥與某病相稱某脈與某症相應則治病自不難矣侄金門謹志湯頭歌不可泥今日治病好依湯頭歌以為十大名醫必不錯豈知妙理皆自脈中得不得脈理枉用藥得了脈理細細思其中自必有主藥有了主藥往下排此是湯頭真大略今人動說古方好不知以古治今多有錯古人未看今日病安知今日之用藥病症皆從氣運生今日氣運與古大不合古人但知古人病未知今日之病瘼今日病瘼須得今人治安得妄用古人藥古人用藥條條好安得今日病情恰恰合今日氣運已大變今日脈理甚可愕皆因午會火已極真氣往往往上薄往上薄入鬥牛宮迢迢中指看落落以下三部皆不營照舊方兒方知錯真氣盡皆走上頭真氣上走火亦隨之而升下邊部位皆虛托看似陰寒實真熱崑崙頂上通關鑰古聖真理難豫傳所餘方脈盡糟粕願起古人一質證古人望我如飢渴安得對面談一笑眼前大道盡放著若只依湯頭歌則是不論脈理鈔古人之方治今人之病安得恰相合乎何如師古人之意不泥於古之為得焉侄金門謹志診脈下藥詩診脈下藥心內裁手未立方眼已開肺實有力宜大瀉前胡枳實橘紅偕肺虛無力宜大補黨參五味百合輔肺實有力夾風火酒芩全蔞元參佐輔也肺虛無力夾風寒款冬紫菀麻黃添心實有力宜大瀉菖蒲鬱金凌霄偕心虛無力宜大補棗仁遠志柏子輔佐也心實有力夾風火黃連連翹梔子佐心虛無力夾風寒白附天麻蓽茇添胃實有力宜大瀉大黃枳殼檳榔偕胃虛無力宜大補白朮雲苓炙耆輔胃實有力夾風火知母石膏乾葛佐胃虛無力夾風寒乾薑白芷藁本添肝實有力宜大瀉桃仁醋軍大黃術莪朮稜三稜偕肝虛無力宜大補當歸川芎香附輔肝實有力夾風火柴胡生地二芍赤芍白芍佐肝虛無力夾風寒吳萸艾葉首烏添命實有力宜大瀉芒硝火麻郁仁偕命虛無力宜大補宿砂益智肉蔻輔命實有力夾風火槐花地榆蒲黃佐命虛無力夾風寒黑姜附子故紙添腎實有力宜大瀉木通澤瀉車前偕腎虛無力宜大補熟地萸肉山藥輔腎實有力夾風火黃柏丹皮萆薢佐腎虛無力夾風寒肉桂巴戟椒川椒茴小茴添此雖守株待兔法聊訓蒙醫以開先吾祖嘗曰吾之脈理遵節庵此即遵節庵之意如篇中六部脈之虛實加風火風寒皆於有力無力中分又各有主藥以治之學者熟察乎此不惟能知脈理且能知溫涼之補瀉某藥入某經治某病之數十品矣侄孫浚川謹志治病皆有主藥治病一定有主藥不用主藥便是錯火結必要用大黃枳殼枳實緊跟著寒結必要用巴豆三稜莪朮緊跟著實結必要用山甲蠍子蜈蚣緊跟著調氣必要用木香檳榔元胡緊跟著透堅必要用牙皂細辛辛夷緊跟著破血必要用桃仁紅花赤芍緊跟著脾脹必要用乾漆火麻郁仁緊跟著暖胃必要用硫黃丹參玉竹緊跟著腰疼必要用杜仲續斷艾葉緊跟著陷下必要用洋參三生生附子生半夏生南星狗脊緊跟著去蟲必要用榧子蕪荑使君緊跟著順氣必要用香附烏藥腹毛緊跟著通淋必要用斑蝥川漆萆薢緊跟著清心必要用黃連連翹枝子緊跟著老痰必要用砒霜雄黃綠豆緊跟著助脾必要用馬前虎骨猴骨緊跟著定痛必要用良薑縮砂益智緊跟著治疥必要用斑斑蝥麻麻黃大楓蓖麻緊跟著治瘡必要用神燈艾絨乳乳香沒沒藥緊跟著治疔必要用蒜灸烏金烏金膏巴豆炒黑研細用水調塗患處以膏藥貼之菊花內服甘菊湯方見卷四疔瘡門緊跟著治邪必要用銅自然銅砂避陽砂良薑葛根緊跟著補氣必要用黨參炙耆白朮緊跟著補血必要用川川芎歸當歸生地酒芍緊跟著補陰必要用熟地山藥萸肉緊跟著補火必要用肉桂乾薑附子緊跟著滋陰必要用黃柏知母丹皮緊跟著以上一藥為君麻黃杏仁療寒嗽芥子半夏緊跟著款冬紫菀療虛嗽百合五味緊跟著川烏草烏療風痹桂枝靈仙緊跟著黑姜吳萸療翻胃丁香胡椒緊跟著蒼朮麻黃療風寒羌活獨活緊跟著川貝蔞霜療火痰蘇子卜子萊菔子緊跟著烏梅五倍療虛脫龍骨牡蠣緊跟著烏賊訶子療帶下阿膠肉果肉豆蔻緊跟著條參雲苓療陰虛骨皮枸杞緊跟著藿香杷葉療逆氣赤石滑石緊跟著蕪花大戟療水腫牽牛防己緊跟著栝蔞天冬療結胸川貝川樸緊跟著苦參赤苓赤茯苓療濕癢蛇床白芷緊跟著槐花地榆療崩漏荊芥秦艽緊跟著前胡元參療頭風薄荷柴胡緊跟著白附天麻療風痰殭蠶鬱金緊跟著桔梗豆根療喉風牛子射干緊跟著三七蓮子療諸血黃芩童便緊跟著黃耆用生防風療自汗棗仁麥皮緊跟著蘆薈胡連療陰熱澤瀉車前緊跟著小茴川椒療腎氣宿砂故紙緊跟著菖蒲柏仁療心疾茯神遠志緊跟著葶藶桑皮療肺喘礞石硃砂緊跟著石膏知母療熱渴香薷糯米緊跟著川楝茴香療疝氣蘆巴巴戟緊跟著升麻柴胡療氣陷乾葛潞黨緊跟著扁豆薏苡療瀉泄豬苓木通緊跟著土鹼紅糖療菸毒洋菸大黃芒硝緊跟著以上兩藥為君此皆治病之大略小小蒙醫有捉摸按自古用藥皆有君臣佐使此篇於每症先點明主藥或以一藥為君或以二藥為君佐使隨之熟讀此篇於診脈審症之後胸中早有成竹即不讀本草而某藥治某病溫涼補瀉之性早已知之有益初學不少何得謂其淺顯而忽之乎侄孫浚川謹志駁汪訒庵加減古方古時病分七十門汪訒庵減至二十一古時方計七百首訒庵減至三百餘附方過之看似簡約實未真簡約也一貫之理恐不在此以備查覽則無不可耳看病藥性要分清入手診脈精又精二者果然有把握不怕病來如牆傾或用攻伐或用補或用和解或用行一切溫涼補瀉得其宜便是用藥如用兵可以稱主帥可以立大營要得心中有個真是非一診脈時藥自呈若是遲疑生枝節縱有名藥亦不靈亦有胸中全無真是非只把老本亂翻騰愈翻愈糊塗愈查愈不清何用病分七十門何用方計七百盈何用門留二十一何用方變六百零方子愈多愈夾雜門道愈多愈紛爭好如世上考混童層層疊疊私文謄不是題目有不合便是花樣有不同何如心裡念個真明白大筆一下使人驚不惟朱衣暗點頭亦且龍虎榜上共聯名治病要有把握有提綱治病總要有把握有提綱有了把握與提綱下筆便是方若無把握與提綱縱學一世亦渺茫試看今之翰苑客能知幾篇好文章試看今之都督府能知幾路好刀槍然而安天下定四方只是有把握有提綱縱有不知亦何妨請問今日病千頭萬緒不能詳若是有把握有提綱三言兩語便如常不是氣分起便是血分藏若是從氣起補中益氣去酌量若是從血起六味地黃去推詳二方豈能包盡天下病天下之病自此知深長補中湯中重補氣亦有去了參朮加硝黃六味湯中重補血亦有去了熟地加參羌補中湯中重提氣亦有減了升柴用檳榔六味湯中重涼血亦有減了丹皮用桂姜氣血各有寒熱虛實時氣血各有溫涼補瀉方不過依著二方為規模千變萬化愈精良只要脈理透藥味詳何往不得神奇方不必翻素問不必溯軒黃胸中自有真主張方知岳夫子不泥宗澤意自足馳騁古戰場楚霸王不拘項梁法自可立掃秦邊疆不然今檢壺中藥明讀肘後方愈看愈夾雜愈讀愈荒唐胸中毫無真是非紙上總是妄譸張用心格物固然好神明致知亦甚良我無上池水我無古錦囊只是心中有把握手裡有提綱一看這人是甚人便知這人用甚湯藥味就在人身上更從何處尋藥王醫道亦從一貫得來讀書不得一貫理不知聖學真心傳治病不得一貫理不知醫道真機緘欲知醫道真機緘必從周身去貫穿周身骨節三百有六十周身毛竅八萬有四千果能周身皆貫穿便是平地小神仙吾嘗治病治上頭便從下頭去貫穿吾嘗治病治下頭便從上頭去貫穿吾嘗治病治左邊便從右邊去貫穿吾嘗治病治右邊便從左邊去貫穿此皆翻覆去貫穿不免內中多曲彎若是一直去貫穿不必遠道費周旋吾嘗治病治中焦以其肢體能貫穿吾嘗治病治小腸以其血道能貫穿吾嘗治病治大腸以其氣道能貫穿吾嘗治病治精髓以其督脈能貫穿吾嘗治病治經絡以其任脈能貫穿吾嘗治病治皮毛以其腠理能貫穿吾嘗治病治丹田以其命火能貫穿吾嘗治病治元府以其臟里能貫穿吾嘗治病治髓海以其骨里能貫穿吾嘗治病治糞門以其六腑能貫穿吾嘗治病治玉門以其百竅能貫穿吾嘗治病治五心以其中心能貫穿吾嘗治病治穴道以其中氣能貫穿吾嘗治病治祖竅以其先天能貫穿吾嘗治病治鼻息以其後天能貫穿不能渾身皆貫穿便非醫道真機緘醫道真機緘即是神仙真妙元古來學聖亦不少幾個悟澈真機關聖人以一貫之道貫通天下之理不可及矣而醫道亦宜悟一貫之旨蓋貫則通通則無不利而病自無矣如人之一身上下有不貫穿處則病生於上下左右有不貫穿處則病生於左右誠使周身節骨毛竅無不貫穿則氣血周流常如天地流行不已六脈和緩而大年可享矣侄孫浚川謹志金匱石室小脈案我家讀書書連層夜中偶翻石室錄蝴蝶栩栩興有餘引人入勝教我讀藥王燈下笑相迎命我執筆作脈鵠我言我是大俗人何敢案上輕舉燭但是仙人有詔命不得不罄南山竹南山之竹有萬竿揮毫落紙如雲煙雲煙之上有真我看盡天下真病源不是名心重便是利心寬想得愁火往上竄不是愛癡兒便是愛嬌女想得情火往上翻不是愛紋銀便是愛大錢想得急火往上參不是愛賭博便是愛棋盤想得欲火往上攢不是好高臥便是好遊田想得熱火往上炎不是愛妾嬌便是愛妓間想得癡火在臉前不是愛飲酒便是愛肉餐想得饞火不能眠不是好結客便是好會官想得妄火入頭尖不是好鞍馬便是好鷹犬想得瘋火皺眉間不是思入閣便是思開邊想得怒火上青天不是好頑童便是好洋菸想得淫火上層顛既有諸般火必有諸般症痰隨火上升風隨火上動不是結喉便結胸或頭懵或腦疼或心顫或耳聾或咽乾或眼紅或鼻衄或肺癰或喉呃或膽驚諸如此類症當從何處攻宜降火宜除風宜化痰宜清空宜利膈宜陷胸如果氣不下再加金石墜腎中如果火不清再加肉肉桂附附子去收功引火歸元病在上者取諸下或亦理所同但是火急性不留翻入下焦定生愁一切濕邪淫皆從此處收流入腎囊陰必腫彷彿腰掛水晶寵流入元府精必遺彷彿美人來相持流入小腹便必澀彷彿孕婦久坐胎流入兩胯腿必酸彷彿枷棍見上官流入膀胱尿必紅彷彿蒺藜包莖中流入大腸蟲必行彷彿崩漏接後宮諸如此類病當從何處泄宜利水宜清熱宜順氣宜破血宜通竅宜解結宜疏鑿宜澄澈如果火不降再加肉桂便能決如果氣不通再加升升麻柴柴胡往上揭病在下者取諸上或亦別有說亦有上下滯不通病在中焦無處容或導痰或決壅或透脅或捶胸或罐搬或針松或麩拓或腳蹬前後左右善收拾上下四旁一齊攻多加發表藥八萬毫毛汗兩濛病在中者旁取之調變中州妙化工古云病機十九條只有一二把寒消可知寒症甚是少溫中溫外甚昭昭除了寒症皆是火看透人情不可招況當午會火已極乾坤欲把大丹燒恨不挽將河漢水剖開人心細細澆但是火症有虛實有大小不得不從中州加意調實火一瀉便能轉虛火不補不能消況乎脾土作對有肝賊四經有病常亂搖恐怕因風來縱火多培命命門土使根牢可知聖人立方無甚奇只是參透人情與天理情理合處便是藥大筆一下甚淋漓古來名醫亦不少那個洋洋洒洒如天師古來立脈亦甚多那個亮亮堂堂如天師藥王教我立案我不立只要參透人情與天理情理參透便無疑即此便是聖人小徒弟如謂後學心無知我嘗作有診脈下藥詩如謂後學脈不全我嘗作有脈法續餘篇但是以續金匱石室錄恐辱古聖與先賢口中呶呶說未已誰知一身猶在青雲里忽聞金雞叫一聲瞥眼東方已大明經云傷於七情六慾為內傷篇中言名心重數端妄想太甚所以有上焦結喉等症流入下焦陰腫等症又有上下滯不通之症皆情欲之所致也治法言病在上而准以降火諸方病在下而准以利水諸方病在中而准以導痰諸方又有取諸下取諸上旁取之妙論則上下四旁無非調理之處其病安有不愈者乎再觀瞥眼大明而良工之心苦甚矣侄孫浚川謹志醫道以氣運為主客有誚於予曰君之治病與古大不同自抒意見作主盟不怕世人作話柄日日饒舌妄丁東予曰我之立說皆從氣運生氣運就是醫道之權衡看與古人有不合實與古人正相通守住古方無變化已失古人之正經我說氣運無憑據何不堯典誦一通堯典原是歷數書於今不知換了多少主人翁代代有差移代代瞻中星我說氣運人不信何不細按脈理思一通脈理就是中正星與古制歷正相同如今脈理出本位與古大不同古時脈理只三部細按三部便知清今時三部出本位只看三部便不中必須上下去推尋方能病症知分明病症知分明方能下藥無渺冥下藥無渺冥方能起死去回生不是安石好執拗害殺一切老名公我之立說有主見便是堯時中正星詩言芻蕘有一得請君細細看一通今日脈案與古稍異古人脈案原是一定不移至於今日氣運亦少移矣脈道亦少移矣必須再加鑑定方可人身原是小天地天地人身總不離所以唐虞定歷數必於人身驗析夷人身原具天地理寒熱溫涼總不齊天若轉時他便轉天若移時他便移自古大撓制甲子天干地支立歲基然而有歲差有歲移歷代名人用心機寒熱溫涼雖仍舊氣盈朔虛盡調劑上推皇古初下驗當今時要與唐虞無參差如今天道猶如此如今人道安能無轉移氣運轉移欽天定脈道轉移誰防維但拘三部九候理恐亦有歲差恐亦有歲移寒熱溫涼無一定溫涼補瀉必不齊一世人命懸瓠落何以對神農何以對軒岐豈知三部以上也要思三部以下也要維三部以上豈無虛實寒熱理三部以下豈無溫涼補瀉時得了上下得頭腦三部九候始無疑我嘗上下細細思我嘗上下細細維不過盲人說癡話卻是循途而索埴所望後學諸君子也要細細思也要細細維如今方書雖已備如今脈理總支離古人脈案甚表表於今多不宜三部以上還要細細思三部以下還要細細維或作為古歌或作為風詩一如李時珍秈然若列眉一如王叔和皎然若布棋是予之厚望也焉得一見之三部九候固古人一定之脈案而此篇言三部以上要思即下篇按中指節脈上竄之謂三部以下要維即下篇按尺澤穴脈下竄尺脈拉尾巴之謂蓋於三部九候之外又多一診法也侄金門謹志今日脈症有不甚相合者是今日氣運與古稍有變遷不可不知右邊氣脈往上傳右邊中指要一觀左邊血脈往上傳左邊中指要一觀我嘗診脈時必將中指細細參非是後學好奇異如今氣運最為先氣血每隨氣運轉三部九候宜互參人身原是小天地焉能不隨氣運為變遷況當午會火已極風從火上動火從風上宣每到春夏時一轉到頭顛四時皆有春夏為盛如此病症幾至十有八九試看今日病那有一個不是風火開其先無怪古人診脈診掌後今人診脈診掌前診了掌後診掌前一切病症穩如山三部九候不能離三部九候不盡傳試觀名家做文章神氣每從題外傳詩家善吟詠風趣必自象外觀我願今日司命者亦要象外觀亦要題外傳診了掌後診掌前方能盡此醫中真妙玄縱有十大名醫再臨凡亦必氣運為主權不能泥住病症無周轉不能執住脈理無變遷必將脈理再斟酌必將病症再傳宣試觀唐虞歷數書如今不知換了多少小欽天豈知醫道亦如此我今得為後學言氣運有變故三部九候不能盡其傳中指一觀即按中節之謂可與上篇參看侄金門謹志脈理就是中正星須要上下細斟吾言脈理就是中正星全在脈理悟精通如今脈理出本位不是盡貫中指中盡貫中指亦時有不可以此為正經一星一點皆有理一毫一忽皆有靈或是人虛氣不貫按住時久方分明看似細小無關係豈知脈理精通盡在中以為虛兮非真虛必有假積暗暗呈以為寒兮非真寒必有假熱暗暗縈觀聖人設易去求卦吉凶悔吝每從動處生吾人診脈亦如此毫釐絲忽見真情至於中指節里上下飛二寸頭上暗暗增清明以後霜降前尤於此處多見端四時皆有夏秋之間更盛縱是蒙醫亦能知不待予言去傳宣不是風來便是火不是氣來便是痰若夫毫釐絲忽便見病不是老醫不能洞至玄必於此中討消息方見脈理之真傳脈出本位人人有細斟上下知的端不是予言多隱怪脈外之脈甚昭然必兼上下始洞達吾嘗於此悟真詮以補脈學甚是好芻堯一得費鑽研鏡中明月圈外注方知神妙之境仙乎仙上焦虛火全在細加揣摩用藥之理精又精不細揣摩必不中吾言一星一點皆有理一毫一忽皆有靈看似虛兮非真虛必有假積暗暗呈看似寒兮非真寒必有假熱暗暗縈此皆脾虛氣不化全無真積在其中此皆肝虛血不攝全無真熱之實情重用參黨參術白朮氣自開氣一開兮便流通重用芎川芎歸當歸血自攝血一攝兮便沖融或加陳皮半夏和胃裡或加香附酒芍調肝經氣血一旺便貫注那有餘波僭上行不然再用杏仁芥子去發散不然再用鬱金菖蒲把寸平以治上焦亦有理無不歸入中州中不然再用小茴故紙暖氣海不然再用肉桂附子入命中一切僭上之火盡回來便無一星一點往上升一切後起之風盡下來便無一絲一忽往上衝牛黃牛黃散金丹紫金丹全不用此皆赤壁之疑兵以為無積也罷了以為無熱也分明何必墮在疑團里而為子莫之執中下焦虛火與上焦虛火相同概不得以真火治吾言脈往上竄皆是火亦有假火竟誤我吾言脈往下流皆是熱亦有假熱把人跌上焦假火已言明下焦假熱未曾說下焦假火多從情欲起好酒好色無撙節內里腎水養不住不是遺精便尿血或是小便如沸湯或是夜半長髮熱但觀中上便知清不必專向尺部去細切中上脈實是真火中上脈虛是假熱流出尺部三寸長好如紙條把皮貼宜用參黨參耆黃耆往上提宜用升升麻柴柴胡往上揭宜用龍骨牡蠣去收澀宜用蓮子蓮鬚去清澈宜用宿砂益智暗暗補宜用熟地萸肉細細折宜用山藥雲苓去養氣宜用枸杞菟絲去滋血此皆下焦虛熱之治法與上假火有同說上焦假火亦言明故將虛火又分別虛火實火宜從寸頭上下分虛火實火有分別按住寸頭便知切脈如上竄無止息以下三部皆澌滅此是一定該大行風藥薄荷前胡桔梗之類盡用金丹制若是三部皆有力微露寸頭便宜泄此亦一定該大行降火金丹風盡絕金丹服下火降風自息亦有二寸已露頭但是三部如車轍必欲此火真下來大補氣兮大補血此是鄙人真主見願與諸君說一說脈理細處無他言此是時下真妙訣脈在上下指脈出本位言中焦該三部言虛甚脈當以中焦為主上下帶治方好如今治病治上下治了上下病自罷此皆病脈出本位不如此治更治嗄現今如此病症十居六七亦有病久上下急中焦虛遲更可吒如若舍此治上下便覺上下皆虛架不如三部皆補益中焦填實真無價中焦填實神氣旺上下虛火立時化後天以脾胃為主中焦一旺萬病皆已然必真虛方可填實不然萬病亦隨之而生矣上頭微微清下頭微微瀉好如由基射伯棼上下晃漾中間射一箭中紅心此是歸根覆命大治我今謹告小後生切莫舍此泥上下現今補中焦以治上下亦間有之但不多耳古今氣運不同脈理亦異不從此處斬關奪隘無以見手法古今氣運大不同百年一小變千年一大變更亦運轉不能停只按六部便失中脈已移氣已沖溫涼補瀉皆無功若依古人方便失主人翁古人之脈從何起今人之脈從何終古人之脈從何極今人之脈從何生今人多是心中火上炎一直衝入鬥牛宮指頭但看中部猶是寒豈知已駕火車到天庭火沖頭頂脈必上竄中指不可但診中間三部不從此處尋病源往往不見主人翁欲上崑崙去報捷必使前胡元參為先鋒中間胸膛路已塞全靠全蔞天冬為親兵好和馬服下層山秦兵百萬立時傾但是火極從水化翻身跳入水晶宮指腎言水晶結甚金丹用全靠斑蟊蓖麻作行龍又有十棗十棗湯方見醫宗金鑑濕症門作引子川牛川牛膝川楝川楝子為弟兄直透海底便無病摩頂放踵有全功但是上下看所急那邊重兮那邊輕診脈下藥宜分別不得顛倒胡亂行中間三部作樞紐或和或調使流通譬如做文章今世盡是搭題為正經若是做上頭下頭亦要融若是做下頭上頭亦要通中間不過作一紐南北官道頌平平今世用藥多是搭題客切勿留戀中軍營上下招呼無懈怠常山蛇勢精又精擊頭則尾動擊尾則頭行若要擊中間頭尾齊應承我設此陣去用藥卻於此道甚是行不知將來更如何到了那時再叮嚀今結胸症與古不同如今氣運大不同不知不覺結當胸古人結癥結胃口今人結癥結胸中古人結胃傷寒見今人結胸百病生古人結胸症多死今人結胸尚從容古人結胸因行早今人結胸並未行不從此中討消息不知今日之病情只因午會火已極衝入上焦氣熊熊不用清揚清頭目大開胸膈便無功世人皆知下焦行不知下焦愈行愈不中但看中指氣迢迢便知胸中壘塊幾時消際此運會處處有婦人更比男子昭如要治此症不用下焦行只要上頭攻一要去清火清得火時上下融二要去除風除得風時上下松三要去化痰化得痰時上下空四要去決壅決得壅時上下通重加牛黃牛黃散與金丹只要氣血分得清此本如今大關鍵不敢胃口噹噹胸如果真實結胃口亦須硝芒硝黃大黃往下行非是後學好奇異願學君子而時中風火諸症脈論一切頭懵與頭疼盡是風火往上傳一切眼黑與眼紅盡是風火往上傳一切鼻衄與耳聾盡是風火往上傳一切喉呃與喉疼盡是風火往上傳一切吐血與痰迷盡是風火往上傳一切心顫與心悸盡是風火往上傳一切氣逆與結胸盡是風火往上傳一切癆嗽與老痰盡是風火往上傳一切氣喘與哮齁盡是風火往上傳一切產前類傷寒盡是風火往上傳一發產後類癲癇盡是風火往上傳一切疝氣與水腫又是風火往下傳窮乎上者必反下一切便濁與遺精又是風火往下傳火窮於上心腎不交一切經滯與癥瘕又是風火往下傳經滯之人皆頭疼一切崩漏與腿疼又是風火往下傳一切噦嘔與泄瀉又是風火互流傳一切背疼與腰疼又是風火互流傳火沖痰涎使然以上諸症有即三部而見者有不即三部而見者吾初不以為意以為事屬偶然耳及至細細留神一上診一下診便能知之始知氣血上竄未有不下流者夏秋之間風火為最盛舉目皆是實非三部所能拘束矣吾概以風火治之一藥而愈有因症而加藥者有不因症而加藥者故敢列之於下風火上衝之症四時皆有惟夏秋為最盛霜降以後清明以前不過十中二三耳此法或可以不用惟至夏秋極盛之時風借火勢火挾風威幾乎舉目皆是此法斷不可以不用吾自生平學醫以來凡治大病治久病治一切奇奇怪怪之症但即三部九候之理細細推思恆覺束手無策一上診一下診便可出奇制勝不泥古人之意偏得古人之心氣脈一沖而上則診脈不在於上乎氣脈一流而下則診脈不在於下乎中間三部九候之地反覺為虛位為虛設吾謂三部以上可作一部尺部以下可作一部中間三部只為一部者此也吾謂治病治上下者此也吾謂治病如常山之蛇者此也吾謂今日治病盡是搭題格者此也吾謂治上必取下治下必取上中間可作一紐者此也周身之脈皆可以備診古人已有此說總不若予言為最急天耶時耶命耶非予之所敢知也詩云採葑採菲無以下體或以芻蕘之一得不知有當於醫否不知有當於三部九候之理否知我罪我惟在於此矣敢不列之於左人之頭顛與中指相應凡是風火上中於頭顛則氣脈必貫乎中指且當貫指之時又有初節中節上節之異又有有力無力之分是氣脈已移於上矣尚能拘此三部九候之理乎凡是脈氣上竄未有不下流者窮乎上者必反下大易已有明言脈氣一竄於上則診脈必在於上矣脈氣一流於下則診脈必在於下矣吾言上診而不言下診以上包乎下陽兼乎陰也凡當上沖極盛之時以治上為主而治下次之下流極盛之時以治下為主而治上次之是上下又有輕重之分焉且當治上治下之時以治上治下為主中間不過一紐耳或補氣血以接乎上下或調氣血以通乎上下又在隨時變化不可滯於一偏也凡是此症皆出於有餘補者甚少間或有之以氣血虛甚上下皆是虛火一補中焦即愈不可不知且人一身之氣與天同行上下周流無間一竄於上必滯於上下間必有所不通一流於下必滯於下上間必有所不順吾於此症必量其輕重而加牛黃牛黃散金丹之藥以復周流無間之本體耳且治上焦之病以除風為主而清火化痰順氣次之治下焦之病以利濕為主而清火化痰除風又次之此皆有餘之治法間有不足之症皆因病久淹纏實化為虛不可不知大補中焦而愈以上就乎下下就乎上真氣盡歸於中也後天以脾胃為主不其然乎凡當上竄之時有顯而易見者有隱而難知者顯而易見一藥可愈隱而難知人多不以為然豈知上焦一絲一點大有關於一身之安危試觀聖人之畫卦也那畫少那畫當眾再說天變於上不運歲動星移其機甚微而國家之休慼系焉治病亦如此大病久病之後多有此象不可不知素問謂獨大者病獨小者病獨疾者病獨遲者病即此已露其端況在三部九候之間乎吾嘗治一氣滯之人三部九候皆無其形一診中指而得之影影綽綽僅露其端即從此處去治一藥而愈類此亦多又嘗見一病久之人三部九候毫無脈線一診中指而得之即從此處去治一藥而愈類此亦多況且祟脈不可為典要往往如此出奇制勝全在於此吾謂題外傳象外觀者此也能拘三部九候之理乎凡事當論其常不當論其變此皆論其變也然當如今世道與古不同奇奇怪怪之症舉目皆是不從此處斬關奪隘更從何處下手哉吾嘗治一重傷寒兩次大汗衣被皆濕而表症未解診脈毫無可見一摸手心而得之周身雖潤而手心未潤是中氣猶有未透也又用清涼解散之品加入其中一藥而愈手心與腳心皆與中心相對是手心亦備一診也豈僅中指為可憑哉素問云百病之生於氣也風火上衝之症惟有氣之人為最多而當夏秋之時雖無氣之人亦然非風而何風者百病之長也不信然乎又曰痰能生百樣怪症風火一沖未有無痰者而病機十九條之論病也惟火為最多自我看來大抵如今病症以風為主而火次之痰與氣又次之治病者當以四者為提綱惟寒為差少耳然亦有不可不於四者之中加之意也脈學脈形脈象已盡傳治病全靠古聖賢一切三部九候理何須鄙人肆口談然而今日之文章猶步前人之陳言然而今日之詩歌猶步前人之舊編不妨移宮而換羽不妨改調而續絃況且運會有不同況且風氣有變遷不得泥住古人意而忘今日之宮懸醫道亦如此吾今得為後學一指點脈法續余歌自古脈法多清絕不及節庵陶節庵一句說有力無力已分明何必利口苦諜諜我嘗奉此為主臬焉敢劍上試一吷偶於三部九候外得個續貂訣請為諸君說一說三部以上皆是火三部以下皆是熱火熱在人有分別總於有力無力試一決嘗於診脈余偶按中指節或如蛇吐信或如珠流綴或如針括藏或如電明滅因之問其人始知暗氣結皆由暗氣所致不是多壘塊便是多妖孽妖孽藏於壘塊之中其人頭必疼其人眼必黑諺云頭暈眼黑是也其人多耳聾其人多心熱皆是風火上升之故其人中惕惕心跳心悸心顫心咄其人迷迭迭火生風風生痰之故其人多咽乾其人多心噎夜裡多驚恐血結陰分之故晝里時寒熱晚間寒熱皆是風木搖動之故若要治此症先清頭上火次清心中熱略破中下亦是說病在上者取諸下如有邪祟附不若與之絕又於診脈余偶察尺澤穴未至尺澤穴已得引繩切即是拉尾巴上下若滯水中外若車轍其人必滑精其人必溺血遺泄淋閉皆所不免其人腿必疼其人髓必竭其人莖中刀其人腹內鐵濕熱停滯極言之耳其人行不安其人睡不澈一切濕邪淫寒住水分穴因之問其人其人多不潔不是多流火便是多淫褻若要治此症先清膀胱火次清小腸熱略加升提亦是說病在下者取諸上世上多少希奇症盡從二處決若但察三部恐無此清切欲問陶節庵容我說不說我今已利口幸勿為諜諜脈不上竄不下流如此治二寸脈外倒右寸外邊倒一線右膀疼痛不能堪左寸外邊倒一線左膀疼痛不能堪皆因陽維受風寒內外夾治方能安內用熱藥透發散外用炒豆枕藉眠二寸脈內倒右寸裡邊倒一線喉疼喉幹不能堪左寸裡邊倒一線心疼心熱不能堪此皆虛火往上炎上下對治方能安只用清空藥一付加上肉肉桂附附子引歸元肺脈心脈如針尖皆是虛火上炎肺脈上透如針尖欲噦欲嘔不能堪心脈上透如針尖熱熱時疼不能堪一瀉上焦便能愈鬱金菖蒲之類多加酒連是真詮包絡脈滯宜破心包絡脈滯小皮錢心跳心悸不安然多用凌花凌霄花便能愈細調肝腎是正端左尺堅硬宜服紫金丸婦人月間疾甚深已吃多藥甚是危險左尺堅硬不回春栽用蠟匱紫金丸日日服之妙入神雖是破藥不傷脾胃其實一切病結滯無不得此便還真只要耐性日日食不怕二豎與為鄰男子尺寒熱藥不可通用男子遺精本是寒小腹疼痛尺部堅連請名醫用肉肉桂附附子陷入內里不安然時熱時疼不能止我用知知母柏黃柏立時痊先疼是寒後疼是熱此症只宜溫散用肉桂附子不免太過況不知止乎熱氣乘虛而入牢不可破者有之壯火食氣誰不謂然男子尺寒宜用肉附湯還宜保養有一男子娶兩房病服肉肉桂附附子地黃湯連吃幾付甚得意云云雨雨到巫陽忽見尺部數無倫熱陷裡邊無有方虛癆底子舍此別無可用病在不知戒房其死宜矣尺部熱甚非知柏不解有一寒嗽甚非常大用胡椒炸生薑各四兩陷入內里尺數甚連進知知母柏黃柏始平康腿疼有寒熱虛實之分濕熱下注腿最多清涼利水是仙著亦有大熱與大補外用炒豆把腿烙腿粗熱腫腿粗腿細虛寒腿細有分辨尺部虛實須細酌肝胃疼痛用藥有分凡是疼痛脅肋尋肝胃兩部要辨真胃經須要重半夏氣分多有痰滯肝經須要重桃仁肝經多有血滯青皮調肝陳皮調胃兼利氣乾薑暖胃吳萸暖肝去陰沉兩部之脈如積札牛黃氣分用金丹血分用加二分氣血總要分清楚立方下藥妙如神六脈如紙蒙是風寒凝滯於外診一老婦脈甚窮脈弱上下不及尺寸上頭好似皮紙蒙氣血盡被風凝住不用風藥必不中重用風藥十餘兩加上熟地使性平肺部脈寬痰滯使然肺部脈寬點點花有風有火有痰呀頭疼時乎一寒熱大用風藥清肺家肺脈平而不動結在心口脈平不動是有食想是零碎細細積鬱金菖蒲開上焦牽牛一到便辟易眼疼總要治肝凡是眼疼總在肝加上金丹便立痊況且腎經如續絃斑蟊利氣最為先用一兩個作引子除風降火有主藥上焦風火下焦剜眼疼因肝經結滯有一眼疼痛不堪我一診脈滯在肝重用青皮與桃仁各用七八錢當即痛止立時安頭疼因二寸結滯有一頭疼痛不堪我一診脈滯寸間重用鬱金與前胡各兩餘當即痛止立時安右寸滯如麥屑肺脈寸頭滯麥屑頭上疼痛喉中咄我用二醜入風藥枕藉炒豆病立撤左寸滯如麥屑心脈寸頭滯麥屑頭懵頭暈心中咄我用鬱金與菖蒲加入風藥病立撤隆冬疼痛多是陰風為病隆冬疼痛多是風氣脈不貫中指中貫中指則為火風矣宜清散陰風入骨寒入竅二烏川烏草烏二活羌活獨活最融融罐搬下焦能下婦人之氣老婦肝氣滯不通多是狐鬼據當中不用火罐搬下焦吃藥之後立用罐搬玉門則愈矣縱吃金丹仍上衝六脈不動宜內外兼治六脈不動受大寒肚裡疼痛嗽不堪外用蒼蒼朮附附子去出汗內用消化紫金丹六脈不動宜內外透發六脈不動是沉寒蒼蒼朮半半夏麻黃宜多餐川烏草烏不怕燥肉肉桂附附子吳萸更是妍只要熟地去墜著內外透發始得安如欲一付便能愈再加炒豆鋪蓋眠終夜不眠由於下焦結滯有一老婦夜不眠診脈下焦滯而寒我用金丹和白芍因他虛火沖左關崩症由於肺經熱崩症肺熱燥不安白及棗仁烏梅兼外加艾葉與赤石一付飲之便立痊濕寒作熱久診方知濕寒作熱脈甚強初一診時脈慌張診得久時全不動治宜利濕用二黃熟地黃和硫黃為丸久服自愈女子二寸不可過於關脈有一女子才及笄診脈問我是甚疾我言二寸較關為稍大便是他病真根柢右寸大兮必噦嘔左寸大兮必疼積教他即用郁鬱金桃桃仁丸便可此病立調劑老婦右尺全無右邊身疼不能食老婦右尺甚虛寒兼之氣惱塞胸間大補命門重肉桂渾身痛減便能餐參黨參耆黃耆之藥全不用恐他引藥上頭顛喉疼喉腫多是風寒喉疼喉腫數十天一見香油便不安真寒證見我按六脈全不動大用蒼麻蒼朮麻黃加附子透骨間加上熱磚暖海底因他腿冷知是命門寒渾身汗解便加餐此症以汗解亦是創治法治吐血不用血分藥亦是創治法一人吐血已數天我一診脈是受寒且是與人大生氣右脅疼痛不能堪我用牛黃牛黃散大發散一付便可立時安因他初起身壯實治血全不置心間少婦心脈結聚右腎腫硬少婦心脈小皮錢右臂腫硬不能彎我用凌霄鬱金去破心加上澤漆草名俗名貓兒眼蒼蒼朮麻麻黃連蜈蚣蠍子共為末和內吃一付兩付便安然左寸如錢治法左寸如錢厚而高風火一湧結上焦男子多是痰厥症女子多是經不調抉開心經再用藥鬱金菖蒲甚昭昭癆嗽之脈尺寸皆無老婦尺寸脈全無中間兩部亦模糊如此之虛虛不透那有氣血挽轆轤夜裡不能黏枕頭一黏枕頭嗽都盧我用十全大補肺庶乎目下稍安乎沉寒出汗必須內外兼治沉寒之脈貼底眠全無鼓盪真機緘用盡熱藥不出汗內外夾治方得安內用熱補帶出汗外用酒打蜜打罐子搬氣惱之脈治法氣惱之脈如破氈無條無縷無絲綿大用蒼蒼朮麻麻黃使透發加上熟地帶金丹看似燥兮實不燥必當暗暗轉機關噦嘔不必脈竄噦嘔不必脈上竄二寸兩邊亂動攤即是風火痰上頭大清上焦是真詮虛實有即脈之兩邊而見者虛實豈盡脈上見六脈兩邊亦可斷如是實症肉緊護虛症從來肉懶散肺脈如針懸肺脈如針上下懸時噦時嘔最難堪且是頭疼不能忍大瀉肺經立時痊三部脈如皮錢三部脈如小皮錢濕寒作熱手足癱且是骨節皆腫痛吾用利濕帶養肝日日服之皆有驗補氣和血是真詮治中毒一切禽獸肉毒皆是惡毒六脈沉細緊數毒蘊在裡脈上酌沉細緊數甚是惡不得飛龍奪命丹焉能立時把毒削必須硇砂五分之熱毒必須南星一錢之焦灼必須蟾蜍一錢之辛寒必須黃丹五分之酷虐必須斑蟊十六個之迅下必須巴豆一錢去油之擊搏必須雄明雄一錢信砒霜五分之燥烈必須乳乳香五分麝原寸少許之開拓此皆陰毒脈沉細引下廿丸酒一酌若是焮腫脈浮洪清散表邪為上著按飛龍奪命丹即以上諸味共研細末為丸備用服之毒從汗解附註中毒六脈浮洪宜飲二仙丹白礬明雄共為細末六脈浮洪二仙丹蔥水痛飲汗涓涓緊備外風七天整痛定毒解得生還二便不通有從心肺治者有一男子二便俱不通大為迅利毫不靈誰知上焦脈甚大心肺二脈皆大結住痰火皆是風即用化痰兼降火風藥送之便有功牛黃牛黃散斑蟊作引子上焦通時下焦通腑家有病宜治臟不看脈理總不中女子上焦有病宜從經脈中治有一幼婦六脈毫不動惟有心脈往上衝中指根節動知是經脈結下焦心顫心悸兼心疼經脈結住必上竄胞絡為祟我用風藥帶金丹肉肉桂附附子吳萸往下通連吃兩付病皆愈六脈皆動病自安矣再用蠟丸細細攻用黃蠟溶化入金丹攪勻為丸日食數丸不久全愈婦人關腎無脈治法婦人脈空下半截腿疼腰疼心裡咄治宜大補肝腎火兼之調氣更調血斑蟊不妨少用些炒豆熱磚不可撤脈上竄下流如此治喉病肺脈上竄喉病肺脈恆上竄寸上一寸亂動攤似有大錢一片在皮之裡濕熱隱伏不肯出風藥多用涼帶餐涼藥多用恐有以束之故多用風藥以散之涼藥自能得力風火瘧子脈上顛風火瘧子脈上顛用補用瀉皆不佔我用風藥帶清涼一付便把根子剜虛癆中風脈上顛脈象打閃上下飛虛癆風熱甚可危我用風藥七八兩加上金丹春便回金丹少用有風藥駕馭盡從汗解並不下瀉產前風症脈上顛產前風症脈上顛二胡前胡柴胡二活羌活獨活艾葉兼加上紅糖蔥出汗不怕母子俱不安牙疼用肉桂而愈一人牙疼是濕寒脈亦上竄中指間濕寒作熱雖然上竄無有力只得肉桂往下牽加上細辛與熟地一付便可得安全牙酸用肉桂而愈一人牙疼是牙酸雖然面腫只半邊真寒證見看來是火非真火六脈沉遲風上顛大用發散兼肉桂便可真氣使迴旋脈有上竄下竄之分一定是火脈有一按即得真上竄下竄如有神一定是火無挪移除風上宜除風利濕下宜利濕上下分尺部熱極便下流尺部熱極往下流不至尺澤不肯休現出多少怪怪症盡與中指作對頭不是遺精與崩帶便是疝閉二便愁不是濕氣注腿腳便是陰熱夜半留既已上邊看一看又須下邊搜一搜我言尺部拉尾巴正可脈學作論頭耳疼多因脈竄而然耳疼因風到頭顛脈細無力上竄然內用風藥去發散外燒熱磚枕藉眠濕熱下注脈拉尾巴濕熱下注脈細察尺部往往拉尾巴腰疼腿疼並腎腫知知母柏黃柏十棗十棗湯方見前一概加若是尺部脈不彀大熱大補猶恐差脈拉尾巴有左右之分左脈尺部拉尾巴涼血破血藥多加若是此部脈不彀熟地萸肉肉桂最當家右脈尺部拉尾巴涼氣破血藥多加若是此部脈不彀炮姜附子宿砂最當家二者亦要有分辨溫涼補瀉方無差脈拉尾巴亦有虛熱而然者脈拉尾巴是濕熱不是結氣便結血亦有虛熱往下流虛熱實熱亦在有力無力中分大補中焦便回轍如此治法十一二虛熱甚少與上虛熱有同說上焦虛熱藥加肉桂便下來脈流左尺以下便當大瀉陰分脈流左尺二寸長定是發熱夜中央女子癥瘕兒痞塊無不於此知端詳若能大瀉陰分火便可立時見藥王脈貫中指宜分虛實中下亦然脈氣貫指往上衝清空降火大除風若是脈氣有不足量加溫補方有功前胡覆花不可少元參鬱金亦必中棗仁遠志共當歸三陳陳皮半夏茯苓薏苡好和衷椒川椒茴小茴故紙暖下焦金丹牛黃略帶通脈氣相同實不同全在指下辨分明喉疼總要治肺凡是喉疼總在肺加上牛黃牛黃散立調劑況且尺部拉尾巴此是喉嚨最下系斑蟊一到關門開除風降火甚得濟二將軍能開風火之門牛黃散紫金丹為二將軍眼科喉科最是神如何專靠二將軍現今風火多上頭不得二將不開門開了關門有主藥疼痛一去便回春凡是疼痛病已入內欲去疼痛無有過於此者頭上諸病以除風為主眼科喉科先除風多用寒涼必不中多用寒涼風束住此是先生大不通風不能出火下降頭上之病總牢籠脈出寸口以上必用行藥尺部硬了便可行古人之言精又精今人如欲用行藥但看中下必不中風火一壅往上衝不結下焦結喉嚨其人頭必懵其人耳必聾其人心必咄其人眼必紅但看寸脈出本位已駕火車到天庭多用風藥清頭目捧住金丹使上行上至崑崙下海底一切滯氣盡皆松亦有氣到海底便回來多是狐鬼當說胸即用火罐搬下焦使他立出玉門中所搬之物有如牛乳頭羊乳頭小鼠形者此症多是婦人得那有一個老名公真是令人料不著不瀉上焦必不中我嘗治此千千萬始敢如此亂丁東男子左尺下傳其初皆寒男子左尺往下傳多是房事不安然一個紙條糊半截平平妥妥在中間伸手一按無形跡明是虛寒在裡邊其腹必積渣其身必痛酸晝里多憎寒夜裡壯熱連可惜盲醫無識見動說此是重傷寒多加羌羌活麻麻黃去出汗與他本底全不佔一付兩付不見效虛虛之禍不可言我用熱補帶金丹沉寒一去便安然治病須要求來歷不知來歷莫妄談脈以和緩為高六脈和緩為最高不軟不硬氣迢迢太軟則弱病難愈太剛則折魂暗飄脈不知緩便為病和緩原是土之性人稟胃氣他為政六脈以胃為主有時過細與過小有時過粗與過盛有時過遲與過柔有時過疾與過勁皆非胃氣之本然失了和緩便為病過則為病即從此處去治況且頭上竄脈出寸口有到中指之顛者況且腳下蹬脈出尺部幾至尺澤之上今日又有這毛病午會已極方有此象古書無有此說尤須急救正久病脈竄下焦虛寒宜引氣歸元脈氣飛空火上天除風降火併金丹牛黃散亦可若是空中脈微細風藥猶可丹金丹少研況乎久病氣血虛不可大開大瀉仍如前雲苓薏苡宜酌用川椒故紙小茴添間有海底虛寒甚肉肉桂附附子吳萸往下牽上熱下寒亦不少不可泥住脈竄是大端治病治上下以覆花赭石湯為例覆花赭石治虛呃本是傷寒真妙訣我嘗治病治上下即會此意為圭臬病竄上焦多是風覆花之類往上揭荊芥防風柴胡前胡羌活獨活之類病流下焦氣不通金石之類往下制自然銅陽砂赤石滑石礞石之類若是中間作一紐牛黃金丹不用說虛用黨參黃耆當歸白芍之類只要善會古人意按住三部細分別肝橫午後熱肝腎齊橫夜半熱治亦不同肝經橫滯午後熱桃仁紅花青皮決流入下焦三寸長知母黃柏牛膝啜有了此脈腿必疼有了此脈夜必熱利濕清熱宜並用金丹斑蟊不用說六部以上須要細察我遇老婦六十年歲也膝下兒女亦雙全孰知一診他里脈卻是喉咄病久纏此本暗氣結三部九候不能傳但看中指動便知火欲上青天中指中節動喉間如塞綿中指根節動胸中如砌磚大約結滯在海底陰火上衝崑崙山二症必要分虛實方能下藥不至偏先清頭上火次開胸中痰肉桂一引便愈痊如若壘塊不能消必須斗酒大黃煎二味宜多用方能上頭顛好如泰山雪一滾到海邊好如銀河槎一棹到門前我治這些症不在三部九候間不是好奇異大抵運會使之然古人若是生今日安知不是如此往下傳我今抱此意願與古人言六部以下須要細察有一莊農甚有情夫人死了意縈縈每夜精魂來入夢不知不覺龍暗行一日請我去看看六脈虛弱無病蹤惟有左尺出本位似乎相火甚不平其中細按有疙瘩必是疑心暗鬼生其人問我是何病我言六脈無病只遺精夜中彷彿美人來時時與君有舊情伊聞我言笑著說必有人對先生明先生既知速用藥休使美人再偷情即用斑蟊滑石哈一付兩付便安寧可知六部以下也有脈但拘六部便不清六部以下細細思思之思之鬼神通我嘗相脈上下尋不知不覺遇神人神人不言我已曉何處不有定南針脈竄中指亦有寒積使然者不可用涼藥上焦脈竄火最多亦有寒積起風波皆因氣滯與血滯無有藥餌去開拓時候久了生虛熱飛入顛頂作祟魔宜用二胡柴胡前胡清上火椒川椒茴小茴故紙為正科乾薑吳萸仍多用燒棗十枚使墜著一切濕寒皆導出芫花大戟共琢磨僭上之火盡引下不用連黃連桂肉桂暗交合豈可泥住竄上理而忘溫和之正藥此等之人色多暗那有真火昭灼灼治病以劑脈之平脈平便無病治病脈法精又精只要寒熱虛實劑其平虛者便宜補實者便宜行開蕩通和皆是行不必定用下藥寒者便宜溫熱者便宜清六脈部位分清楚六部各有寒熱虛實各有溫涼補瀉不得顛倒胡亂行果然調劑上天平便得神仙一體輕孫真人渡河神人亦渡河真人執其手曰六脈和平非聖則仙我嘗治一氣虛陷下症二腿疼痛不能行只用風藥大升提寸關虛而無力便得神仙一體輕又嘗治一遺精陷下症寸關虛弱難為情大加升提清相火便得神仙一體輕又嘗治一頭懵頭疼症數年服藥毫不靈只用清空十數兩便得神仙一體輕治病無甚奇異方只要寒熱虛實劑其平按病有偏於虛實寒熱故脈不平若脈理既精則溫涼補瀉各得其宜而無偏一之害則脈自平矣何病之有侄金門謹志程國彭胃神根三字訣詩從來古聖重知生初診脈時便知終五臟和緩稟胃氣本無一病之可名但是禍來原不測頃刻病起如牆傾主人便請去診脈誰知藥王靈不靈此中有個把柄法中候有力猶可通中候有力原有神人之精神寒熱溫涼藥成功藥力須借人之精神轉動若是中候無有力縱然扁鵲亦回程淹淹纏纏三兩月病沉家人淚暗傾此時若要尋生路二尺中上連根生沉候應指還可為卻是主人救難星譬如遍地皆霜雪嶺上寒梅信已通眼前雖未生枝葉春回氣轉便發生此時再加補藥三兩付著手成春妙化工胃神根子三字訣程家恃之作二銘我亦此中討消息不知下手靈不靈脈能洞見隱情須要細診有一少男病不安請我到家將脈看一診尺部左尺結疙瘩知有積熱腎下纏他言先生診脈須言明方見此中真的端我言君本遺精不奈煩伸手挪住玉莖間留滯敗精下不來於今淋閉不能堪跟隨之人忽大笑聲言先生脈理不能瞞凡類此症甚是多豈僅一二在眼前富貴貧賤人用藥相同實不相同有一老婦脈乾澀徹夜咳嗽甚危殆我用十全大補湯他便優優甚自在可知一切脈細微只用此湯不用改可知一切脈濡緩只用此湯不用改可知一切脈弦緊只用此湯不用改可知一切脈虛弱只用此湯不用改可知一切脈柔軟只用此湯不用改可知一切脈沉遲只用此湯不用改可知一切脈疾數只用此湯不用改果能認真此湯頭便可走京與串海縱遇大官家亦能調鼎鼐惟有一切脈洪實不吃承氣不能得惟有一切脈強硬不吃金丹紫金丹不能得惟有一切脈滯塞不吃牛黃牛黃散不能得惟有一切脈橫決不吃十棗十棗湯不能得以治粗人甚是好以治官家再安排說起這些話好如登場之傀儡富貴貧賤實不同縱是軒皇無主宰無脈之人多不死要與神色相參看起脈來無可言須要神色相對參有了神色病易理不昏不迷不焦不暗縱是無脈亦還元我嘗治些無脈症不過寸口露針尖一見良藥便豎起昭昭彰彰度餘年又有六脈盡竄中指間三部全無一線牽大用風藥加金丹忽而脈象盡如前又有虛寒已極脈盡無十全大補氣模糊陰分模糊亦不得加上惡露水頓蘇又有疫癘虐疾已數場氣血枯竭脈全亡但用熱補十數兩蔻仁一到脈如常更有三部九候皆周全轉眼時節染黃泉不是昏迷似睡著便是暗淡起寒痰可知神色亦當家不必脈理盡關天久病必須診脈人止外觀便不靈必須診脈始知情我嘗治一牙疼症其人強壯甚熊熊伊言牙疼已二年每到吃飯難為情熱了一點不能食涼了一點不能行必俟飯食溫暖後吃到口中始能平吾初觀之以為火一看脈理大不同內里陰寒無與比無怪吃藥屢不靈即用肉肉桂附附子吳萸與故紙炮姜蓽茇一樣同一搓搓了十餘兩大加升提往上行蒼朮升麻細辛白芷羌活獨活之類初吃一煎全不效再吃二煎始收功吾初不料此人有此脈並有如此之牙疼雖依脈理去用藥時時思之總朦朧遲至半月始敢問二年之病一時清可知聖人治病理僅恃望聞仍不中一切五臟與六腑若不診脈怎能精左手無脈由相火敗壞人有命火是純陽上下流走左部旁若是一時傷壞了左部上下甚光堂手無脈線無起伏好似大腿肉一方我嘗見一腫脹人脈象如此以敗亡又嘗見一取妾人脈象如此亦遭殃皆固左手無脈線時候不久見閻王可知命為一身主全賴相火滋元陽若治此症預培補肉肉桂附附子吳萸故紙姜黑姜加上熟地與萸肉方可地久並天長肺脈如草節其人多痰亦是危症痰症須從肺經看肺脈頭上看所安肺脈頭上空空然原無黏膩滯心間肺脈頭上如草節定是黏膩滿肚纏有了此脈主噦嘔惱惱積里十餘天不用皂皂角礬白礬去導吐縱有仙藥下亦難誰知一吐十餘回羅膈以上盡淨宣猶有黏膩滯膈下較之膈上更纏綿又用金丹下數四金丹加入藥中一切黏膩始盡刪惱惱積里盡去了只是噦意未盡捐再用六一安胃裡滑石亦土類以土安土再用金石墜腎間皆用紅糖和入內使他脾氣暗周旋因他不能用藥故用此類此皆治痰之妙訣全在蒙醫悟真詮脈以和緩為貴凡是堅硬如骨頭如冰稜如劈柴多是壞症如草節亦非吉象雖然暫愈不知將來何如也各種祟脈手梢濕涼多有邪祟一為診脈手濕涼定是狐鬼據中央若要此症立時愈山甲為丸入麝香祟脈多戰戰祟脈一診勿戰戰恍有飛鼠過其間脈戰身亦戰其人恍惚夢顛倒鬼門針到便能痊祟脈有似電者祟脈恆在中指間上下飛流電一般肝脈時乎有也無定有癥瘕痛不堪各種難治之脈肝脈如繩者難治肝脈如繩緊緊牽有虛有寒氣使然況且脾脈有也無噫氣不止痛不堪肝脈如針者難治肝脈如針中間懸腰疼腿疼不能堪略加調理便見效只恐遲久不能堪凡是血盛易得治如此細細怎歸元肝胃軟弱皆難治胃脈軟弱如麻披一身舉動全無力肝脈軟弱如麻披一身疼痛無可為略用溫補便見效三日五日病又歸皆因氣血虛弱甚藥力一盡難支持胃中雙脈如雙線者難治胃中雙脈如雙線積積渣渣痛不堪縱然治好不時犯淹淹纏纏飲食難少壯之時不如人才至四十便癱瘓胃脈如針者難治胃脈如針中間懸隔氣隔血痛不堪略加行藥便能愈只是飲食分外難無頭無尾無根抵焉能連轉真機緘胃中吸腰者難治我嘗診脈把胃調誰知胃裡中吸腰吸腰之時心上湧心中滿吸腰之時氣下拋多放屁吸腰之甚病必死吸腰之微亦難療日進焦術四五兩始得脾土命根牢寸頭脈橫如線者難治右寸頭者居多寸頭一橫脈如線便是呃食小證見開痰利氣宜常服除風降火切莫慢滋養腎水往上潮引下虛火便如貫左尺右尺硬如蘆管者難治右尺脈硬如蘆管大腸濕瀉不能堪左尺脈硬如蘆管小腸淋閉不能堪或補命門或利水略加升提便能安此中變化亦多端惟有石淋須刀剜折腳之脈難治折腳之脈無尺部甚難療下焦虧損洞昭昭男子即此是死脈女子疼腿更疼腰大補水火必見效藥用肉桂附子當歸熟地時候久了命根牢腫脹脈如秫莛當難治脈如秫莛肝已橫一寒一熱使人驚大補脾土以制木或可永世得安生脈如蚯蚓者癱瘓癱瘓之脈甚是長好和蚯蚓臥中央不起不伏不流走縱是仙人亦無方各種死脈脈似除中者死我嘗治一幼婦臥在床穢氣燻人不可當有屍氣者多死左手恍惚僅有脈右似硬骨樹中央現居肺分必是痰大用牛黃牛黃散瀉膠糖膠糖瀉盡全無脈日進飲食似餓狼俗云吃盡命食忽然昏沉不能食大數已到見閻王又嘗治一老叟病在床脈無根柢神已亡中間微微有結滯略進金丹已開張但是枵腹不思食三日兩日見閻王如此無神脈氣象不下已亡下亦亡以比傷寒號除中想是同路走無常胃脈中斷者必死我治噎食把胃調誰知胃脈斷一刀有橫斷一刀之象大補中焦即能食食之數日忽魂飄脈如灰里蚯蚓者死灰里蚯蚓脈無神不起不伏漸漸伸老年壽終多見此三日五日便歸陰脈如皮條者死脈如皮條上下伸不軟不硬亦無神癆症枯竭恆如此一年半載便歸陰脈如牛槽者死牛槽之脈兩邊高中下無根上亦飄氣血已竟抉去了縱有仙丹不能療脈如蘆管者死脈如蘆管堅硬圓不飲不食痛不堪我用金丹去順氣他便動靜皆安然遲至兩月甚得意我知是死不敢言一日揚揚去看戲即便噦血到陰間脈如秫莛者死右手脈如秫莛圓亦飲亦食不多餐左手脈如秫莛圓一冷一熱天晚間一人兩脈皆已具猶自周旋甚安然只因脾瀉氣流通脹悶多不能免便能遲死至半年一人脈象亦如此全無疾痛在眼前我說此人是死脈旁觀以為是妄言未至半月忽受病一到家中入陰間脈如弓弦者死我嘗診脈脈似弦知是死期在眼前即用補脾一大付全無疾痛之可言未至三日便翻覆石光電火忽迴旋脈如牛筋者死我嘗診脈脈似筋外滑而中實天晚寒熱時一侵補之不得似虛非虛瀉不得似實非實只得降火與滋陰以其脈中氣不往來故也時候久了嗽不已嚴霜一到便回身脈如游魚者死脈如游魚在水間尺寸不到底不連藥吃兩付便能愈轉眼時節便迴旋此等脈象無根柢焉能日久不變遷脈如線繩者死脈如線繩上下牽結結實實在中間我言如此脈象不貫串恐怕飲食下咽難他言我是噎食病已久嗚呼噫嘻在眼前吐血脈如蔥葉者死吐血脈象甚是長氣吹蔥葉好光堂補之不得瀉不得一寒一熱見閻王癆症脈似革者死癆症出頭脈似革時時作嗽氣不接人家脈象皆圓和此獨皮上貼韭葉蠱症脈如刀者死凡是蠱症脈如刀直條條裡弦一條脾土克盡不能食十天半月入陰曹關尺火旺鼻如煙煤者死一身之氣統於肺鼻中乾燥無生意傷寒瘟疫伏煙煤皆是關尺火剋制多由誤瀉使然脾虛不動者死一身生機全在脾脾土不動無可為況有肝木來剋制二目塌陷垂眼皮病人無神者死脈無神者亦死治病先把脈來摸有了脈理好用藥若是脈上無有病縱遇軒岐無奈何但看外邊昏蒙甚已是薤露種一科我嘗治些瘟疫症脈如麻披似甚弱呼之不能一語應混混沌沌又睡著又嘗治些老年痰甚多六脈沉靜無大錯只是昏迷不醒人魂魄若已離肉殼又嘗治些少年將歸陰六脈洪大無甚惡但是迷悶無知識彷彿夢寐把精奪大約治病先看神有了精神好為人若是精神一無有昏昏迷迷入鬼林況是脈道又無神渾身血肉化飛塵試看天地身外身多大精光海外臨治病先看氣色吉凶亦可預知治病先把面來觀有吉有凶露真端病人那有好氣色只要鼻間微含潤面上略帶鮮潤鮮便是陽氣便是生氣無論紅黃與黑白最忌灰黯與枯乾灰黯枯乾便是陰氣便是死氣試觀老樹將發芽必有嫩色透枝尖試觀田苗將結實必有秀色之可餐即此想生意便知人命之大關又或翻身去說話一挽病人重如山此是陰氣入骨髓那有陽氣在人間兼之臭氣多燻人骨重如山臭氣燻人皆是陰氣皆是死氣能在世上活幾天睜眼便要看出來醫人原帶數分仙不然何以贊造化何以修先天決死生外面亦當家死生多從臉上看全靠脈理必不佔或是好藥正管著脈象頓皆失固然或是翻覆連日夜此時忽當睡安然病人恆在黑影里伸腿赤腳擁被眠即出兩手決生死如此倉猝甚是難不如扶他坐起來先將神情觀一觀或在黑影看不著油紙點著看一看或是鼻子如煙煤或是天柱側一邊或是昏迷若睡著或是身體重如山即從此處決一決已見生死之一斑再將脈象細審審看與病症翻不翻亦有脈象如革條亦有脈象如弓弦亦有脈象如蒜皮亦有脈象如舟懸亦有脈象無起伏亦有脈象堅硬圓此皆必死之證見石火電光在眼前脈理雖足憑間有不可憑者不可不知大抵相脈只相八九分亦有一分知不真一則上關天二則下關人如果真是該死了脈上必無神如果真是該活了脈上必有神有神無神甚清楚相脈之人如何不知八九分亦有該死之人不必脈上全無神也吃飯也整襟穩排大坐笑音音無奈一陣鬼來臨頃刻之時即歸陰亦有該活之人不必脈上定有神不知己不知人淹淹纏纏鬼為鄰無奈一夕忽轉輪半夜之時即回春如此之症不是全沒有世上亦曾一二人可知人命上關天下關人縱是藥中仙亦有一分知不真知道脈理不過治不錯焉能一一胥下定南針我說這樣話不是醫道認不真胥知萬事由天不由人如果人盡作主張葫蘆谷中一把藥這回定殺多少人
