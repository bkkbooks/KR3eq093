  - {type: 'tls:div-start', offset: 9400, content: '', id: KR3eq093_jc_001-d7d20, level: 2, head_text: 脈學}
  - {type: 'tls:head', offset: 9400, content: '', id: KR3eq093_jc_001-d7.d20.h1s1}
  - {type: 'tls:div-end', offset: 9514, content: '', id: KR3eq093_jc_001-d7d20}
  - {type: 'tls:div-start', offset: 9514, content: '', id: KR3eq093_jc_001-d7d21, level: 2, head_text: 脈法續余歌}
  - {type: 'tls:head', offset: 9514, content: '', id: KR3eq093_jc_001-d7.d21.h1s1}
  - {type: 'tls:div-end', offset: 10008, content: '', id: KR3eq093_jc_001-d7d21}
  - {type: 'tls:div-start', offset: 10008, content: '', id: KR3eq093_jc_001-d7d22, level: 2, head_text: 脈不上竄不下流如此治}
  - {type: 'tls:head', offset: 10008, content: '', id: KR3eq093_jc_001-d7.d22.h1s1}
  - {type: 'tls:div-start', offset: 10018, content: '', id: KR3eq093_jc_001-d7.d22d2, level: 3, head_text: 二寸脈外倒}
  - {type: 'tls:head', offset: 10018, content: '', id: KR3eq093_jc_001-d7.d22.d2.h1s1}
  - {type: 'tls:div-end', offset: 10079, content: '', id: KR3eq093_jc_001-d7.d22d2}
  - {type: 'tls:div-start', offset: 10079, content: '', id: KR3eq093_jc_001-d7.d22d3, level: 3, head_text: 二寸脈內倒}
  - {type: 'tls:head', offset: 10079, content: '', id: KR3eq093_jc_001-d7.d22.d3.h1s1}
  - {type: 'tls:div-end', offset: 10144, content: '', id: KR3eq093_jc_001-d7.d22d3}
  - {type: 'tls:div-start', offset: 10144, content: '', id: KR3eq093_jc_001-d7.d22d4, level: 3, head_text: 肺脈心脈如針尖皆是虛火上炎}
  - {type: 'tls:head', offset: 10144, content: '', id: KR3eq093_jc_001-d7.d22.d4.h1s1}
  - {type: 'tls:div-end', offset: 10205, content: '', id: KR3eq093_jc_001-d7.d22d4}
  - {type: 'tls:div-start', offset: 10205, content: '', id: KR3eq093_jc_001-d7.d22d5, level: 3, head_text: 包絡脈滯宜破心}
  - {type: 'tls:head', offset: 10205, content: '', id: KR3eq093_jc_001-d7.d22.d5.h1s1}
  - {type: 'tls:div-end', offset: 10243, content: '', id: KR3eq093_jc_001-d7.d22d5}
  - {type: 'tls:div-start', offset: 10243, content: '', id: KR3eq093_jc_001-d7.d22d6, level: 3, head_text: 左尺堅硬宜服紫金丸}
  - {type: 'tls:head', offset: 10243, content: '', id: KR3eq093_jc_001-d7.d22.d6.h1s1}
  - {type: 'tls:div-end', offset: 10324, content: '', id: KR3eq093_jc_001-d7.d22d6}
  - {type: 'tls:div-start', offset: 10324, content: '', id: KR3eq093_jc_001-d7.d22d7, level: 3, head_text: 男子尺寒熱藥不可通用}
  - {type: 'tls:head', offset: 10324, content: '', id: KR3eq093_jc_001-d7.d22.d7.h1s1}
  - {type: 'tls:div-end', offset: 10433, content: '', id: KR3eq093_jc_001-d7.d22d7}
  - {type: 'tls:div-start', offset: 10433, content: '', id: KR3eq093_jc_001-d7.d22d8, level: 3, head_text: 男子尺寒宜用肉附湯還宜保養}
  - {type: 'tls:head', offset: 10433, content: '', id: KR3eq093_jc_001-d7.d22.d8.h1s1}
  - {type: 'tls:div-end', offset: 10512, content: '', id: KR3eq093_jc_001-d7.d22d8}
  - {type: 'tls:div-start', offset: 10512, content: '', id: KR3eq093_jc_001-d7.d22d9, level: 3, head_text: 尺部熱甚非知柏不解}
  - {type: 'tls:head', offset: 10512, content: '', id: KR3eq093_jc_001-d7.d22.d9.h1s1}
  - {type: 'tls:div-end', offset: 10556, content: '', id: KR3eq093_jc_001-d7.d22d9}
  - {type: 'tls:div-start', offset: 10556, content: '', id: KR3eq093_jc_001-d7.d22d10, level: 3, head_text: 腿疼有寒熱虛實之分}
  - {type: 'tls:head', offset: 10556, content: '', id: KR3eq093_jc_001-d7.d22.d10.h1s1}
  - {type: 'tls:div-end', offset: 10615, content: '', id: KR3eq093_jc_001-d7.d22d10}
  - {type: 'tls:div-start', offset: 10615, content: '', id: KR3eq093_jc_001-d7.d22d11, level: 3, head_text: 肝胃疼痛用藥有分}
  - {type: 'tls:head', offset: 10615, content: '', id: KR3eq093_jc_001-d7.d22.d11.h1s1}
  - {type: 'tls:div-end', offset: 10719, content: '', id: KR3eq093_jc_001-d7.d22d11}
  - {type: 'tls:div-start', offset: 10719, content: '', id: KR3eq093_jc_001-d7.d22d12, level: 3, head_text: 六脈如紙蒙是風寒凝滯於外}
  - {type: 'tls:head', offset: 10719, content: '', id: KR3eq093_jc_001-d7.d22.d12.h1s1}
  - {type: 'tls:div-end', offset: 10781, content: '', id: KR3eq093_jc_001-d7.d22d12}
  - {type: 'tls:div-start', offset: 10781, content: '', id: KR3eq093_jc_001-d7.d22d13, level: 3, head_text: 肺部脈寬痰滯使然}
  - {type: 'tls:head', offset: 10781, content: '', id: KR3eq093_jc_001-d7.d22.d13.h1s1}
  - {type: 'tls:div-end', offset: 10817, content: '', id: KR3eq093_jc_001-d7.d22d13}
  - {type: 'tls:div-start', offset: 10817, content: '', id: KR3eq093_jc_001-d7.d22d14, level: 3, head_text: 肺脈平而不動結在心口}
  - {type: 'tls:head', offset: 10817, content: '', id: KR3eq093_jc_001-d7.d22.d14.h1s1}
  - {type: 'tls:div-end', offset: 10855, content: '', id: KR3eq093_jc_001-d7.d22d14}
  - {type: 'tls:div-start', offset: 10855, content: '', id: KR3eq093_jc_001-d7.d22d15, level: 3, head_text: 眼疼總要治肝}
  - {type: 'tls:head', offset: 10855, content: '', id: KR3eq093_jc_001-d7.d22.d15.h1s1}
  - {type: 'tls:div-end', offset: 10910, content: '', id: KR3eq093_jc_001-d7.d22d15}
  - {type: 'tls:div-start', offset: 10910, content: '', id: KR3eq093_jc_001-d7.d22d16, level: 3, head_text: 眼疼因肝經結滯}
  - {type: 'tls:head', offset: 10910, content: '', id: KR3eq093_jc_001-d7.d22.d16.h1s1}
  - {type: 'tls:div-end', offset: 10950, content: '', id: KR3eq093_jc_001-d7.d22d16}
  - {type: 'tls:div-start', offset: 10950, content: '', id: KR3eq093_jc_001-d7.d22d17, level: 3, head_text: 頭疼因二寸結滯}
  - {type: 'tls:head', offset: 10950, content: '', id: KR3eq093_jc_001-d7.d22.d17.h1s1}
  - {type: 'tls:div-end', offset: 10988, content: '', id: KR3eq093_jc_001-d7.d22d17}
  - {type: 'tls:div-start', offset: 10988, content: '', id: KR3eq093_jc_001-d7.d22d18, level: 3, head_text: 右寸滯如麥屑}
  - {type: 'tls:head', offset: 10988, content: '', id: KR3eq093_jc_001-d7.d22.d18.h1s1}
  - {type: 'tls:div-end', offset: 11022, content: '', id: KR3eq093_jc_001-d7.d22d18}
  - {type: 'tls:div-start', offset: 11022, content: '', id: KR3eq093_jc_001-d7.d22d19, level: 3, head_text: 左寸滯如麥屑}
  - {type: 'tls:head', offset: 11022, content: '', id: KR3eq093_jc_001-d7.d22.d19.h1s1}
  - {type: 'tls:div-end', offset: 11056, content: '', id: KR3eq093_jc_001-d7.d22d19}
  - {type: 'tls:div-start', offset: 11056, content: '', id: KR3eq093_jc_001-d7.d22d20, level: 3, head_text: 隆冬疼痛多是陰風為病}
  - {type: 'tls:head', offset: 11056, content: '', id: KR3eq093_jc_001-d7.d22.d20.h1s1}
  - {type: 'tls:div-end', offset: 11113, content: '', id: KR3eq093_jc_001-d7.d22d20}
  - {type: 'tls:div-start', offset: 11113, content: '', id: KR3eq093_jc_001-d7.d22d21, level: 3, head_text: 罐搬下焦能下婦人之氣}
  - {type: 'tls:head', offset: 11113, content: '', id: KR3eq093_jc_001-d7.d22.d21.h1s1}
  - {type: 'tls:div-end', offset: 11164, content: '', id: KR3eq093_jc_001-d7.d22d21}
  - {type: 'tls:div-start', offset: 11164, content: '', id: KR3eq093_jc_001-d7.d22d22, level: 3, head_text: 六脈不動宜內外兼治}
  - {type: 'tls:head', offset: 11164, content: '', id: KR3eq093_jc_001-d7.d22.d22.h1s1}
  - {type: 'tls:div-end', offset: 11205, content: '', id: KR3eq093_jc_001-d7.d22d22}
  - {type: 'tls:div-start', offset: 11205, content: '', id: KR3eq093_jc_001-d7.d22d23, level: 3, head_text: 六脈不動宜內外透發}
  - {type: 'tls:head', offset: 11205, content: '', id: KR3eq093_jc_001-d7.d22.d23.h1s1}
  - {type: 'tls:div-end', offset: 11278, content: '', id: KR3eq093_jc_001-d7.d22d23}
  - {type: 'tls:div-start', offset: 11278, content: '', id: KR3eq093_jc_001-d7.d22d24, level: 3, head_text: 終夜不眠由於下焦結滯}
  - {type: 'tls:head', offset: 11278, content: '', id: KR3eq093_jc_001-d7.d22.d24.h1s1}
  - {type: 'tls:div-end', offset: 11316, content: '', id: KR3eq093_jc_001-d7.d22d24}
  - {type: 'tls:div-start', offset: 11316, content: '', id: KR3eq093_jc_001-d7.d22d25, level: 3, head_text: 崩症由於肺經熱}
  - {type: 'tls:head', offset: 11316, content: '', id: KR3eq093_jc_001-d7.d22.d25.h1s1}
  - {type: 'tls:div-end', offset: 11351, content: '', id: KR3eq093_jc_001-d7.d22d25}
  - {type: 'tls:div-start', offset: 11351, content: '', id: KR3eq093_jc_001-d7.d22d26, level: 3, head_text: 濕寒作熱久診方知}
  - {type: 'tls:head', offset: 11351, content: '', id: KR3eq093_jc_001-d7.d22.d26.h1s1}
  - {type: 'tls:div-end', offset: 11399, content: '', id: KR3eq093_jc_001-d7.d22d26}
  - {type: 'tls:div-start', offset: 11399, content: '', id: KR3eq093_jc_001-d7.d22d27, level: 3, head_text: 女子二寸不可過於關脈}
  - {type: 'tls:head', offset: 11399, content: '', id: KR3eq093_jc_001-d7.d22.d27.h1s1}
  - {type: 'tls:div-end', offset: 11471, content: '', id: KR3eq093_jc_001-d7.d22d27}
  - {type: 'tls:div-start', offset: 11471, content: '', id: KR3eq093_jc_001-d7.d22d28, level: 3, head_text: 老婦右尺全無右邊身疼不能食}
  - {type: 'tls:head', offset: 11471, content: '', id: KR3eq093_jc_001-d7.d22.d28.h1s1}
  - {type: 'tls:div-end', offset: 11530, content: '', id: KR3eq093_jc_001-d7.d22d28}
  - {type: 'tls:div-start', offset: 11530, content: '', id: KR3eq093_jc_001-d7.d22d29, level: 3, head_text: 喉疼喉腫多是風寒}
  - {type: 'tls:head', offset: 11530, content: '', id: KR3eq093_jc_001-d7.d22.d29.h1s1}
  - {type: 'tls:div-end', offset: 11610, content: '', id: KR3eq093_jc_001-d7.d22d29}
  - {type: 'tls:div-start', offset: 11610, content: '', id: KR3eq093_jc_001-d7.d22d30, level: 3, head_text: 治吐血不用血分藥亦是創治法}
  - {type: 'tls:head', offset: 11610, content: '', id: KR3eq093_jc_001-d7.d22.d30.h1s1}
  - {type: 'tls:div-end', offset: 11682, content: '', id: KR3eq093_jc_001-d7.d22d30}
  - {type: 'tls:div-start', offset: 11682, content: '', id: KR3eq093_jc_001-d7.d22d31, level: 3, head_text: 少婦心脈結聚右腎腫硬}
  - {type: 'tls:head', offset: 11682, content: '', id: KR3eq093_jc_001-d7.d22.d31.h1s1}
  - {type: 'tls:div-end', offset: 11750, content: '', id: KR3eq093_jc_001-d7.d22d31}
  - {type: 'tls:div-start', offset: 11750, content: '', id: KR3eq093_jc_001-d7.d22d32, level: 3, head_text: 左寸如錢治法}
  - {type: 'tls:head', offset: 11750, content: '', id: KR3eq093_jc_001-d7.d22.d32.h1s1}
  - {type: 'tls:div-end', offset: 11798, content: '', id: KR3eq093_jc_001-d7.d22d32}
  - {type: 'tls:div-start', offset: 11798, content: '', id: KR3eq093_jc_001-d7.d22d33, level: 3, head_text: 癆嗽之脈尺寸皆無}
  - {type: 'tls:head', offset: 11798, content: '', id: KR3eq093_jc_001-d7.d22.d33.h1s1}
  - {type: 'tls:div-end', offset: 11862, content: '', id: KR3eq093_jc_001-d7.d22d33}
  - {type: 'tls:div-start', offset: 11862, content: '', id: KR3eq093_jc_001-d7.d22d34, level: 3, head_text: 沉寒出汗必須內外兼治}
  - {type: 'tls:head', offset: 11862, content: '', id: KR3eq093_jc_001-d7.d22.d34.h1s1}
  - {type: 'tls:div-end', offset: 11916, content: '', id: KR3eq093_jc_001-d7.d22d34}
  - {type: 'tls:div-start', offset: 11916, content: '', id: KR3eq093_jc_001-d7.d22d35, level: 3, head_text: 氣惱之脈治法}
  - {type: 'tls:head', offset: 11916, content: '', id: KR3eq093_jc_001-d7.d22.d35.h1s1}
  - {type: 'tls:div-end', offset: 11968, content: '', id: KR3eq093_jc_001-d7.d22d35}
  - {type: 'tls:div-start', offset: 11968, content: '', id: KR3eq093_jc_001-d7.d22d36, level: 3, head_text: 噦嘔不必脈竄}
  - {type: 'tls:head', offset: 11968, content: '', id: KR3eq093_jc_001-d7.d22.d36.h1s1}
  - {type: 'tls:div-end', offset: 12002, content: '', id: KR3eq093_jc_001-d7.d22d36}
  - {type: 'tls:div-start', offset: 12002, content: '', id: KR3eq093_jc_001-d7.d22d37, level: 3, head_text: 虛實有即脈之兩邊而見者}
  - {type: 'tls:head', offset: 12002, content: '', id: KR3eq093_jc_001-d7.d22.d37.h1s1}
  - {type: 'tls:div-end', offset: 12041, content: '', id: KR3eq093_jc_001-d7.d22d37}
  - {type: 'tls:div-start', offset: 12041, content: '', id: KR3eq093_jc_001-d7.d22d38, level: 3, head_text: 肺脈如針懸}
  - {type: 'tls:head', offset: 12041, content: '', id: KR3eq093_jc_001-d7.d22.d38.h1s1}
  - {type: 'tls:div-end', offset: 12074, content: '', id: KR3eq093_jc_001-d7.d22d38}
  - {type: 'tls:div-start', offset: 12074, content: '', id: KR3eq093_jc_001-d7.d22d39, level: 3, head_text: 三部脈如皮錢}
  - {type: 'tls:head', offset: 12074, content: '', id: KR3eq093_jc_001-d7.d22.d39.h1s1}
  - {type: 'tls:div-end', offset: 12122, content: '', id: KR3eq093_jc_001-d7.d22d39}
  - {type: 'tls:div-start', offset: 12122, content: '', id: KR3eq093_jc_001-d7.d22d40, level: 3, head_text: 治中毒一切禽獸肉毒皆是惡毒六脈沉細緊數}
  - {type: 'tls:head', offset: 12122, content: '', id: KR3eq093_jc_001-d7.d22.d40.h1s1}
  - {type: 'tls:div-end', offset: 12311, content: '', id: KR3eq093_jc_001-d7.d22d40}
  - {type: 'tls:div-start', offset: 12311, content: '', id: KR3eq093_jc_001-d7.d22d41, level: 3, head_text: 中毒六脈浮洪宜飲二仙丹白礬明雄共為細末}
  - {type: 'tls:head', offset: 12311, content: '', id: KR3eq093_jc_001-d7.d22.d41.h1s1}
  - {type: 'tls:div-end', offset: 12358, content: '', id: KR3eq093_jc_001-d7.d22d41}
  - {type: 'tls:div-start', offset: 12358, content: '', id: KR3eq093_jc_001-d7.d22d42, level: 3, head_text: 二便不通有從心肺治者}
  - {type: 'tls:head', offset: 12358, content: '', id: KR3eq093_jc_001-d7.d22.d42.h1s1}
  - {type: 'tls:div-end', offset: 12449, content: '', id: KR3eq093_jc_001-d7.d22d42}
  - {type: 'tls:div-start', offset: 12449, content: '', id: KR3eq093_jc_001-d7.d22d43, level: 3, head_text: 女子上焦有病宜從經脈中治}
  - {type: 'tls:head', offset: 12449, content: '', id: KR3eq093_jc_001-d7.d22.d43.h1s1}
  - {type: 'tls:div-end', offset: 12567, content: '', id: KR3eq093_jc_001-d7.d22d43}
  - {type: 'tls:div-start', offset: 12567, content: '', id: KR3eq093_jc_001-d7.d22d44, level: 3, head_text: 婦人關腎無脈治法}
  - {type: 'tls:head', offset: 12567, content: '', id: KR3eq093_jc_001-d7.d22.d44.h1s1}
  - {type: 'tls:div-end', offset: 12617, content: '', id: KR3eq093_jc_001-d7.d22d44}
  - {type: 'tls:div-end', offset: 12617, content: '', id: KR3eq093_jc_001-d7d22}
  - {type: 'tls:div-start', offset: 12617, content: '', id: KR3eq093_jc_001-d7d23, level: 2, head_text: 脈上竄下流如此治}
