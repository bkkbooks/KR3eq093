  - {type: 'tls:div-start', offset: 12625, content: '', id: KR3eq093_jc_001-d7.d23d2, level: 3, head_text: 喉病肺脈上竄}
  - {type: 'tls:head', offset: 12625, content: '', id: KR3eq093_jc_001-d7.d23.d2.h1s1}
  - {type: 'tls:div-end', offset: 12692, content: '', id: KR3eq093_jc_001-d7.d23d2}
  - {type: 'tls:div-start', offset: 12692, content: '', id: KR3eq093_jc_001-d7.d23d3, level: 3, head_text: 風火瘧子脈上顛}
  - {type: 'tls:head', offset: 12692, content: '', id: KR3eq093_jc_001-d7.d23.d3.h1s1}
  - {type: 'tls:div-end', offset: 12727, content: '', id: KR3eq093_jc_001-d7.d23d3}
  - {type: 'tls:div-start', offset: 12727, content: '', id: KR3eq093_jc_001-d7.d23d4, level: 3, head_text: 虛癆中風脈上顛}
  - {type: 'tls:head', offset: 12727, content: '', id: KR3eq093_jc_001-d7.d23.d4.h1s1}
  - {type: 'tls:div-end', offset: 12779, content: '', id: KR3eq093_jc_001-d7.d23d4}
  - {type: 'tls:div-start', offset: 12779, content: '', id: KR3eq093_jc_001-d7.d23d5, level: 3, head_text: 產前風症脈上顛}
  - {type: 'tls:head', offset: 12779, content: '', id: KR3eq093_jc_001-d7.d23.d5.h1s1}
  - {type: 'tls:div-end', offset: 12822, content: '', id: KR3eq093_jc_001-d7.d23d5}
  - {type: 'tls:div-start', offset: 12822, content: '', id: KR3eq093_jc_001-d7.d23d6, level: 3, head_text: 牙疼用肉桂而愈}
  - {type: 'tls:head', offset: 12822, content: '', id: KR3eq093_jc_001-d7.d23.d6.h1s1}
  - {type: 'tls:div-end', offset: 12875, content: '', id: KR3eq093_jc_001-d7.d23d6}
  - {type: 'tls:div-start', offset: 12875, content: '', id: KR3eq093_jc_001-d7.d23d7, level: 3, head_text: 牙酸用肉桂而愈}
  - {type: 'tls:head', offset: 12875, content: '', id: KR3eq093_jc_001-d7.d23.d7.h1s1}
  - {type: 'tls:div-end', offset: 12928, content: '', id: KR3eq093_jc_001-d7.d23d7}
  - {type: 'tls:div-start', offset: 12928, content: '', id: KR3eq093_jc_001-d7.d23d8, level: 3, head_text: 脈有上竄下竄之分一定是火}
  - {type: 'tls:head', offset: 12928, content: '', id: KR3eq093_jc_001-d7.d23.d8.h1s1}
  - {type: 'tls:div-end', offset: 12976, content: '', id: KR3eq093_jc_001-d7.d23d8}
  - {type: 'tls:div-start', offset: 12976, content: '', id: KR3eq093_jc_001-d7.d23d9, level: 3, head_text: 尺部熱極便下流}
  - {type: 'tls:head', offset: 12976, content: '', id: KR3eq093_jc_001-d7.d23.d9.h1s1}
  - {type: 'tls:div-end', offset: 13067, content: '', id: KR3eq093_jc_001-d7.d23d9}
  - {type: 'tls:div-start', offset: 13067, content: '', id: KR3eq093_jc_001-d7.d23d10, level: 3, head_text: 耳疼多因脈竄而然}
  - {type: 'tls:head', offset: 13067, content: '', id: KR3eq093_jc_001-d7.d23.d10.h1s1}
  - {type: 'tls:div-end', offset: 13103, content: '', id: KR3eq093_jc_001-d7.d23d10}
  - {type: 'tls:div-start', offset: 13103, content: '', id: KR3eq093_jc_001-d7.d23d11, level: 3, head_text: 濕熱下注脈拉尾巴}
  - {type: 'tls:head', offset: 13103, content: '', id: KR3eq093_jc_001-d7.d23.d11.h1s1}
  - {type: 'tls:div-end', offset: 13163, content: '', id: KR3eq093_jc_001-d7.d23d11}
  - {type: 'tls:div-start', offset: 13163, content: '', id: KR3eq093_jc_001-d7.d23d12, level: 3, head_text: 脈拉尾巴有左右之分}
  - {type: 'tls:head', offset: 13163, content: '', id: KR3eq093_jc_001-d7.d23.d12.h1s1}
  - {type: 'tls:div-end', offset: 13246, content: '', id: KR3eq093_jc_001-d7.d23d12}
  - {type: 'tls:div-start', offset: 13246, content: '', id: KR3eq093_jc_001-d7.d23d13, level: 3, head_text: 脈拉尾巴亦有虛熱而然者}
  - {type: 'tls:head', offset: 13246, content: '', id: KR3eq093_jc_001-d7.d23.d13.h1s1}
  - {type: 'tls:div-end', offset: 13326, content: '', id: KR3eq093_jc_001-d7.d23d13}
  - {type: 'tls:div-start', offset: 13326, content: '', id: KR3eq093_jc_001-d7.d23d14, level: 3, head_text: 脈流左尺以下便當大瀉陰分}
  - {type: 'tls:head', offset: 13326, content: '', id: KR3eq093_jc_001-d7.d23.d14.h1s1}
  - {type: 'tls:div-end', offset: 13380, content: '', id: KR3eq093_jc_001-d7.d23d14}
  - {type: 'tls:div-start', offset: 13380, content: '', id: KR3eq093_jc_001-d7.d23d15, level: 3, head_text: 脈貫中指宜分虛實中下亦然}
  - {type: 'tls:head', offset: 13380, content: '', id: KR3eq093_jc_001-d7.d23.d15.h1s1}
  - {type: 'tls:div-end', offset: 13486, content: '', id: KR3eq093_jc_001-d7.d23d15}
  - {type: 'tls:div-start', offset: 13486, content: '', id: KR3eq093_jc_001-d7.d23d16, level: 3, head_text: 喉疼總要治肺}
  - {type: 'tls:head', offset: 13486, content: '', id: KR3eq093_jc_001-d7.d23.d16.h1s1}
  - {type: 'tls:div-end', offset: 13537, content: '', id: KR3eq093_jc_001-d7.d23d16}
  - {type: 'tls:div-start', offset: 13537, content: '', id: KR3eq093_jc_001-d7.d23d17, level: 3, head_text: 二將軍能開風火之門牛黃散紫金丹為二將軍}
  - {type: 'tls:head', offset: 13537, content: '', id: KR3eq093_jc_001-d7.d23.d17.h1s1}
  - {type: 'tls:div-end', offset: 13616, content: '', id: KR3eq093_jc_001-d7.d23d17}
  - {type: 'tls:div-start', offset: 13616, content: '', id: KR3eq093_jc_001-d7.d23d18, level: 3, head_text: 頭上諸病以除風為主}
  - {type: 'tls:head', offset: 13616, content: '', id: KR3eq093_jc_001-d7.d23.d18.h1s1}
  - {type: 'tls:div-end', offset: 13667, content: '', id: KR3eq093_jc_001-d7.d23d18}
  - {type: 'tls:div-start', offset: 13667, content: '', id: KR3eq093_jc_001-d7.d23d19, level: 3, head_text: 脈出寸口以上必用行藥}
  - {type: 'tls:head', offset: 13667, content: '', id: KR3eq093_jc_001-d7.d23.d19.h1s1}
  - {type: 'tls:div-end', offset: 13869, content: '', id: KR3eq093_jc_001-d7.d23d19}
  - {type: 'tls:div-start', offset: 13869, content: '', id: KR3eq093_jc_001-d7.d23d20, level: 3, head_text: 男子左尺下傳其初皆寒}
  - {type: 'tls:head', offset: 13869, content: '', id: KR3eq093_jc_001-d7.d23.d20.h1s1}
  - {type: 'tls:div-end', offset: 14015, content: '', id: KR3eq093_jc_001-d7.d23d20}
  - {type: 'tls:div-start', offset: 14015, content: '', id: KR3eq093_jc_001-d7.d23d21, level: 3, head_text: 脈以和緩為高}
  - {type: 'tls:head', offset: 14015, content: '', id: KR3eq093_jc_001-d7.d23.d21.h1s1}
  - {type: 'tls:div-end', offset: 14049, content: '', id: KR3eq093_jc_001-d7.d23d21}
  - {type: 'tls:div-start', offset: 14049, content: '', id: KR3eq093_jc_001-d7.d23d22, level: 3, head_text: 脈不知緩便為病}
  - {type: 'tls:head', offset: 14049, content: '', id: KR3eq093_jc_001-d7.d23.d22.h1s1}
  - {type: 'tls:div-end', offset: 14185, content: '', id: KR3eq093_jc_001-d7.d23d22}
  - {type: 'tls:div-start', offset: 14185, content: '', id: KR3eq093_jc_001-d7.d23d23, level: 3, head_text: 久病脈竄下焦虛寒宜引氣歸元}
  - {type: 'tls:head', offset: 14185, content: '', id: KR3eq093_jc_001-d7.d23.d23.h1s1}
  - {type: 'tls:div-end', offset: 14297, content: '', id: KR3eq093_jc_001-d7.d23d23}
  - {type: 'tls:div-start', offset: 14297, content: '', id: KR3eq093_jc_001-d7.d23d24, level: 3, head_text: 治病治上下以覆花赭石湯為例}
  - {type: 'tls:head', offset: 14297, content: '', id: KR3eq093_jc_001-d7.d23.d24.h1s1}
  - {type: 'tls:div-end', offset: 14433, content: '', id: KR3eq093_jc_001-d7.d23d24}
  - {type: 'tls:div-start', offset: 14433, content: '', id: KR3eq093_jc_001-d7.d23d25, level: 3, head_text: 肝橫午後熱肝腎齊橫夜半熱治亦不同}
  - {type: 'tls:head', offset: 14433, content: '', id: KR3eq093_jc_001-d7.d23.d25.h1s1}
  - {type: 'tls:div-end', offset: 14505, content: '', id: KR3eq093_jc_001-d7.d23d25}
  - {type: 'tls:div-start', offset: 14505, content: '', id: KR3eq093_jc_001-d7.d23d26, level: 3, head_text: 六部以上須要細察}
  - {type: 'tls:head', offset: 14505, content: '', id: KR3eq093_jc_001-d7.d23.d26.h1s1}
  - {type: 'tls:div-end', offset: 14726, content: '', id: KR3eq093_jc_001-d7.d23d26}
  - {type: 'tls:div-start', offset: 14726, content: '', id: KR3eq093_jc_001-d7.d23d27, level: 3, head_text: 六部以下須要細察}
  - {type: 'tls:head', offset: 14726, content: '', id: KR3eq093_jc_001-d7.d23.d27.h1s1}
  - {type: 'tls:div-end', offset: 14934, content: '', id: KR3eq093_jc_001-d7.d23d27}
  - {type: 'tls:div-start', offset: 14934, content: '', id: KR3eq093_jc_001-d7.d23d28, level: 3, head_text: 脈竄中指亦有寒積使然者不可用涼藥}
  - {type: 'tls:head', offset: 14934, content: '', id: KR3eq093_jc_001-d7.d23.d28.h1s1}
  - {type: 'tls:div-end', offset: 15088, content: '', id: KR3eq093_jc_001-d7.d23d28}
  - {type: 'tls:div-end', offset: 15088, content: '', id: KR3eq093_jc_001-d7d23}
  - {type: 'tls:div-start', offset: 15088, content: '', id: KR3eq093_jc_001-d7d24, level: 2, head_text: 治病以劑脈之平脈平便無病}
  - {type: 'tls:head', offset: 15088, content: '', id: KR3eq093_jc_001-d7.d24.h1s1}
  - {type: 'tls:div-end', offset: 15374, content: '', id: KR3eq093_jc_001-d7d24}
  - {type: 'tls:div-start', offset: 15374, content: '', id: KR3eq093_jc_001-d7d25, level: 2, head_text: 程國彭胃神根三字訣詩}
  - {type: 'tls:head', offset: 15374, content: '', id: KR3eq093_jc_001-d7.d25.h1s1}
  - {type: 'tls:div-end', offset: 15610, content: '', id: KR3eq093_jc_001-d7d25}
  - {type: 'tls:div-start', offset: 15610, content: '', id: KR3eq093_jc_001-d7d26, level: 2, head_text: 脈能洞見隱情須要細診}
  - {type: 'tls:head', offset: 15610, content: '', id: KR3eq093_jc_001-d7.d26.h1s1}
  - {type: 'tls:div-end', offset: 15726, content: '', id: KR3eq093_jc_001-d7d26}
  - {type: 'tls:div-start', offset: 15726, content: '', id: KR3eq093_jc_001-d7d27, level: 2, head_text: 富貴貧賤人用藥相同實不相同}
  - {type: 'tls:head', offset: 15726, content: '', id: KR3eq093_jc_001-d7.d27.h1s1}
  - {type: 'tls:div-end', offset: 15994, content: '', id: KR3eq093_jc_001-d7d27}
  - {type: 'tls:div-start', offset: 15994, content: '', id: KR3eq093_jc_001-d7d28, level: 2, head_text: 無脈之人多不死要與神色相參}
  - {type: 'tls:head', offset: 15994, content: '', id: KR3eq093_jc_001-d7.d28.h1s1}
  - {type: 'tls:div-end', offset: 16205, content: '', id: KR3eq093_jc_001-d7d28}
  - {type: 'tls:div-start', offset: 16205, content: '', id: KR3eq093_jc_001-d7d29, level: 2, head_text: 久病必須診脈}
  - {type: 'tls:head', offset: 16205, content: '', id: KR3eq093_jc_001-d7.d29.h1s1}
  - {type: 'tls:div-end', offset: 16443, content: '', id: KR3eq093_jc_001-d7d29}
  - {type: 'tls:div-start', offset: 16443, content: '', id: KR3eq093_jc_001-d7d30, level: 2, head_text: 左手無脈由相火敗壞}
  - {type: 'tls:head', offset: 16443, content: '', id: KR3eq093_jc_001-d7.d30.h1s1}
  - {type: 'tls:div-end', offset: 16584, content: '', id: KR3eq093_jc_001-d7d30}
  - {type: 'tls:div-start', offset: 16584, content: '', id: KR3eq093_jc_001-d7d31, level: 2, head_text: 肺脈如草節其人多痰亦是危症}
  - {type: 'tls:head', offset: 16584, content: '', id: KR3eq093_jc_001-d7.d31.h1s1}
  - {type: 'tls:div-end', offset: 16835, content: '', id: KR3eq093_jc_001-d7d31}
  - {type: 'tls:div-start', offset: 16835, content: '', id: KR3eq093_jc_001-d7d32, level: 2, head_text: 各種祟脈}
  - {type: 'tls:head', offset: 16835, content: '', id: KR3eq093_jc_001-d7.d32.h1s1}
  - {type: 'tls:div-start', offset: 16839, content: '', id: KR3eq093_jc_001-d7.d32d2, level: 3, head_text: 手梢濕涼多有邪祟}
  - {type: 'tls:head', offset: 16839, content: '', id: KR3eq093_jc_001-d7.d32.d2.h1s1}
  - {type: 'tls:div-end', offset: 16875, content: '', id: KR3eq093_jc_001-d7.d32d2}
  - {type: 'tls:div-start', offset: 16875, content: '', id: KR3eq093_jc_001-d7.d32d3, level: 3, head_text: 祟脈多戰戰}
  - {type: 'tls:head', offset: 16875, content: '', id: KR3eq093_jc_001-d7.d32.d3.h1s1}
  - {type: 'tls:div-end', offset: 16913, content: '', id: KR3eq093_jc_001-d7.d32d3}
  - {type: 'tls:div-start', offset: 16913, content: '', id: KR3eq093_jc_001-d7.d32d4, level: 3, head_text: 祟脈有似電者}
  - {type: 'tls:head', offset: 16913, content: '', id: KR3eq093_jc_001-d7.d32.d4.h1s1}
  - {type: 'tls:div-end', offset: 16947, content: '', id: KR3eq093_jc_001-d7.d32d4}
  - {type: 'tls:div-end', offset: 16947, content: '', id: KR3eq093_jc_001-d7d32}
  - {type: 'tls:div-start', offset: 16947, content: '', id: KR3eq093_jc_001-d7d33, level: 2, head_text: 各種難治之脈}
  - {type: 'tls:head', offset: 16947, content: '', id: KR3eq093_jc_001-d7.d33.h1s1}
  - {type: 'tls:div-start', offset: 16953, content: '', id: KR3eq093_jc_001-d7.d33d2, level: 3, head_text: 肝脈如繩者難治}
  - {type: 'tls:head', offset: 16953, content: '', id: KR3eq093_jc_001-d7.d33.d2.h1s1}
  - {type: 'tls:div-end', offset: 16988, content: '', id: KR3eq093_jc_001-d7.d33d2}
  - {type: 'tls:div-start', offset: 16988, content: '', id: KR3eq093_jc_001-d7.d33d3, level: 3, head_text: 肝脈如針者難治}
  - {type: 'tls:head', offset: 16988, content: '', id: KR3eq093_jc_001-d7.d33.d3.h1s1}
  - {type: 'tls:div-end', offset: 17037, content: '', id: KR3eq093_jc_001-d7.d33d3}
  - {type: 'tls:div-start', offset: 17037, content: '', id: KR3eq093_jc_001-d7.d33d4, level: 3, head_text: 肝胃軟弱皆難治}
  - {type: 'tls:head', offset: 17037, content: '', id: KR3eq093_jc_001-d7.d33.d4.h1s1}
  - {type: 'tls:div-end', offset: 17100, content: '', id: KR3eq093_jc_001-d7.d33d4}
  - {type: 'tls:div-start', offset: 17100, content: '', id: KR3eq093_jc_001-d7.d33d5, level: 3, head_text: 胃中雙脈如雙線者難治}
  - {type: 'tls:head', offset: 17100, content: '', id: KR3eq093_jc_001-d7.d33.d5.h1s1}
  - {type: 'tls:div-end', offset: 17152, content: '', id: KR3eq093_jc_001-d7.d33d5}
  - {type: 'tls:div-start', offset: 17152, content: '', id: KR3eq093_jc_001-d7.d33d6, level: 3, head_text: 胃脈如針者難治}
  - {type: 'tls:head', offset: 17152, content: '', id: KR3eq093_jc_001-d7.d33.d6.h1s1}
  - {type: 'tls:div-end', offset: 17201, content: '', id: KR3eq093_jc_001-d7.d33d6}
  - {type: 'tls:div-start', offset: 17201, content: '', id: KR3eq093_jc_001-d7.d33d7, level: 3, head_text: 胃中吸腰者難治}
  - {type: 'tls:head', offset: 17201, content: '', id: KR3eq093_jc_001-d7.d33.d7.h1s1}
  - {type: 'tls:div-end', offset: 17270, content: '', id: KR3eq093_jc_001-d7.d33d7}
  - {type: 'tls:div-start', offset: 17270, content: '', id: KR3eq093_jc_001-d7.d33d8, level: 3, head_text: 寸頭脈橫如線者難治右寸頭者居多}
  - {type: 'tls:head', offset: 17270, content: '', id: KR3eq093_jc_001-d7.d33.d8.h1s1}
  - {type: 'tls:div-end', offset: 17327, content: '', id: KR3eq093_jc_001-d7.d33d8}
  - {type: 'tls:div-start', offset: 17327, content: '', id: KR3eq093_jc_001-d7.d33d9, level: 3, head_text: 左尺右尺硬如蘆管者難治}
  - {type: 'tls:head', offset: 17327, content: '', id: KR3eq093_jc_001-d7.d33.d9.h1s1}
  - {type: 'tls:div-end', offset: 17394, content: '', id: KR3eq093_jc_001-d7.d33d9}
  - {type: 'tls:div-start', offset: 17394, content: '', id: KR3eq093_jc_001-d7.d33d10, level: 3, head_text: 折腳之脈難治}
  - {type: 'tls:head', offset: 17394, content: '', id: KR3eq093_jc_001-d7.d33.d10.h1s1}
  - {type: 'tls:div-end', offset: 17455, content: '', id: KR3eq093_jc_001-d7.d33d10}
  - {type: 'tls:div-start', offset: 17455, content: '', id: KR3eq093_jc_001-d7.d33d11, level: 3, head_text: 腫脹脈如秫莛當難治}
  - {type: 'tls:head', offset: 17455, content: '', id: KR3eq093_jc_001-d7.d33.d11.h1s1}
  - {type: 'tls:div-end', offset: 17492, content: '', id: KR3eq093_jc_001-d7.d33d11}
  - {type: 'tls:div-start', offset: 17492, content: '', id: KR3eq093_jc_001-d7.d33d12, level: 3, head_text: 脈如蚯蚓者癱瘓}
  - {type: 'tls:head', offset: 17492, content: '', id: KR3eq093_jc_001-d7.d33.d12.h1s1}
  - {type: 'tls:div-end', offset: 17527, content: '', id: KR3eq093_jc_001-d7.d33d12}
  - {type: 'tls:div-end', offset: 17527, content: '', id: KR3eq093_jc_001-d7d33}
  - {type: 'tls:div-start', offset: 17527, content: '', id: KR3eq093_jc_001-d7d34, level: 2, head_text: 各種死脈}
  - {type: 'tls:head', offset: 17527, content: '', id: KR3eq093_jc_001-d7.d34.h1s1}
  - {type: 'tls:div-start', offset: 17531, content: '', id: KR3eq093_jc_001-d7.d34d2, level: 3, head_text: 脈似除中者死}
  - {type: 'tls:head', offset: 17531, content: '', id: KR3eq093_jc_001-d7.d34.d2.h1s1}
  - {type: 'tls:div-end', offset: 17696, content: '', id: KR3eq093_jc_001-d7.d34d2}
  - {type: 'tls:div-start', offset: 17696, content: '', id: KR3eq093_jc_001-d7.d34d3, level: 3, head_text: 胃脈中斷者必死}
  - {type: 'tls:head', offset: 17696, content: '', id: KR3eq093_jc_001-d7.d34.d3.h1s1}
  - {type: 'tls:div-end', offset: 17738, content: '', id: KR3eq093_jc_001-d7.d34d3}
  - {type: 'tls:div-start', offset: 17738, content: '', id: KR3eq093_jc_001-d7.d34d4, level: 3, head_text: 脈如灰里蚯蚓者死}
  - {type: 'tls:head', offset: 17738, content: '', id: KR3eq093_jc_001-d7.d34.d4.h1s1}
  - {type: 'tls:div-end', offset: 17774, content: '', id: KR3eq093_jc_001-d7.d34d4}
  - {type: 'tls:div-start', offset: 17774, content: '', id: KR3eq093_jc_001-d7.d34d5, level: 3, head_text: 脈如皮條者死}
  - {type: 'tls:head', offset: 17774, content: '', id: KR3eq093_jc_001-d7.d34.d5.h1s1}
  - {type: 'tls:div-end', offset: 17808, content: '', id: KR3eq093_jc_001-d7.d34d5}
  - {type: 'tls:div-start', offset: 17808, content: '', id: KR3eq093_jc_001-d7.d34d6, level: 3, head_text: 脈如牛槽者死}
  - {type: 'tls:head', offset: 17808, content: '', id: KR3eq093_jc_001-d7.d34.d6.h1s1}
  - {type: 'tls:div-end', offset: 17842, content: '', id: KR3eq093_jc_001-d7.d34d6}
  - {type: 'tls:div-start', offset: 17842, content: '', id: KR3eq093_jc_001-d7.d34d7, level: 3, head_text: 脈如蘆管者死}
  - {type: 'tls:head', offset: 17842, content: '', id: KR3eq093_jc_001-d7.d34.d7.h1s1}
  - {type: 'tls:div-end', offset: 17904, content: '', id: KR3eq093_jc_001-d7.d34d7}
  - {type: 'tls:div-start', offset: 17904, content: '', id: KR3eq093_jc_001-d7.d34d8, level: 3, head_text: 脈如秫莛者死}
  - {type: 'tls:head', offset: 17904, content: '', id: KR3eq093_jc_001-d7.d34.d8.h1s1}
  - {type: 'tls:div-end', offset: 18014, content: '', id: KR3eq093_jc_001-d7.d34d8}
  - {type: 'tls:div-start', offset: 18014, content: '', id: KR3eq093_jc_001-d7.d34d9, level: 3, head_text: 脈如弓弦者死}
  - {type: 'tls:head', offset: 18014, content: '', id: KR3eq093_jc_001-d7.d34.d9.h1s1}
  - {type: 'tls:div-end', offset: 18062, content: '', id: KR3eq093_jc_001-d7.d34d9}
  - {type: 'tls:div-start', offset: 18062, content: '', id: KR3eq093_jc_001-d7.d34d10, level: 3, head_text: 脈如牛筋者死}
  - {type: 'tls:head', offset: 18062, content: '', id: KR3eq093_jc_001-d7.d34.d10.h1s1}
  - {type: 'tls:div-end', offset: 18133, content: '', id: KR3eq093_jc_001-d7.d34d10}
  - {type: 'tls:div-start', offset: 18133, content: '', id: KR3eq093_jc_001-d7.d34d11, level: 3, head_text: 脈如游魚者死}
  - {type: 'tls:head', offset: 18133, content: '', id: KR3eq093_jc_001-d7.d34.d11.h1s1}
  - {type: 'tls:div-end', offset: 18181, content: '', id: KR3eq093_jc_001-d7.d34d11}
  - {type: 'tls:div-start', offset: 18181, content: '', id: KR3eq093_jc_001-d7.d34d12, level: 3, head_text: 脈如線繩者死}
  - {type: 'tls:head', offset: 18181, content: '', id: KR3eq093_jc_001-d7.d34.d12.h1s1}
  - {type: 'tls:div-end', offset: 18233, content: '', id: KR3eq093_jc_001-d7.d34d12}
  - {type: 'tls:div-start', offset: 18233, content: '', id: KR3eq093_jc_001-d7.d34d13, level: 3, head_text: 吐血脈如蔥葉者死}
