  - {type: 'tls:div-end', offset: 6522, content: '', id: KR3eq093_jc_001-d7d14}
  - {type: 'tls:div-start', offset: 6522, content: '', id: KR3eq093_jc_001-d7d15, level: 2, head_text: 虛火實火宜從寸頭上下分}
  - {type: 'tls:head', offset: 6522, content: '', id: KR3eq093_jc_001-d7.d15.h1s1}
  - {type: 'tls:div-end', offset: 6676, content: '', id: KR3eq093_jc_001-d7d15}
  - {type: 'tls:div-start', offset: 6676, content: '', id: KR3eq093_jc_001-d7d16, level: 2, head_text: 脈在上下指脈出本位言中焦該三部言虛甚脈當以中焦為主上下帶治方好}
  - {type: 'tls:head', offset: 6676, content: '', id: KR3eq093_jc_001-d7.d16.h1s1}
