body:
  text: 書後上蠢子醫四卷陽夏龍繪堂先生晚年所著教其孫兌山者也兌山少孤先生恐醫學失傳因本平日心得而經驗者演為詩歌不避淺俗取便記誦而已先生既沒兌山與其從父君由皆得力是書遂以醫名世親友爭相傳鈔屢擬付梓不果嘗呈政於縣長榆山朱潛齋先生今秋吾項縣誌將竣兌山橐書來求吾師仲唐先生及友人施君虞琴等參訂校正付諳石印餘本不諸此道然以兌山之託義不容辭謹按其原卷各以類從稍為次其先後至其病論藥方或簡括難曉並請兌山口述而附註焉欲便閱者非敢妄事贅述也獨是先生此書多出創穫神而明之存乎其人兌山幼承家學數十年慄慄恐墜又不私為己有欲公同好以廣其傳可謂克繩祖武者矣甲寅仲冬項城後學張三寶謹書於周濱張氏別墅縣誌局
